    };
    const onVisible=()=>{if(!document.hidden)reload();};
    window.addEventListener('focus',reload);
    document.addEventListener('visibilitychange',onVisible);
    // Reload immediately when fresh data lands from another device.
    window.addEventListener('peakly:sync-restored',reload);
    window.addEventListener('peakly:data-changed',reload);
    // Poll every 3s so task checks on goals page show here without switching tabs
    const interval=setInterval(reload,3000);
    return()=>{
      window.removeEventListener('focus',reload);
      document.removeEventListener('visibilitychange',onVisible);
      window.removeEventListener('peakly:sync-restored',reload);
      window.removeEventListener('peakly:data-changed',reload);
      clearInterval(interval);
    };
  },[]);

  // Handle ?checkout=success after Stripe redirect — webhook may need a moment.
  useEffect(()=>{
    const params=new URLSearchParams(window.location.search);
    if(params.get('checkout')!=='success')return;
    const checkoutSessionId=params.get('session_id');
    let tries=0;
    let syncedCheckout=false;
    const refresh=async()=>{
      tries++;
      if(!window.sb||!window.PeaklyAuth)return;
      const session = await (window.PeaklyAuth?.getSession ? window.PeaklyAuth.getSession(window.sb) : window.sb.auth.getSession().then(r=>r.data.session));
      if(!session)return;
      if(checkoutSessionId&&!syncedCheckout&&window.PeaklyConfig?.SYNC_CHECKOUT_SESSION_URL){
        try{
          const res=await fetch(window.PeaklyConfig.SYNC_CHECKOUT_SESSION_URL,{
            method:'POST',
            headers:{
              'Content-Type':'application/json',
              'Authorization':`Bearer ${session.access_token}`,
              'apikey':window.PeaklyConfig.SUPABASE_KEY
            },
            body:JSON.stringify({sessionId:checkoutSessionId,userId:session.user.id})
          });
          if(res.ok) syncedCheckout=true;
        }catch(e){
          // Keep polling below; the Stripe webhook may still sync the row.
        }
      }
      const result = await window.PeaklyAuth.loadSubscription(window.sb, session.user);
      if(result.plan==='pro'){
        setCongrats({title:'Welcome to Pro! 🏔️',msg:'Your subscription is active. Time to lock in those goals.',emoji:'⭐'});
        setConfetti(true);
        // Strip query params so refresh doesn't re-trigger
        history.replaceState({},'',window.location.pathname);
      } else if(tries<6){
        setTimeout(refresh,1500);
      }
    };
    setTimeout(refresh,1200);
  },[]);

  const saveGoals=g=>{setGoals(g);LS.set(`goals_${todayKey()}`,g);};
  const saveWater=w=>{setWater(w);LS.set(`water_${todayKey()}`,w);};

const toggleHabit = (goalId, habitId) => {
    // 1. Update the local UI state
    const upd = goals.map(g => g.id === goalId ? {
      ...g,
      habits: g.habits.map(h => h.id === habitId ? { ...h, done: !h.done } : h)
    } : g);
    setGoals(upd);

    const goal = upd.find(g => g.id === goalId);
    const habit = goal?.habits.find(h => h.id === habitId);

    if (habit) {
      // 2. Save the checkmark to the unique Master Storage Key
      if (habit.storeKey) LS.set(habit.storeKey, habit.done);
      if (habit.homeKey) LS.set(habit.homeKey, habit.done);
      const habitTaskId = habit.taskId || habitId;

      // 3. Update 'peakly_goals' using the task id, so row reordering does not
      // write the checkmark to the wrong goal task.
      const pg = LS.get('peakly_goals', []);
      const updatedPg = pg.map(g => {
        if (String(g.id) !== String(goalId)) return g;
        const updTasks = (g.todayTasks || []).map((t) => {
          if (String(t.taskId || t.id) === String(habitTaskId)) {
            return { ...t, done: habit.done };
          }
          return t;
        });
        return { ...g, todayTasks: updTasks };
      });
      LS.set('peakly_goals', updatedPg);
      if(window.PeaklyGoals&&window.PeaklyGoals.applyTaskDone){
        const changed=window.PeaklyGoals.applyTaskDone(goalId,habitTaskId,habit.done,{notify:false});
        window.PeaklyGoals.notifyChange({source:'task-done',goalId,taskId:habitTaskId,changed,keys:['peakly_goals']});
      }else{
        try{window.dispatchEvent(new CustomEvent('peakly:data-changed',{detail:{source:'task-done',goalId,taskId:habitTaskId,keys:['peakly_goals']}}));}catch(e){}
      }

      // Per-goal day-complete celebration. If this toggle just finished the
      // last task for this goal today, show the same celebration popup the
      // goals page shows. The flag is in localStorage so flipping a task
      // off-then-on or visiting the other page won't re-fire it.
      const finishedGoal = upd.find(g => g.id === goalId);
      if (habit.done && finishedGoal && finishedGoal.habits.length > 0
          && finishedGoal.habits.every(h => h.done)) {
        const fullGoal = updatedPg.find(g => String(g.id) === String(goalId));
        if (fullGoal && fullGoal.startedDate) {
          const sd = new Date(fullGoal.startedDate); sd.setHours(0,0,0,0);
          const today = new Date(); today.setHours(0,0,0,0);
          const dayNum = Math.floor((today - sd) / 86400000) + 1;
          const celebKey = 'peakly_celebrated_' + goalId + '_day' + dayNum + '_' + todayKey();
          if (!LS.get(celebKey, false)) {
            LS.set(celebKey, true);
            setTimeout(() => {
              setConfetti(true);
              setCongrats({
                title: 'Day ' + dayNum + ' complete! 🎉',
                msg: 'Every task for "' + (fullGoal.name || 'this goal') + '" is done. See you tomorrow! 🏔️',
                emoji: '🎉'
              });
            }, 300);
          }
        }
      }
    }

  };
  
const sickDay = () => {
    setSickModal(false);

    const _todayStr = new Date().toDateString();
    const _todayKey = todayKey();

    // 1. Get the Master List
    const pg = LS.get('peakly_goals', []);

    // 2. Shift each goal's startedDate forward by 1 day so today's tasks become
    //    tomorrow's tasks (matches the goals page sickDay behavior).
    //    Clear todayTasks so the goals page recomputes them from definitions.
    //    Clear done state keys for today's tasks.
    const updatedPg = pg.map(g => {
      if (g.startedDate) {
        const d = new Date(g.startedDate);
        d.setDate(d.getDate() + 1);
        // Clear daily done keys for any tasks that were tracked for today
        (g.todayTasks || []).forEach(t => {
          const tid = t.taskId || t.id || 'task';
          LS.set('daily_' + g.id + '_' + tid + '_' + _todayStr, false);
        });
        return {
          ...g,
          startedDate: d.toISOString(),
          sickDayDate: _todayKey,
          todayTasks: []  // Force recompute next time goals page renders
        };
      }
      return g;
    });

    // 3. Save it back to storage
    LS.set('peakly_goals', updatedPg);
    LS.set('habits_' + _todayKey, {});

    // 4. Update the Home Page UI immediately
    setGoals(prev => prev.map(g => ({
      ...g,
      habits: g.habits.map(h => ({ ...h, done: false }))
    })));

    setCongrats('Sick day logged. Tasks pushed to tomorrow — visit Goals page to see your new schedule. 🌿');
  };

  const allHabits=goals.flatMap(g=>g.habits);
  const done=allHabits.filter(h=>h.done).length;
  const total=allHabits.length;
  const pct=total?Math.round(done/total*100):0;

  const lastPctRef=useRef(pct);
  // Daily milestone messages — fire once per threshold per day. Flag stored
  // in localStorage so dropping below the threshold and re-crossing it
  // doesn't re-trigger the popup, and so the goals page won't double-fire
  // a milestone that already showed here.
  const MILESTONE_COPY={
    25:{title:'Started climbing! 🧗',msg:'You started climbing, keep going',emoji:'🧗'},
    50:{title:'Halfway there! ⛰️',msg:"You're half way there, keep going strong!",emoji:'⛰️'},
    75:{title:'Almost there! 🌟',msg:"You're almost there! Way to go don't stop now!",emoji:'🌟'},
    100:{title:'Peak reached! 🏔️',msg:"Congratulations, you're one day closer to reaching your peak",emoji:'🏔️'}
  };
  useEffect(()=>{
    if(total<=0) return;
    const dk=todayKey();
    [25,50,75,100].forEach(threshold=>{
      if(pct>=threshold && lastPctRef.current<threshold){
        const flagKey='peakly_shown_milestone_'+threshold+'_'+dk;
        if(!LS.get(flagKey,false)){
          LS.set(flagKey,true);
          if(threshold===100) setConfetti(true);
          setCongrats({...MILESTONE_COPY[threshold]});
        }
      }
    });
    lastPctRef.current=pct;
  },[pct,total]);

  // New-day welcome popup — fires the first time the user opens the home
  // page each day. Flag is in localStorage so the popup syncs across
  // devices via PeaklySync (won't double-fire on phone + laptop same day).
  useEffect(()=>{
    const dk=todayKey();
    const flagKey='peakly_shown_newday_'+dk;
    if(LS.get(flagKey,false)) return;
    LS.set(flagKey,true);
    const t=setTimeout(()=>{
      setCongrats({
        title:'A new day awaits ☀️',
        msg:"It's a new day and time to get climbing to reach your goals! You can do hard things.",
        emoji:'☀️'
      });
    },600);
    return()=>clearTimeout(t);
  },[]);

  return(
    <div style={{minHeight:'100vh',background:'var(--bg)'}}>
      <Confetti active={confetti} onDone={()=>setConfetti(false)}/>
      {congrats&&<CongratsModal
        msg={typeof congrats==='string'?congrats:(congrats.msg||'')}
        title={typeof congrats==='object'?congrats.title:undefined}
        emoji={typeof congrats==='object'?congrats.emoji:undefined}
        onClose={()=>setCongrats(null)}/>}
      {sickModal&&<SickModal onConfirm={sickDay} onCancel={()=>setSickModal(false)}/>}

      {/* Nav */}
      <nav style={{background:'var(--white)',borderBottom:'1px solid var(--border2)',padding:'0 20px',display:'flex',alignItems:'center',justifyContent:'space-between',height:54,position:'sticky',top:0,zIndex:100,boxShadow:'0 1px 8px rgba(15,28,46,0.06)'}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <Logo size={32}/>
          <div>
            <div style={{fontFamily:'var(--font-display)',fontSize:18,fontWeight:700,letterSpacing:'-0.3px',lineHeight:1,color:'var(--text)'}}>Peakly</div>
            <div style={{fontSize:9,color:'var(--text4)',letterSpacing:'0.8px',textTransform:'uppercase',lineHeight:1}}>Lock in your goals</div>
          </div>
        </div>
        <div style={{display:'flex',gap:2}}>
          {['Home','Goals','Life Admin','Calendar'].map((p,i)=>(
            <button key={p} onClick={()=>{
              const pages=['peakly.html','peakly-goals.html','peakly-second-brain-1.html','peakly-calendar.html'];
              if(i!==0)window.location.href=pages[i];
            }} style={{padding:'6px 14px',borderRadius:'var(--r-md)',fontSize:13,color:i===0?'#fff':'var(--text2)',background:i===0?'var(--blue)':'transparent',fontWeight:i===0?600:400,border:'none',transition:'all 0.15s',cursor:'pointer'}}>
              {p}
            </button>
          ))}
        </div>
        <UserAvatar/>
      </nav>

      {/* 3-col grid */}
      <main style={{display:'grid',gridTemplateColumns:'272px 1fr 288px',gap:14,padding:'14px 18px',maxWidth:1380,margin:'0 auto',alignItems:'start'}}>

        {/* LEFT */}
        <div style={{display:'flex',flexDirection:'column',gap:12}}>
          <DateCard/>
          <Meals/>
          <Water water={water} setWater={saveWater}/>
          <TopPriorities/>
        </div>

        {/* CENTER — Goals & Tasks */}
        <div>
          <GoalList goals={goals} onToggle={toggleHabit}/>
        </div>

        {/* RIGHT */}
        <div style={{display:'flex',flexDirection:'column',gap:12}}>
          <button onClick={()=>setSickModal(true)}
            style={{width:'100%',padding:'13px',borderRadius:'var(--r-lg)',background:'var(--red-light)',color:'var(--red)',fontSize:13,fontWeight:700,border:'1px solid #FCA5A5',display:'flex',alignItems:'center',justifyContent:'center',gap:8,boxShadow:'var(--shadow)'}}>
            <span style={{fontSize:19}}>🤒</span> Sick Day — Push Everything
          </button>
          <div className="card">
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
              <div className="clabel" style={{marginBottom:0}}>Today's Progress</div>
              <span style={{fontSize:14,fontWeight:700,color:pct===100?'var(--orange)':'var(--blue)'}}>{pct}%</span>
            </div>
            <Bar pct={pct} color={pct===100?'var(--orange)':'var(--blue)'} h={12}/>
            <div style={{display:'flex',justifyContent:'space-between',marginTop:6}}>
              <span style={{fontSize:11,color:'var(--text3)'}}>{done} of {total} tasks complete</span>
            </div>
          </div>
          <Garden/>
          <Pomo/>
          <Move/>
          <Brain/>
          <Reflect/>
        </div>

      </main>
</div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);

    // --- PUSH NOTIFICATIONS ---
    (function initNotifications(){
      if(!('Notification' in window)||!('serviceWorker' in navigator))return;
      navigator.serviceWorker.register('/sw.js').catch(()=>{});

      function scheduleTaskNotifications(){
        if(Notification.permission!=='granted')return;
        const events=getCalendarEvents();
        const now=Date.now();
        const swReady=navigator.serviceWorker.ready;
        events.forEach(ev=>{
          if(!ev.time)return;
          const[h,m]=(ev.time||'').split(':').map(Number);
          if(isNaN(h))return;
          const t=new Date();t.setHours(h,m,0,0);
          const notifyAt=t.getTime()-5*60*1000; // 5 min before
          const delay=notifyAt-now;
          if(delay>0&&delay<16*60*60*1000){ // only within next 16 hrs
            setTimeout(()=>{
              swReady.then(reg=>{
                reg.active&&reg.active.postMessage({
                  type:'SHOW_NOTIFICATION',
                  title:'⏰ Starting in 5 min: '+ev.title,
                  body:ev.time+' — tap to open Peakly',
                  tag:'task_'+ev.id,
                  url:'/peakly-calendar.html',
                });
              });
            },delay);
          }
        });
      }

      // Ask for permission on first visit (after brief delay so it's not jarring)
      if(Notification.permission==='default'){
        setTimeout(()=>{
          Notification.requestPermission().then(p=>{
            if(p==='granted')scheduleTaskNotifications();
          });
        },4000);
      }else if(Notification.permission==='granted'){
        scheduleTaskNotifications();
      }
    })();

    // --- CLOUD SYNC LOGIC ---
    async function syncCheckmarksFromCloud() {
      if (!window.sb) return; 
      try {
        const session = await (window.PeaklyAuth?.getSession ? window.PeaklyAuth.getSession(window.sb) : window.sb.auth.getSession().then(r=>r.data.session));
        if (!session) return;
        const today = new Date().toISOString().split('T')[0];
        const { data: habits } = await window.sb
          .from('habits')
          .select('name')
          .eq('user_id', session.user.id)
          .eq('completed_at', today);

        if (habits && habits.length > 0) {
          let changed = false;
          habits.forEach(h => {
            if (localStorage.getItem(h.name) !== JSON.stringify(true)) {
              localStorage.setItem(h.name, JSON.stringify(true));
              changed = true;
            }
          });
          if (changed) window.dispatchEvent(new Event('focus'));
        }
      } catch (e) { console.error("Sync error:", e); }
    }
    setTimeout(syncCheckmarksFromCloud, 1500);
  </script>

<!-- ── Onboarding Tour ─────────────────────────────────────────────────── -->
<style>
#tourOverlay{position:fixed;inset:0;z-index:9000;pointer-events:none;}
#tourOverlay.active{pointer-events:all;}
#tourBackdrop{position:fixed;inset:0;background:rgba(15,20,35,.55);z-index:9001;transition:opacity .3s;}
#tourCard{position:fixed;z-index:9002;background:#fff;border-radius:18px;box-shadow:0 12px 40px rgba(0,0,0,.22);padding:28px 28px 22px;max-width:340px;width:calc(100vw - 40px);transition:all .35s cubic-bezier(.22,.9,.36,1);}
#tourCard .tc-step{font-size:11px;font-weight:700;letter-spacing:.08em;color:var(--blue);text-transform:uppercase;margin-bottom:6px;}
#tourCard .tc-icon{font-size:36px;margin-bottom:10px;}
#tourCard .tc-title{font-family:var(--display);font-size:19px;font-weight:800;color:var(--text);margin-bottom:8px;line-height:1.2;}
#tourCard .tc-body{font-size:13px;color:var(--text2);line-height:1.55;margin-bottom:18px;}
#tourCard .tc-dots{display:flex;gap:6px;margin-bottom:16px;}
#tourCard .tc-dot{width:7px;height:7px;border-radius:50%;background:var(--border2);transition:background .2s;}
#tourCard .tc-dot.on{background:var(--blue);}
#tourCard .tc-actions{display:flex;justify-content:space-between;align-items:center;}
#tourCard .tc-skip{font-size:12px;color:var(--text4);background:none;border:none;cursor:pointer;padding:0;}
#tourCard .tc-skip:hover{color:var(--text2);}
#tourCard .tc-next{padding:9px 22px;border-radius:30px;background:var(--blue);color:#fff;font-size:13px;font-weight:700;border:none;cursor:pointer;transition:opacity .15s;}
#tourCard .tc-next:hover{opacity:.88;}
#tourSpotlight{position:fixed;z-index:9000;border-radius:14px;box-shadow:0 0 0 9999px rgba(15,20,35,.55);transition:all .35s cubic-bezier(.22,.9,.36,1);pointer-events:none;}
</style>
<div id="tourOverlay">
  <div id="tourBackdrop" style="display:none;" onclick="tourSkip()"></div>
  <div id="tourSpotlight" style="display:none;"></div>
  <div id="tourCard" style="display:none;">
    <div class="tc-step" id="tourStep"></div>
    <div class="tc-icon" id="tourIcon"></div>
    <div class="tc-title" id="tourTitle"></div>
    <div class="tc-body" id="tourBody"></div>
    <div class="tc-dots" id="tourDots"></div>
    <div class="tc-actions">
      <button class="tc-skip" onclick="tourSkip()">Skip tour</button>
      <button class="tc-next" id="tourNextBtn" onclick="tourNext()">Next →</button>
    </div>
  </div>
</div>
<script>
(function(){
  if(localStorage.getItem('peakly_tour_done')==='1')return;

  const STEPS=[
    {icon:'🌿',title:'Welcome to Peakly',body:'Peakly is your all-in-one goal tracker, life organizer, and wellness companion. Let us show you around in 30 seconds.',target:null,position:'center'},
    {icon:'🎯',title:'Set Your Goals',body:'Head to the Goals page to pick from 100+ goal templates — fitness, mental health, business, relationships — or build your own. Your daily tasks will automatically appear here on the home page.',target:'[href="peakly-goals.html"]',position:'below'},
    {icon:'📅',title:'Your Calendar',body:'Everything syncs to your Calendar automatically — goal tasks, routines, appointments from Life Admin. You can also add one-off or recurring events.',target:'[href="peakly-calendar.html"]',position:'below'},
    {icon:'🗂️',title:'Life Admin',body:'Track health, finances, home, vehicle, meals, and more in Life Admin. It\'s your whole life in one place — and it all feeds into your calendar.',target:'[href="peakly-second-brain-1.html"]',position:'below'},
    {icon:'✅',title:'You\'re all set!',body:'Check off your daily tasks here on the home page, watch your garden grow with your streak, and review your week every Saturday. You\'ve got this.',target:null,position:'center'},
  ];

  let cur=0;

  function render(){
    const s=STEPS[cur];
    const overlay=document.getElementById('tourOverlay');
    const backdrop=document.getElementById('tourBackdrop');
    const card=document.getElementById('tourCard');
    const spotlight=document.getElementById('tourSpotlight');
    overlay.classList.add('active');
    backdrop.style.display='block';
    card.style.display='block';
    document.getElementById('tourStep').textContent='Step '+(cur+1)+' of '+STEPS.length;
    document.getElementById('tourIcon').textContent=s.icon;
    document.getElementById('tourTitle').textContent=s.title;
    document.getElementById('tourBody').textContent=s.body;
    document.getElementById('tourNextBtn').textContent=cur===STEPS.length-1?'Get started ✓':'Next →';
    const dots=document.getElementById('tourDots');
    dots.innerHTML=STEPS.map((_,i)=>`<div class="tc-dot${i===cur?' on':''}"></div>`).join('');

    if(s.target){
      const el=document.querySelector(s.target);
      if(el){
        const r=el.getBoundingClientRect();
        const pad=10;
        spotlight.style.cssText=`display:block;left:${r.left-pad}px;top:${r.top-pad}px;width:${r.width+pad*2}px;height:${r.height+pad*2}px;box-shadow:0 0 0 9999px rgba(15,20,35,.55);border-radius:14px;transition:all .35s;`;
        // Position card below the spotlight
        const cardTop=r.bottom+pad+16;
        card.style.cssText=`display:block;left:50%;top:${Math.min(cardTop,window.innerHeight-280)}px;transform:translateX(-50%);`;
      } else {
        spotlight.style.display='none';
        centerCard();
      }
    } else {
      spotlight.style.display='none';
      centerCard();
    }
  }

  function centerCard(){
    const card=document.getElementById('tourCard');
    card.style.cssText='display:block;left:50%;top:50%;transform:translate(-50%,-50%);';
  }

  window.tourNext=function(){
    cur++;
    if(cur>=STEPS.length){tourDone();return;}
    render();
  };

  window.tourSkip=function(){tourDone();};

  function tourDone(){
    localStorage.setItem('peakly_tour_done','1');
    document.getElementById('tourOverlay').classList.remove('active');
    document.getElementById('tourBackdrop').style.display='none';
    document.getElementById('tourCard').style.display='none';
    document.getElementById('tourSpotlight').style.display='none';
  }

  // Start after a short delay so the page renders first
  setTimeout(render, 900);
})();
</script>
</body>
