// ─ Confetti ─
function Confetti({active,onDone}){
  useEffect(()=>{
    if(!active)return;
    const colors=['#1A5FA8','#F97316','#3B82F6','#FB923C','#DBEAFE','#FED7AA'];
    const pieces=[];
    for(let i=0;i<88;i++){
      const el=document.createElement('div');el.className='confetti-piece';
      const s=6+Math.random()*8;
      el.style.cssText=`left:${Math.random()*100}vw;width:${s}px;height:${s}px;background:${colors[i%colors.length]};animation-duration:${1.4+Math.random()*2}s;animation-delay:${Math.random()*0.5}s;border-radius:${Math.random()>0.5?'50%':'3px'};`;
      document.body.appendChild(el);pieces.push(el);
    }
    const t=setTimeout(()=>{pieces.forEach(p=>p.remove());onDone&&onDone();},3800);
    return()=>{clearTimeout(t);pieces.forEach(p=>p.remove());};
  },[active]);
  return null;
}

}

function TaskInfoModal({ev,onClose}){
  const goal=ev.type==='goal'&&ev.goalId?(LS.get('peakly_goals',[]).find(g=>String(g.id)===String(ev.goalId))):null;
  const dayInfo=(()=>{
    if(!goal||!goal.startedDate)return null;
    const sd=new Date(goal.startedDate);sd.setHours(0,0,0,0);
    const now=new Date();now.setHours(0,0,0,0);
    const dayNum=Math.floor((now-sd)/86400000)+1;
    const total=goal.totalDays||90;
    return {dayNum,total};
  })();
  const targetDate=(()=>{
    if(!goal||!goal.startedDate)return null;
    const sd=new Date(goal.startedDate);sd.setHours(0,0,0,0);
    const total=goal.totalDays||90;
    const td=new Date(sd);td.setDate(td.getDate()+total-1);
    return td.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  })();
  const linkLabel=(()=>{
    if(ev.type==='goal')return 'View goal page →';
    if(ev.type==='lifeadmin')return 'View Life Admin →';
    if(ev.type==='routine')return 'View routines →';
    if(ev.type==='work')return 'View work →';
    if(ev.type==='manual')return 'View calendar →';
    return 'View source →';
  })();
  const linkHref=(()=>{
    if(ev.type==='goal'&&ev.goalId)return `peakly-goals.html?goal=${encodeURIComponent(ev.goalId)}`;
    return ev.page||null;
  })();
  const headerEmoji=goal?.emoji||(ev.type==='goal'?'🎯':ev.type==='lifeadmin'?'🏠':ev.type==='routine'?'🌅':ev.type==='work'?'💼':'📌');
  const headerTitle=goal?.name||ev.goalName||ev.title;
  const subtypeLabel=ev.subType?ev.subType.replace(/_/g,' '):null;
  return(
    <Overlay>
      <div>
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:14}}>
          <div style={{fontSize:32}}>{headerEmoji}</div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontFamily:'var(--font-display)',fontSize:18,fontWeight:700,color:'var(--text)',lineHeight:1.2}}>{headerTitle}</div>
            {dayInfo&&<div style={{fontSize:11,color:'var(--text3)',marginTop:2}}>Day {dayInfo.dayNum} of {dayInfo.total}</div>}
            {!dayInfo&&subtypeLabel&&<div style={{fontSize:11,color:'var(--text3)',marginTop:2,textTransform:'capitalize'}}>{subtypeLabel}</div>}
            {targetDate&&<div style={{fontSize:11,color:'var(--text3)',marginTop:2}}>🎯 Target: {targetDate}</div>}
          </div>
        </div>
        <div style={{padding:'12px 14px',background:'var(--bg)',borderRadius:'var(--r-md)',marginBottom:14}}>

          {ev.taskType&&ev.taskType!=='daily'&&<div style={{fontSize:11,color:'var(--text3)',marginTop:4,textTransform:'capitalize'}}>{ev.taskType} task</div>}

 useEffect(() => {

  const searchUnsplash=async(q)=>{
    setLoading(true);
    try{
      // Use Unsplash API via lorem picsum as fallback for variety
      // Generate themed images based on search term
      const seeds = Array.from({length:8},(_,i)=>Math.floor(Math.random()*1000)+i*37);
      const imgs = seeds.map(seed=>`https://picsum.photos/seed/${q?encodeURIComponent(q)+seed:seed}/400/300`);
      setResults(imgs);
    }catch(e){
      // Fallback to solid color placeholders
      const colors=['#1A5FA8','#F97316','#059669','#7C3AED','#DC2626','#0891B2','#D97706','#9333EA'];
      setResults(colors.map(c=>`https://via.placeholder.com/400x300/${c.replace('#','')}/fff?text=${encodeURIComponent(q||'photo')}`));
    }
    setLoading(false);
  };

  const searchGiphy=async(q)=>{
    setLoading(true);
    try{
      const term=encodeURIComponent(q||'good morning');
      const res=await fetch(`https://api.giphy.com/v1/gifs/search?api_key=sXpGFDGZs0Dv1mmNFvYaGUvYwKX0PWIh&q=${term}&limit=6&rating=g`);
      const data=await res.json();
      const urls=(data.data||[]).map(g=>g.images.fixed_height.url);
      setResults(urls);
    }catch{setResults([]);}
    setLoading(false);
  };

const pickImage = async (url) => {
    // 1. Update UI immediately so it feels snappy
    setVibe(url);
    LS.set('home_vibe_img', url); 
    setShowPicker(false);
    setResults([]);

    // 2. Sync to Supabase so your computer sees what your phone picks
    if (window.sb) {
      try {
        const session = await (window.PeaklyAuth?.getSession ? window.PeaklyAuth.getSession(sb) : sb.auth.getSession().then(r=>r.data.session));
        if (session) {
          const { error } = await sb.from('profiles').upsert({ 
            id: session.user.id, 
            home_vibe: url,
            updated_at: new Date().toISOString() 
          });
          
          if (error) console.error("Sync error:", error.message);
          else console.log("Vibe synced to cloud! ☁️");
        }
      } catch (err) {
        console.error("Connection error:", err);
      }
    }
  };
  
const handleUpload = async (e) => {
    const file = e.target.files[0];
    if (!file || !window.sb) return;

    try {
      // 1. Get the current user session
      const session = await (window.PeaklyAuth?.getSession ? window.PeaklyAuth.getSession(sb) : sb.auth.getSession().then(r=>r.data.session));
      if (!session) return alert("Please log in to sync images!");

      // 2. Prepare the file path (User ID / Timestamp)
      const fileExt = file.name.split('.').pop();
      const fileName = `${session.user.id}/${Date.now()}.${fileExt}`;

      // 3. Upload to the Supabase "images" bucket
      const { error: uploadError } = await sb.storage
        .from('images')
        .upload(fileName, file);

      if (uploadError) throw uploadError;

      // 4. Get the public URL that both phone and computer can see
      const { data } = sb.storage.from('images').getPublicUrl(fileName);
      const publicUrl = data.publicUrl;

      // 5. Update the local UI and sync the link to your profile
      setVibe(publicUrl);
      LS.set('home_vibe_img', publicUrl);

      await sb.from('profiles').upsert({ 
        id: session.user.id, 
        home_vibe: publicUrl,
        updated_at: new Date().toISOString() 
      });

      console.log("Vibe successfully synced to cloud!");

    } catch (error) {
      console.error('Upload error:', error.message);
      alert("Sync failed: Ensure you have a PUBLIC bucket named 'images' in Supabase.");
    }

              onError={()=>{setVibe('');LS.set('home_vibe_img','');}}/>
            <div style={{position:'absolute',inset:0,background:'linear-gradient(to top,rgba(0,0,0,.45) 0%,transparent 60%)',display:'flex',alignItems:'flex-end',justifyContent:'space-between',padding:'8px 10px'}}>
              <span style={{fontSize:11,color:'rgba(255,255,255,.8)',fontWeight:600}}>Today's vibe ✨</span>

                <button onClick={()=>openPicker('unsplash')} style={{fontSize:10,padding:'3px 8px',borderRadius:100,background:'rgba(255,255,255,.2)',color:'#fff',backdropFilter:'blur(4px)'}}>📷 Change</button>

      {showPicker&&(
        <div style={{position:'fixed',inset:0,background:'rgba(15,28,46,.5)',zIndex:999,display:'flex',alignItems:'center',justifyContent:'center',padding:16}} onClick={()=>setShowPicker(false)}>
          <div style={{background:'var(--white)',borderRadius:20,width:'100%',maxWidth:420,maxHeight:'90vh',overflow:'hidden',display:'flex',flexDirection:'column',boxShadow:'0 24px 64px rgba(15,28,46,.2)'}} onClick={e=>e.stopPropagation()}>
            {/* Header */}
            <div style={{padding:'14px 18px',borderBottom:'1px solid var(--border2)',display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0}}>
              <div style={{fontFamily:'var(--font-display)',fontSize:16,fontWeight:700}}>Set today's vibe ✨</div>
              <button onClick={()=>setShowPicker(false)} style={{fontSize:20,color:'var(--text4)'}}>×</button>
            </div>
            {/* Tabs */}
            <div style={{display:'flex',gap:2,padding:'10px 18px',borderBottom:'1px solid var(--border2)',flexShrink:0}}>
              {[{id:'unsplash',label:'📷 Photos',color:'var(--blue)'},
                {id:'gif',label:'🎬 GIFs',color:'var(--orange)'},
                {id:'upload',label:'⬆️ Upload',color:'var(--green)'}].map(t=>(
                <button key={t.id} onClick={()=>{setTab(t.id);setResults([]);}}
                  style={{flex:1,padding:'6px 4px',borderRadius:'var(--r-sm)',fontSize:11,fontWeight:700,border:'none',background:tab===t.id?t.color:'var(--bg)',color:tab===t.id?'#fff':'var(--text3)',cursor:'pointer'}}>
                  {t.label}
                </button>
              ))}
            </div>
            {/* Body */}
            <div style={{flex:1,overflowY:'auto',padding:'14px 18px'}}>
              {tab==='upload'?(
                <div style={{textAlign:'center',padding:'20px 0'}}>
                  <div style={{fontSize:32,marginBottom:10}}>📁</div>
                  <div style={{fontSize:13,color:'var(--text2)',marginBottom:14}}>Upload a photo or GIF from your device</div>
                  <label style={{padding:'10px 24px',borderRadius:'var(--r-md)',background:'var(--blue)',color:'#fff',fontSize:13,fontWeight:700,cursor:'pointer',display:'inline-block'}}>
                    Choose file
                    <input type="file" accept="image/*,image/gif" style={{display:'none'}} onChange={handleUpload}/>
                  </label>
                </div>
              ):(
                <>
                  <div style={{display:'flex',gap:6,marginBottom:12}}>
                    <input value={query} onChange={e=>setQuery(e.target.value)}
                      onKeyDown={e=>{if(e.key==='Enter')tab==='unsplash'?searchUnsplash(query):searchGiphy(query);}}
                      placeholder={tab==='unsplash'?'Search photos… (e.g. sunrise, calm)':'Search GIFs… (e.g. good morning)'}
                      style={{flex:1,padding:'8px 10px',borderRadius:'var(--r-sm)',border:'1px solid var(--border)',fontSize:12,background:'var(--bg)',outline:'none'}}/>
                    <button onClick={()=>tab==='unsplash'?searchUnsplash(query):searchGiphy(query)}
                      style={{padding:'8px 14px',borderRadius:'var(--r-sm)',background:'var(--blue)',color:'#fff',fontSize:12,fontWeight:700}}>
                      Search
                    </button>
                  </div>
                  {results.length===0&&!loading&&(
                    <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:10}}>
                      {(tab==='unsplash'?['sunrise','aesthetic','calm','motivation','nature','cozy']:['good morning','motivation','aesthetic','happy','focus','chill']).map(s=>(
                        <button key={s} onClick={()=>{setQuery(s);tab==='unsplash'?searchUnsplash(s):searchGiphy(s);}}
                          style={{padding:'4px 10px',borderRadius:100,background:'var(--bg2)',color:'var(--text2)',fontSize:11,fontWeight:600}}>
                          {s}
                        </button>
                      ))}
                    </div>
                  )}
                  {loading&&<div style={{textAlign:'center',padding:20,fontSize:13,color:'var(--text3)'}}>Searching…</div>}
                  {results.length>0&&(
                    <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:8}}>
                      {results.map((url,i)=>(
                        <div key={i} onClick={()=>pickImage(url)}
                          style={{borderRadius:'var(--r-sm)',overflow:'hidden',cursor:'pointer',border:'2px solid transparent',transition:'border-color .15s',aspectRatio:'3/2'}}
                          onMouseOver={e=>e.currentTarget.style.borderColor='var(--blue)'}
                          onMouseOut={e=>e.currentTarget.style.borderColor='transparent'}>
                          <img src={url} alt="" style={{width:'100%',height:'100%',objectFit:'cover',display:'block'}}
                            onError={e=>{e.currentTarget.parentNode.style.display='none';}}/>
                        </div>
                      ))}
                    </div>
                  )}
                  {tab==='unsplash'&&results.length===0&&!loading&&(
                    <div style={{textAlign:'center',fontSize:10,color:'var(--text4)',marginTop:8}}>Photos from Unsplash</div>
                  )}
                  {tab==='gif'&&results.length===0&&!loading&&(
                    <div style={{textAlign:'center',fontSize:10,color:'var(--text4)',marginTop:8}}>GIFs powered by GIPHY</div>
                  )}
                </>
              )}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─ Meals ─
function Meals(){
  const key=`meals_${todayKey()}`;
  const def={breakfast:'',lunch:'',dinner:'',snack:''};
  const [meals,setMeals]=useState(LS.get(key,def));
  const upd=(f,v)=>{const n={...meals,[f]:v};setMeals(n);LS.set(key,n);};
  const list=[
    {key:'breakfast',label:'Breakfast',emoji:'🍳',lifeAdminKey:'Breakfast'},
    {key:'lunch',label:'Lunch',emoji:'🥗',lifeAdminKey:'Lunch'},
    {key:'dinner',label:'Dinner',emoji:'🍽️',lifeAdminKey:'Dinner'},
    {key:'snack',label:'Snack',emoji:'🍎',lifeAdminKey:'Snack'},
  ];
  const getLifeAdminMeal=(mealName)=>{
    const laKey=`meal_${todayKey()}_${mealName}`;
    return LS.get(laKey,'');
  };
  return(
    <div className="card">
      <div className="clabel">Meal Tracker</div>
      <div style={{display:'flex',flexDirection:'column',gap:8}}>
        {list.map(m=>{
          const lifeAdminMeal=getLifeAdminMeal(m.lifeAdminKey);
          const displayValue=meals[m.key]||lifeAdminMeal;
          return(
            <div key={m.key} style={{display:'flex',alignItems:'center',gap:8}}>
              <div style={{width:30,height:30,borderRadius:'var(--r-sm)',background:'var(--bg)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:15,flexShrink:0,border:'1px solid var(--border2)'}}>
                {m.emoji}
              </div>
              <div style={{flex:1}}>
                <div style={{fontSize:10,fontWeight:700,color:'var(--text3)',letterSpacing:'0.4px',textTransform:'uppercase',marginBottom:2}}>{m.label}</div>
                <input value={meals[m.key]} onChange={e=>upd(m.key,e.target.value)} placeholder={lifeAdminMeal?`${lifeAdminMeal} (from Life Admin)`:displayValue?displayValue:'What did you eat?'}
                  style={{width:'100%',padding:'5px 8px',borderRadius:'var(--r-sm)',border:`1px solid ${displayValue?'var(--blue)':'var(--border)'}`,fontSize:12,color:'var(--text)',background:displayValue?'var(--blue-light)':'var(--bg)',outline:'none',transition:'all 0.2s'}}/>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function gDrawEcheveria(stage,uid,cx=60,soil=151){if(stage===0)return'';const counts=[0,4,6,8,10,13][stage],r=[0,10,16,24,32,42][stage],cy=soil-r*.15,cols=['#3D8F7C','#4FA888','#6DBD9E','#8DCFB0','#A8DFCA'];let s=`<defs><radialGradient id="ec${uid}" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#C8EDDB"/><stop offset="100%" stop-color="#2A7060"/></radialGradient></defs>`;for(let i=counts-1;i>=0;i--){const a=(360/counts)*i-90,rad=a*Math.PI/180,tip={x:cx+Math.cos(rad)*r,y:cy+Math.sin(rad)*r*.72},b1={x:cx+Math.cos(rad-.55)*r*.5,y:cy+Math.sin(rad-.55)*r*.36},b2={x:cx+Math.cos(rad+.55)*r*.5,y:cy+Math.sin(rad+.55)*r*.36},col=cols[i%cols.length];s+=`<defs><linearGradient id="ep${uid}_${i}" x1="${cx}" y1="${cy}" x2="${tip.x}" y2="${tip.y}" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#2A7060"/><stop offset="100%" stop-color="${col}"/></linearGradient></defs><path d="M${cx},${cy} C${b1.x},${b1.y} ${tip.x-.5},${tip.y+1} ${tip.x},${tip.y} C${tip.x+.5},${tip.y-1} ${b2.x},${b2.y} ${cx},${cy}" fill="url(#ep${uid}_${i})" opacity="${.82+.06*(i%2)}"/>`;}s+=`<circle cx="${cx}" cy="${cy}" r="${r*.18}" fill="url(#ec${uid})"/>`;if(stage>=5)s+=`<line x1="${cx+r*.6}" y1="${cy-r*.3}" x2="${cx+r*.6}" y2="${cy-r*1.4}" stroke="#5A9A5A" stroke-width="1.5"/><circle cx="${cx+r*.6}" cy="${cy-r*1.4}" r="${r*.18}" fill="#FF8FAB"/>`;return s;}

function gDrawCactus(stage,uid,cx=60,soil=151){if(stage===0)return'';const h=[0,14,28,52,78,108][stage],w=[0,7,10,13,14,15][stage],top=soil-h;let s=`<defs><linearGradient id="cg${uid}" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#1E5C30"/><stop offset="30%" stop-color="#2E7D42"/><stop offset="60%" stop-color="#3D9A52"/><stop offset="100%" stop-color="#1A4D28"/></linearGradient><linearGradient id="cv${uid}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="rgba(255,255,255,.12)"/><stop offset="100%" stop-color="rgba(0,0,0,.06)"/></linearGradient></defs><rect x="${cx-w}" y="${top}" width="${w*2}" height="${h}" rx="${w}" fill="url(#cg${uid})"/><rect x="${cx-w}" y="${top}" width="${w*2}" height="${h}" rx="${w}" fill="url(#cv${uid})"/>`;for(let i=-1;i<=1;i++)s+=`<line x1="${cx+i*w*.45}" y1="${top+4}" x2="${cx+i*w*.45}" y2="${soil-2}" stroke="rgba(255,255,255,.12)" stroke-width="1.2"/>`;if(stage>=2)for(let y=top+10;y<soil-8;y+=10){s+=`<line x1="${cx-w}" y1="${y}" x2="${cx-w-5}" y2="${y-2}" stroke="#C8E0B8" stroke-width=".7"/><line x1="${cx+w}" y1="${y}" x2="${cx+w+5}" y2="${y-2}" stroke="#C8E0B8" stroke-width=".7"/>`;}if(stage>=4){const ay=top+h*.3,ah=h*.4;s+=`<path d="M${cx-w+1},${ay} Q${cx-w*3},${ay+4} ${cx-w*3},${ay-ah}" stroke="url(#cg${uid})" stroke-width="${w*1.6}" fill="none" stroke-linecap="round"/>`;if(stage>=5)s+=`<path d="M${cx+w-1},${ay+12} Q${cx+w*3},${ay+16} ${cx+w*3},${ay+12-ah*.8}" stroke="url(#cg${uid})" stroke-width="${w*1.5}" fill="none" stroke-linecap="round"/>`;}if(stage>=5){for(let i=0;i<6;i++){const a=(i*60-90)*Math.PI/180;s+=`<ellipse cx="${cx+Math.cos(a)*8}" cy="${top-5+Math.sin(a)*8}" rx="4.5" ry="3" transform="rotate(${i*60},${cx+Math.cos(a)*8},${top-5+Math.sin(a)*8})" fill="${['#FFB3C1','#FF8FA3','#FF6F91'][i%3]}" opacity=".9"/>`;}s+=`<circle cx="${cx}" cy="${top-5}" r="4" fill="#FFD60A"/>`;}return s;}

function gDrawAloe(stage,uid,cx=60,soil=151){if(stage===0)return'';const count=[0,2,3,5,6,8][stage],h=[0,20,32,48,62,78][stage];let s=`<defs><linearGradient id="ag${uid}" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#4A7A5A"/><stop offset="50%" stop-color="#6A9E72"/><stop offset="100%" stop-color="#3D6A4A"/></linearGradient></defs>`;for(let i=0;i<count;i++){const side=i%2===0?-1:1,spread=Math.floor(i/2),angle=side*(25+spread*18),rad=angle*Math.PI/180,lh=h*(.7+spread*.1),tx=cx+Math.sin(rad)*lh,ty=soil-Math.cos(rad)*lh,mx=cx+Math.sin(rad)*lh*.5+side*lh*.12,my=soil-Math.cos(rad)*lh*.5;s+=`<path d="M${cx},${soil} Q${mx},${my} ${tx},${ty}" stroke="url(#ag${uid})" stroke-width="${Math.max(3,7-spread*1.2)}" fill="none" stroke-linecap="round"/>`;for(let t=.3;t<.9;t+=.18){const sx=cx+(tx-cx)*t,sy=soil+(ty-soil)*t,nr=-Math.cos(rad)*2.5,nt=Math.sin(rad)*2.5;s+=`<circle cx="${sx+nr}" cy="${sy+nt}" r="1" fill="#B8D8BA" opacity=".6"/>`; }}if(stage>=5){s+=`<line x1="${cx}" y1="${soil-h*1.15}" x2="${cx}" y2="${soil-h}" stroke="#5A9A5A" stroke-width="2"/>`;for(let i=0;i<5;i++){const a=soil-h*1.15-i*4;s+=`<ellipse cx="${cx}" cy="${a}" rx="3.5" ry="1.8" fill="#F4A340"/>`;}}return s;}

function gDrawMonstera(stage,uid,cx=60,soil=151){if(stage===0)return'';const lcount=[0,1,1,2,3,4][stage],sz=[0,.4,.6,.75,.88,1][stage];let s=`<defs><radialGradient id="mg${uid}" cx="40%" cy="35%" r="60%"><stop offset="0%" stop-color="#52B788"/><stop offset="100%" stop-color="#1B4332"/></radialGradient><filter id="mf${uid}"><feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity=".15"/></filter></defs>`;const configs=[{dx:-14,dy:-55,rot:-20},{dx:16,dy:-72,rot:18},{dx:-18,dy:-85,rot:-28},{dx:20,dy:-95,rot:22}];for(let li=0;li<lcount;li++){const cf=configs[li]||configs[0],R=sz*45,lx=cx+cf.dx*sz,ly=soil+cf.dy*sz;s+=`<line x1="${cx}" y1="${soil}" x2="${lx}" y2="${ly+R*.35}" stroke="#2D5A27" stroke-width="${2*sz}"/><g transform="rotate(${cf.rot},${lx},${ly})" filter="url(#mf${uid})"><path d="M${lx},${ly} C${lx-R*.7},${ly-R*.3} ${lx-R*.9},${ly-R*.9} ${lx},${ly-R*1.1} C${lx+R*.9},${ly-R*.9} ${lx+R*.7},${ly-R*.3} ${lx},${ly}" fill="url(#mg${uid})" opacity=".95"/>`;if(stage>=3){s+=`<path d="M${lx-R*.55},${ly-R*.55} C${lx-R*.45},${ly-R*.7} ${lx-R*.25},${ly-R*.72} ${lx-R*.15},${ly-R*.58} C${lx-R*.25},${ly-R*.44} ${lx-R*.45},${ly-R*.42} ${lx-R*.55},${ly-R*.55}" fill="rgba(15,28,46,.08)"/><path d="M${lx+R*.15},${ly-R*.58} C${lx+R*.25},${ly-R*.72} ${lx+R*.45},${ly-R*.72} ${lx+R*.55},${ly-R*.58} C${lx+R*.45},${ly-R*.44} ${lx+R*.25},${ly-R*.42} ${lx+R*.15},${ly-R*.58}" fill="rgba(15,28,46,.08)"/>`;}s+=`<line x1="${lx}" y1="${ly}" x2="${lx}" y2="${ly-R*1.05}" stroke="rgba(255,255,255,.2)" stroke-width="${1.2*sz}"/></g>`;}return s;}

function gDrawSnakePlant(stage,uid,cx=60,soil=151){if(stage===0)return'';const counts=[0,2,3,4,5,6][stage],h=[0,28,48,68,88,108][stage];let s=`<defs><linearGradient id="sg${uid}" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#1A3A1A"/><stop offset="25%" stop-color="#2D5A27"/><stop offset="75%" stop-color="#3A6E34"/><stop offset="100%" stop-color="#1A3A1A"/></linearGradient></defs>`;for(let i=0;i<counts;i++){const side=(i%2===0?-1:1)*(1+Math.floor(i/2)*.35),lh=h*(.8+Math.floor(i/2)*.08),lw=Math.max(5,10-Math.floor(i/2)*1.5),ox=side*lw*.9;s+=`<path d="M${cx+ox*.4},${soil} Q${cx+ox*1.2},${soil-lh*.5} ${cx+ox},${soil-lh}" stroke="url(#sg${uid})" stroke-width="${lw*2}" fill="none" stroke-linecap="round"/>`;for(let b=.2;b<.9;b+=.14){const bx=cx+ox+(cx+ox*1.2-cx-ox*.4)*(b-.5),by=soil-lh*b;s+=`<line x1="${bx-lw}" y1="${by}" x2="${bx+lw}" y2="${by}" stroke="#8FB98A" stroke-width=".8" opacity=".5"/>`;}s+=`<path d="M${cx+ox*.4},${soil} Q${cx+ox*1.2},${soil-lh*.5} ${cx+ox},${soil-lh}" stroke="#C9A84C" stroke-width=".8" fill="none" stroke-linecap="round" opacity=".7"/>`;}return s;}

function gDrawLavender(stage,uid,cx=60,soil=151){if(stage===0)return'';const stems=[0,2,3,5,7,9][stage],h=[0,28,44,60,76,90][stage];let s='';for(let i=0;i<stems;i++){const ox=(i-(stems-1)/2)*9,sway=Math.sin(i*1.3)*5,sx=cx+ox,ex=sx+sway;s+=`<path d="M${sx},${soil} Q${(sx+ex)/2},${soil-h*.5} ${ex},${soil-h}" stroke="#7A8C7A" stroke-width="1.5" fill="none"/>`;if(stage>=2)for(let l=.25;l<.6;l+=.2){const lx=sx+(ex-sx)*l,ly=soil-(soil-(soil-h))*l;s+=`<ellipse cx="${lx-3}" cy="${ly}" rx="3" ry="1.2" transform="rotate(-25,${lx-3},${ly})" fill="#8FA882" opacity=".8"/><ellipse cx="${lx+3}" cy="${ly}" rx="3" ry="1.2" transform="rotate(25,${lx+3},${ly})" fill="#8FA882" opacity=".8"/>`;}if(stage>=2){const spk=Math.min(h*.35,28);for(let f=0;f<5;f++){const fy=soil-h+f*spk/5,fc=f/4;s+=`<ellipse cx="${ex}" cy="${fy}" rx="${3.5-fc*.5}" ry="2.8" fill="${['#7B5EA7','#8B6BB7','#9B7BC7','#AB8BD7','#C8A8E8'][f]}" opacity="${.95-fc*.15}"/>`;} }}return s;}

function gDrawSunflower(stage,uid,cx=60,soil=151){if(stage===0)return'';const h=[0,20,38,58,78,100][stage];let s=`<defs><radialGradient id="sfcg${uid}" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#8B5E3C"/><stop offset="60%" stop-color="#5D3A1A"/><stop offset="100%" stop-color="#3A2008"/></radialGradient><linearGradient id="sfsg${uid}" x1="0" y1="1" x2="0" y2="0"><stop offset="0%" stop-color="#2E5A28"/><stop offset="100%" stop-color="#4A8C3A"/></linearGradient></defs><path d="M${cx},${soil} Q${cx-4},${soil-h*.5} ${cx},${soil-h}" stroke="url(#sfsg${uid})" stroke-width="${stage>=3?4:3}" fill="none"/>`;if(stage>=2){s+=`<path d="M${cx-3},${soil-h*.45} Q${cx-18},${soil-h*.55} ${cx-14},${soil-h*.35}" stroke="#4A8C3A" stroke-width="2.5" fill="none" stroke-linecap="round"/>`;if(stage>=3)s+=`<path d="M${cx+3},${soil-h*.62} Q${cx+18},${soil-h*.72} ${cx+14},${soil-h*.52}" stroke="#4A8C3A" stroke-width="2.5" fill="none" stroke-linecap="round"/>`;}if(stage>=3){const pcount=stage>=5?16:12,cr=stage>=5?14:11,pr=stage>=5?24:18;for(let i=0;i<pcount;i++){const a=(360/pcount*i-90)*Math.PI/180;s+=`<ellipse cx="${cx+Math.cos(a)*(cr+pr/2)}" cy="${soil-h+Math.sin(a)*(cr+pr/2)}" rx="${stage>=5?6:5}" ry="${pr/2}" transform="rotate(${360/pcount*i},${cx+Math.cos(a)*(cr+pr/2)},${soil-h+Math.sin(a)*(cr+pr/2)})" fill="${i%2===0?'#F4B942':'#D4921A'}" opacity=".92"/>"`;}s+=`<circle cx="${cx}" cy="${soil-h}" r="${cr}" fill="url(#sfcg${uid})"/>`;if(stage>=4)for(let di=0;di<24;di++){const da=di*15*Math.PI/180,dr=cr*(.3+.35*(di%3)/2);s+=`<circle cx="${cx+Math.cos(da)*dr}" cy="${soil-h+Math.sin(da)*dr}" r=".9" fill="#2A1008" opacity=".7"/>`; }}else s+=`<circle cx="${cx}" cy="${soil-h}" r="${stage>=2?5:3}" fill="#4A8C3A"/>`;return s;}

function gDrawOak(stage,uid,cx=60,soil=151){if(stage===0)return'';const h=[0,18,34,55,78,105][stage],tw=[0,3,5,7,9,11][stage],cr=[0,0,14,24,36,50][stage];let s=`<defs><radialGradient id="okg${uid}" cx="45%" cy="35%" r="55%"><stop offset="0%" stop-color="#52A84A"/><stop offset="55%" stop-color="#2E7D32"/><stop offset="100%" stop-color="#1B4332"/></radialGradient><linearGradient id="otg${uid}" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#4A3220"/><stop offset="40%" stop-color="#6D4C2A"/><stop offset="100%" stop-color="#3A2818"/></linearGradient><filter id="okf${uid}"><feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity=".12"/></filter></defs><path d="M${cx-tw},${soil} Q${cx-tw*.6},${soil-h*.5} ${cx-tw*.4},${soil-h} L${cx+tw*.4},${soil-h} Q${cx+tw*.6},${soil-h*.5} ${cx+tw},${soil} Z" fill="url(#otg${uid})"/>`;if(stage>=3)for(let y=soil-h*.2;y>soil-h*.9;y-=14)s+=`<path d="M${cx-tw*.8},${y} Q${cx},${y-3} ${cx+tw*.8},${y}" stroke="rgba(0,0,0,.2)" stroke-width=".8" fill="none"/>`;if(cr>0){const cy2=soil-h+cr*.25,clusters=stage>=4?5:3;for(let i=0;i<clusters;i++){const ca=(i/(clusters-1)-.5)*Math.PI*.8,ccx=cx+Math.sin(ca)*cr*.45,ccy=cy2-Math.cos(ca)*cr*.2,cr2=cr*(.55+Math.cos(ca+.3)*.15);s+=`<ellipse cx="${ccx}" cy="${ccy}" rx="${cr2*.9}" ry="${cr2*.78}" fill="url(#okg${uid})" opacity=".93" filter="url(#okf${uid})"/>`;}s+=`<ellipse cx="${cx}" cy="${cy2-cr*.1}" rx="${cr*.7}" ry="${cr*.65}" fill="url(#okg${uid})"/>`;}return s;}

function gDrawCherry(stage,uid,cx=60,soil=151){if(stage===0)return'';const h=[0,20,36,58,80,108][stage],tw=[0,2,3,5,7,9][stage];let s=`<defs><linearGradient id="ctg${uid}" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#5D4037"/><stop offset="50%" stop-color="#795548"/><stop offset="100%" stop-color="#4A3020"/></linearGradient><radialGradient id="cbg${uid}" cx="50%" cy="40%" r="55%"><stop offset="0%" stop-color="#FCEAEF"/><stop offset="65%" stop-color="#F8BBD0"/><stop offset="100%" stop-color="#F48FB1"/></radialGradient><filter id="cf${uid}"><feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity=".1"/></filter></defs><path d="M${cx-tw},${soil} Q${cx-tw*1.5},${soil-h*.6} ${cx},${soil-h}" stroke="url(#ctg${uid})" stroke-width="${tw*2}" fill="none" stroke-linecap="round"/>`;if(stage>=3){s+=`<path d="M${cx},${soil-h*.65} Q${cx-18},${soil-h*.72} ${cx-20},${soil-h*.9}" stroke="url(#ctg${uid})" stroke-width="${tw*1.4}" fill="none" stroke-linecap="round"/>`;if(stage>=4)s+=`<path d="M${cx},${soil-h*.72} Q${cx+16},${soil-h*.8} ${cx+18},${soil-h}" stroke="url(#ctg${uid})" stroke-width="${tw*1.2}" fill="none" stroke-linecap="round"/>`;}if(stage>=3){const clusters=[[cx,soil-h],[cx-18,soil-h*.88],[cx+16,soil-h*.95],[cx-8,soil-h*1.02],[cx+8,soil-h*.82]].slice(0,Math.min(stage,5));clusters.forEach(([bx,by])=>{const br=12+stage*2;s+=`<ellipse cx="${bx}" cy="${by}" rx="${br}" ry="${br*.85}" fill="url(#cbg${uid})" opacity=".9" filter="url(#cf${uid})"/>`;for(let p=0;p<5;p++){const pa=(p*72-90)*Math.PI/180;s+=`<ellipse cx="${bx+Math.cos(pa)*br*.5}" cy="${by+Math.sin(pa)*br*.5}" rx="${br*.38}" ry="${br*.28}" fill="rgba(255,255,255,.25)" opacity=".7"/>"`; }});}else s+=`<circle cx="${cx}" cy="${soil-h}" r="${stage===2?5:3}" fill="#F8BBD0"/>`;return s;}

function gDrawLemon(stage,uid,cx=60,soil=151){if(stage===0)return'';const h=[0,18,34,55,76,102][stage],tw=[0,2,3,5,7,9][stage];let s=`<defs><radialGradient id="ltg${uid}" cx="45%" cy="35%" r="55%"><stop offset="0%" stop-color="#66BB6A"/><stop offset="60%" stop-color="#388E3C"/><stop offset="100%" stop-color="#1B5E20"/></radialGradient><linearGradient id="ltr${uid}" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#5D4037"/><stop offset="50%" stop-color="#795548"/><stop offset="100%" stop-color="#4A3020"/></linearGradient><radialGradient id="lemg${uid}" cx="35%" cy="30%" r="65%"><stop offset="0%" stop-color="#FFF176"/><stop offset="100%" stop-color="#F9A825"/></radialGradient></defs><path d="M${cx-tw},${soil} Q${cx-tw*.5},${soil-h*.55} ${cx},${soil-h*.85}" stroke="url(#ltr${uid})" stroke-width="${tw*2}" fill="none" stroke-linecap="round"/>`;if(stage>=3){s+=`<path d="M${cx},${soil-h*.6} Q${cx-15},${soil-h*.65} ${cx-16},${soil-h*.82}" stroke="url(#ltr${uid})" stroke-width="${tw*1.3}" fill="none" stroke-linecap="round"/><path d="M${cx},${soil-h*.7} Q${cx+14},${soil-h*.76} ${cx+14},${soil-h*.92}" stroke="url(#ltr${uid})" stroke-width="${tw*1.1}" fill="none" stroke-linecap="round"/>`;}const cr=[0,0,10,18,27,38][stage];if(cr>0){s+=`<ellipse cx="${cx}" cy="${soil-h+cr*.25}" rx="${cr*1.05}" ry="${cr*.88}" fill="url(#ltg${uid})"/>`;if(stage>=4){s+=`<ellipse cx="${cx-cr*.4}" cy="${soil-h-cr*.05}" rx="${cr*.75}" ry="${cr*.65}" fill="url(#ltg${uid})" opacity=".88"/><ellipse cx="${cx+cr*.35}" cy="${soil-h}" rx="${cr*.7}" ry="${cr*.6}" fill="url(#ltg${uid})" opacity=".88"/>`;}}if(stage>=4){const lems=stage>=5?4:2,lp=[[cx-cr*.4,soil-h-cr*.15],[cx+cr*.3,soil-h-cr*.1],[cx-cr*.1,soil-h-cr*.3],[cx+cr*.5,soil-h-cr*.25]].slice(0,lems);lp.forEach(([lx,ly])=>{s+=`<ellipse cx="${lx}" cy="${ly}" rx="5" ry="4" fill="url(#lemg${uid})" opacity=".95"/><ellipse cx="${lx}" cy="${ly}" rx="1.5" ry="1" fill="rgba(255,255,255,.35)"/>`;});}return s;}

function gDrawPlant(type,stage,uid,cx=60,soil=151){switch(type){case'echeveria':return gDrawEcheveria(stage,uid,cx,soil);case'cactus':return gDrawCactus(stage,uid,cx,soil);case'aloe':return gDrawAloe(stage,uid,cx,soil);case'monstera':return gDrawMonstera(stage,uid,cx,soil);case'snakeplant':return gDrawSnakePlant(stage,uid,cx,soil);case'lavender':return gDrawLavender(stage,uid,cx,soil);case'sunflower':return gDrawSunflower(stage,uid,cx,soil);case'oak':return gDrawOak(stage,uid,cx,soil);case'cherry':return gDrawCherry(stage,uid,cx,soil);case'lemon':return gDrawLemon(stage,uid,cx,soil);default:return'';}}

const GARDEN_PLANT_TYPES=[
  {id:'echeveria',name:'Echeveria',cat:'Succulent'},{id:'cactus',name:'Cactus',cat:'Succulent'},{id:'aloe',name:'Aloe Vera',cat:'Succulent'},
  {id:'monstera',name:'Monstera',cat:'Houseplant'},{id:'snakeplant',name:'Snake Plant',cat:'Houseplant'},
  {id:'lavender',name:'Lavender',cat:'Flowering'},{id:'sunflower',name:'Sunflower',cat:'Flowering'},
  {id:'oak',name:'Oak Tree',cat:'Tree'},{id:'cherry',name:'Cherry Blossom',cat:'Tree'},{id:'lemon',name:'Lemon Tree',cat:'Tree'},
];

function Garden(){
  const {useState,useCallback}=React;
  const streak=LS.get('peakly_streak',0);
  const [gardenData,setGardenData]=useState(()=>gardenGetData());
  const [picking,setPicking]=useState(false);

  const refresh=()=>{
    const g=gardenGetData();
    const today=new Date().toISOString().split('T')[0];
    const lastDate=LS.get('garden_last_check','');
    const lastStreak=LS.get('garden_last_streak',-1);
    if(lastDate&&lastDate<today){
      const broke=(lastStreak>0&&streak===0);
      g.plants.forEach(p=>{broke?p.stage=Math.max(0,p.stage-1):p.stage=Math.min(5,gardenStreakToStage(streak));});
      gardenSaveData(g);
    }
    LS.set('garden_last_check',today);LS.set('garden_last_streak',streak);
    return g;
  };

  const [gd,setGd]=useState(()=>refresh());
  const isWindowsill=gd.view==='windowsill';
  const plants=gd.plants||[];

  const setView=v=>{const g=gardenGetData();g.view=v;gardenSaveData(g);setGd({...g});};
  const addPlant=type=>{
    const g=gardenGetData();
    g.plants.push({id:'p'+Date.now(),type,stage:gardenStreakToStage(streak),lastDate:new Date().toISOString().split('T')[0]});
    gardenSaveData(g);setGd({...g});setPicking(false);
  };

  const W=270,H=180;
  const sillY=Math.round(H*.82);
  const soilY=Math.round(H*.66);

  const windowsillSvg=()=>{
    const spacing=plants.length?Math.min(90,W/(plants.length+.4)):W*.5;
    const startX=plants.length?(W-spacing*(plants.length-1))*.5:W*.5;
    let inner=plants.length===0
      ?`${gSvgPot('emp0',W*.5,sillY)}<text x="${W*.5}" y="${sillY-68}" text-anchor="middle" fill="#A8C0D8" font-size="9" font-family="system-ui">Add your first plant ↓</text>`
      :plants.map((p,i)=>`${gSvgPot(`hw${i}`,startX+i*spacing,sillY)}${gDrawPlant(p.type,p.stage||0,`hw${i}`,startX+i*spacing,sillY-45)}`).join('');
    return`<svg viewBox="0 0 ${W} ${H}" style="width:100%;border-radius:10px;overflow:hidden;">
      <defs><linearGradient id="hsky" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#DDEEFF"/><stop offset="100%" stop-color="#F0F8FF"/></linearGradient><linearGradient id="hwoodh" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#C8A87A"/><stop offset="100%" stop-color="#A8885A"/></linearGradient><radialGradient id="hlightg" cx="50%" cy="0%" r="80%"><stop offset="0%" stop-color="rgba(255,255,240,.28)"/><stop offset="100%" stop-color="rgba(255,255,255,0)"/></radialGradient></defs>
      <rect width="${W}" height="${H}" fill="url(#hsky)"/>
      <line x1="${W*.5}" y1="0" x2="${W*.5}" y2="${H*.82}" stroke="rgba(255,255,255,.65)" stroke-width="6"/>
      <line x1="0" y1="${H*.42}" x2="${W}" y2="${H*.42}" stroke="rgba(255,255,255,.65)" stroke-width="5"/>
      <rect width="${W}" height="${H*.8}" fill="url(#hlightg)"/>
      <rect x="0" y="${H*.82}" width="${W}" height="${H*.18}" fill="url(#hwoodh)"/>
      <rect x="0" y="${H*.82}" width="${W}" height="2" fill="rgba(255,255,255,.4)"/>
      ${inner}</svg>`;
  };

  const gardenBedSvg=()=>{
    const spacing=plants.length?Math.min(80,(W-40)/(plants.length+.4)):(W-40)*.5;
    const startX=plants.length?(W-spacing*(plants.length-1))*.5:W*.5;
    const stones=[0,1,2,3,4,5].map(i=>`<ellipse cx="${28+i*46}" cy="${H*.635}" rx="16" ry="7" fill="#9E9E9E" opacity=".55"/><ellipse cx="${28+i*46}" cy="${H*.635}" rx="13" ry="5.5" fill="#BDBDBD" opacity=".45"/>`).join('');
    let inner=plants.length===0
      ?`<text x="${W*.5}" y="${soilY+35}" text-anchor="middle" fill="#C8A880" font-size="9" font-family="system-ui">Add your first plant ↓</text>`
      :plants.map((p,i)=>`<ellipse cx="${startX+i*spacing}" cy="${soilY}" rx="15" ry="4" fill="#3D2008" opacity=".6"/>${gDrawPlant(p.type,p.stage||0,`hgb${i}`,startX+i*spacing,soilY)}`).join('');
    return`<svg viewBox="0 0 ${W} ${H}" style="width:100%;border-radius:10px;overflow:hidden;">
      <defs><linearGradient id="hgbsky" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#C8E8F8"/><stop offset="100%" stop-color="#E8F4FF"/></linearGradient><linearGradient id="hgbgrass" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#6DBF6A"/><stop offset="100%" stop-color="#4A9A48"/></linearGradient><linearGradient id="hgbsoil" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#6B4423"/><stop offset="100%" stop-color="#4A2E12"/></linearGradient></defs>
      <rect width="${W}" height="${H}" fill="url(#hgbsky)"/>
      <rect x="0" y="${H*.55}" width="${W}" height="${H*.1}" fill="url(#hgbgrass)"/>
      <rect x="14" y="${H*.62}" width="${W-28}" height="${H*.36}" rx="6" fill="url(#hgbsoil)"/>
      <rect x="14" y="${H*.62}" width="${W-28}" height="2" rx="1" fill="rgba(255,255,255,.1)"/>
      ${stones}${inner}</svg>`;
  };

  const firstPlant=plants[0];

  return(
    <div className="card" style={{padding:'12px 14px'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
        <div className="clabel" style={{marginBottom:0}}>🌿 My Garden</div>
        <div style={{display:'flex',gap:5}}>
          <button onClick={()=>setView('windowsill')} style={{padding:'3px 9px',borderRadius:6,fontSize:10,fontWeight:700,cursor:'pointer',border:`1.5px solid ${isWindowsill?'var(--blue)':'var(--border2)'}`,background:isWindowsill?'var(--blue-light)':'transparent',color:isWindowsill?'var(--blue)':'var(--text4)'}}>🪟</button>
          <button onClick={()=>setView('garden')} style={{padding:'3px 9px',borderRadius:6,fontSize:10,fontWeight:700,cursor:'pointer',border:`1.5px solid ${!isWindowsill?'var(--blue)':'var(--border2)'}`,background:!isWindowsill?'var(--blue-light)':'transparent',color:!isWindowsill?'var(--blue)':'var(--text4)'}}>🌱</button>
        </div>
      </div>

      <div dangerouslySetInnerHTML={{__html:isWindowsill?windowsillSvg():gardenBedSvg()}}/>

      {firstPlant&&<div style={{fontSize:10,color:'var(--text3)',textAlign:'center',marginTop:5}}>
        <span style={{fontWeight:700,color:'var(--text2)'}}>{GARDEN_PLANT_TYPES.find(t=>t.id===firstPlant.type)?.name}</span>
        {' · '}{GARDEN_STAGE_NAMES[firstPlant.stage||0]}{' · '}{streak} day streak
      </div>}

      {plants.length<6&&<button onClick={()=>setPicking(true)} style={{width:'100%',marginTop:8,padding:'7px',borderRadius:8,border:'1.5px dashed var(--border)',background:'transparent',color:'var(--text3)',fontSize:11,fontWeight:600,cursor:'pointer'}}>+ Add a plant</button>}

      {picking&&<div style={{position:'fixed',inset:0,background:'rgba(15,28,46,.5)',zIndex:200,display:'flex',alignItems:'center',justifyContent:'center',padding:16}} onClick={e=>{if(e.target===e.currentTarget)setPicking(false);}}>
        <div style={{background:'var(--white)',borderRadius:18,width:'100%',maxWidth:420,maxHeight:'85vh',overflowY:'auto',boxShadow:'0 24px 64px rgba(15,28,46,.2)'}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'16px 18px 12px',borderBottom:'1px solid var(--border2)'}}>
            <div style={{fontFamily:'var(--font-display)',fontSize:15,fontWeight:700}}>Choose your plant</div>
            <button onClick={()=>setPicking(false)} style={{fontSize:20,color:'var(--text4)',background:'none',border:'none',cursor:'pointer'}}>×</button>
          </div>
          <div style={{padding:'12px 16px 16px',display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:8}}>
            {GARDEN_PLANT_TYPES.map(pt=>(
              <button key={pt.id} onClick={()=>addPlant(pt.id)} style={{border:'1px solid var(--border2)',borderRadius:10,padding:'10px 6px 8px',background:'var(--bg)',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:3,transition:'all .15s'}}
                onMouseOver={e=>{e.currentTarget.style.borderColor='var(--blue)';e.currentTarget.style.background='var(--blue-light)';}}
                onMouseOut={e=>{e.currentTarget.style.borderColor='var(--border2)';e.currentTarget.style.background='var(--bg)';}}>
                <div dangerouslySetInnerHTML={{__html:`<svg viewBox="0 0 120 200" width="52" height="86">${gSvgPot('pk'+pt.id)}${gDrawPlant(pt.id,4,'pk'+pt.id)}</svg>`}}/>
                <div style={{fontSize:11,fontWeight:700,color:'var(--text)'}}>{pt.name}</div>
                <div style={{fontSize:9,color:'var(--text3)'}}>{pt.cat}</div>
              </button>
            ))}
          </div>
        </div>
      </div>}
    </div>
  );
}

// ─ Water ─
function Water({water,setWater}){
  return(
    <div className="card">
      <div className="clabel">Water Tracker</div>
      <div style={{display:'flex',alignItems:'center',gap:3,flexWrap:'wrap',marginBottom:8}}>
        {Array.from({length:8},(_,i)=>(
          <button key={i} onClick={()=>setWater(i<water?i:i+1)}
            style={{width:28,height:34,padding:0,border:'none',background:'none',cursor:'pointer',transition:'transform 0.15s',transform:i<water?'scale(1.1)':'scale(1)'}}>
            <svg viewBox="0 0 20 28" width="28" height="34">
              <path d="M4 9 L3 25 Q3 27 5 27 L15 27 Q17 27 17 25 L16 9 Q13 4 10 2 Q7 4 4 9Z"
                fill={i<water?'#1A5FA8':'#E8EFF8'} stroke={i<water?'#0F3D6E':'#D4E0EE'} strokeWidth="0.6"/>
              {i<water&&<path d="M7 20 Q10 18 13 20" fill="none" stroke="rgba(255,255,255,0.4)" strokeWidth="1.2" strokeLinecap="round"/>}
            </svg>
          </button>
        ))}
        <span style={{fontSize:12,color:'var(--text3)',marginLeft:4,fontWeight:600}}>{water}/8</span>
      </div>
      <Bar pct={water/8*100} color='var(--blue)' h={5}/>
    </div>
  );
}

function TopPriorities(){
  const {useState,useEffect}=React;
  const tk=todayKey();
  const storageKey='top_priorities_'+tk;
  const [items,setItems]=useState(()=>LS.get(storageKey,['','','']));
  const save=(idx,val)=>{
    const next=[...items];next[idx]=val;
    setItems(next);LS.set(storageKey,next);
  };
  const [done,setDone]=useState(()=>LS.get('top_priorities_done_'+tk,[false,false,false]));
  const toggleDone=(idx)=>{
    const next=[...done];next[idx]=!next[idx];
    setDone(next);LS.set('top_priorities_done_'+tk,next);
  };
  const allDone=done.every((d,i)=>d||!items[i].trim());
  return(
    <div className="card">
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
        <div className="clabel" style={{marginBottom:0}}>🎯 Top 3 Priorities</div>
        {allDone&&items.some(x=>x.trim())&&<span style={{fontSize:10,color:'var(--green)',fontWeight:700}}>All done ✓</span>}
      </div>
      {[0,1,2].map(i=>(
        <div key={i} style={{display:'flex',alignItems:'center',gap:8,marginBottom:7}}>

            {done[i]&&items[i].trim()&&<svg width="9" height="7" viewBox="0 0 9 7"><path d="M1 3.5l2.5 2.5L8 1" stroke="white" strokeWidth="1.8" fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg>}
          </button>

            value={items[i]}
            onChange={e=>save(i,e.target.value)}
            placeholder={['Most important task today','Second priority','Third priority'][i]}

          />

      ))}

  );
}

// ─ Goals + Habits (left) ─
function GoalList({goals,onToggle}){
  const now=new Date();
  const {useState:useSt,useEffect:useEff,useRef:useRf}=React;
  const [events,setEvs]=useSt(()=>getCalendarEvents());
  const [doneMap,setDone]=useSt(()=>{
    const m={};
    getCalendarEvents().forEach(e=>{m[e.checkKey]=LS.get(e.checkKey,false);});
    return m;
  });
  const [infoEvent,setInfoEvent]=useSt(null);
  const calRef=useRf(null);
  const curH=now.getHours(),curM=now.getMinutes();
  const todayStr=now.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});

  useEff(()=>{
    // Scroll to current hour on mount
    if(calRef.current)calRef.current.scrollTop=Math.max(0,(curH-1)*60);
    const refreshEvents=()=>{
      const fresh=getCalendarEvents();
      setEvs(fresh);
      const m={};fresh.forEach(e=>{m[e.checkKey]=LS.get(e.checkKey,false);});setDone(m);
    };
    // Poll for updates every 3s, and refresh immediately when shared task data
    // changes in this tab.
    const iv=setInterval(refreshEvents,3000);
    window.addEventListener('peakly:data-changed',refreshEvents);
    window.addEventListener('peakly:sync-restored',refreshEvents);
    return()=>{
      clearInterval(iv);
      window.removeEventListener('peakly:data-changed',refreshEvents);
      window.removeEventListener('peakly:sync-restored',refreshEvents);
    };
  },[]);

  const toggle=(ev)=>{
    const newVal=!doneMap[ev.checkKey];
    setDone(prev=>({...prev,[ev.checkKey]:newVal}));
    LS.set(ev.checkKey,newVal);
    // Sync to goals page
    if(ev.type==='goal'&&ev.goalId&&ev.taskId){
      const _today=todayKey();
      const ttype=ev.taskType||'daily';
      if(ttype==='planning')LS.set('plan_'+ev.goalId+'_'+ev.taskId+'_d'+(ev.dayNum||1),newVal);
      else if(ttype==='checkin')LS.set('checkin_'+ev.goalId+'_'+ev.taskId+'_d'+(ev.dayNum||1),newVal);
      else LS.set('daily_'+ev.goalId+'_'+ev.taskId+'_'+_today,newVal);
      // Update peakly_goals todayTasks
      const pg=LS.get('peakly_goals',[]);
      const gi=pg.findIndex(g=>String(g.id)===String(ev.goalId));
      if(gi>-1&&pg[gi].todayTasks){
        const ti=pg[gi].todayTasks.findIndex(t=>t.taskId===ev.taskId);
        if(ti>-1){pg[gi].todayTasks[ti].done=newVal;LS.set('peakly_goals',pg);}
      }
    }
  };

  // Split into unscheduled vs scheduled
  const unscheduled=events.filter(e=>!e.time||e.time==='');
  const scheduled=events.filter(e=>e.time&&e.time!=='');

  // Group unscheduled by goal
  const unschedByGoal={};
  unscheduled.forEach(e=>{
    const key=e.goalName||e.title;
    if(!unschedByGoal[key])unschedByGoal[key]={color:e.color,events:[]};
    unschedByGoal[key].events.push(e);
  });

  // Build hour buckets for scheduled
  const byHour={};
  scheduled.forEach(e=>{
    const hr=parseInt((e.time||'9').split(':')[0]);
    if(!byHour[hr])byHour[hr]=[];
    byHour[hr].push(e);
  });

  const doneCount=events.filter(e=>doneMap[e.checkKey]).length;

  const [editingTimeId,setEditingTimeId]=useSt(null);
  const changeTime=(ev,newTime)=>{
    if(!newTime)return;
    const tod=new Date().toDateString();
    if(ev.type==='goal'&&ev.goalId&&ev.taskId){
      const dateStr=ev.dateStr||todayKey();
      if(window.PeaklyGoals&&window.PeaklyGoals.applyTaskTime)window.PeaklyGoals.applyTaskTime(ev.goalId,ev.taskId,newTime,{dateStr});
      else LS.set('time_'+ev.goalId+'_'+ev.taskId+'_'+dateStr,newTime);
    }else if(ev.type==='routine'&&ev.routineKey){
      LS.set('routine_'+ev.routineKey+'_time_'+tod,newTime);
    }else if(ev.type==='work'&&ev.shiftKey){
      const sh=LS.get('work_shifts',{});const sd=sh[ev.shiftKey];
      if(sd){const parts=(ev.id||'').split('_');const idx=parseInt(parts[parts.length-1])||0;
        if(Array.isArray(sd)){if(sd[idx])sd[idx].start=newTime;}else sd.start=newTime;
        LS.set('work_shifts',sh);}
    }else if(ev.type==='lifeadmin'){
      const laIdx=parseInt((ev.id||'').replace('la_',''));
      if(!isNaN(laIdx)){const ce=LS.get('cal_events',[]);if(ce[laIdx]){ce[laIdx].time=newTime;LS.set('cal_events',ce);}}
    }else if(ev.type==='manual'&&ev.srcId){
      const me=LS.get('cal_manual_events',[]);const mi=me.findIndex(m=>String(m.id)===String(ev.srcId));
      if(mi>-1){me[mi].time=newTime;LS.set('cal_manual_events',me);}
    }
    setEvs(getCalendarEvents());
  };

  const EventPill=({ev})=>{
    const done=doneMap[ev.checkKey]||false;
    const goalColor=ev.color||'#0891B2';
    const typeMap={goal:'🎯',lifeadmin:'🏠',routine:'🌅',work:'💼',manual:'📌'};
    const handleDelete=(e)=>{
      e.stopPropagation();
      // Delete logic depends on event type
      if(ev.type==='lifeadmin'&&ev.sourceKey!==undefined){
        const calEvs=LS.get('cal_events',[]);
        for(let i=0;i<calEvs.length;i++){
          if(calEvs[i].sourceKey===ev.sourceKey&&calEvs[i].title===ev.title){
            calEvs.splice(i,1);
            break;

        }
        LS.set('cal_events',calEvs);
      }else if(ev.type==='manual'&&ev.srcId!==undefined){
        const manualEvs=LS.get('cal_manual_events',[]);
        const filtered=manualEvs.filter(x=>x.id!==ev.srcId);
        LS.set('cal_manual_events',filtered);
      }
      setEvents(getCalendarEvents());
      setDoneMap({...doneMap});
    };
    return(
      <div style={{display:'flex',alignItems:'center',gap:7,padding:'6px 10px',borderRadius:8,
          background:done?'var(--bg2)':'var(--white)',
          borderLeft:`3px solid ${done?'var(--border)':goalColor}`,
          border:`1px solid ${done?'var(--border2)':goalColor+'44'}`,
          cursor:'pointer',transition:'all 0.15s',opacity:done?0.55:1,marginBottom:3}}>
        <div onClick={()=>toggle(ev)} style={{flex:1,display:'flex',alignItems:'center',gap:7,minWidth:0}}>
          <div style={{width:16,height:16,borderRadius:4,border:`2px solid ${done?'var(--border)':goalColor}`,
            background:done?goalColor:'transparent',display:'flex',alignItems:'center',justifyContent:'center',
            flexShrink:0,transition:'all 0.15s'}}>
            {done&&<svg width="8" height="6" viewBox="0 0 8 6"><path d="M1 3l2 2 4-4" stroke="white" strokeWidth="1.6" fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg>}
          </div>
          <span style={{flex:1,fontSize:12,fontWeight:done?400:600,color:done?'var(--text3)':'var(--text)',textDecoration:done?'line-through':'none',lineHeight:1.3,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{ev.title}</span>
          {editingTimeId===ev.id
            ?<input type="time" defaultValue={ev.time} autoFocus style={{width:78,fontSize:10,border:'1px solid var(--border)',borderRadius:4,padding:'1px 3px',fontFamily:'var(--font)',flexShrink:0}} onClick={e=>e.stopPropagation()} onBlur={e=>{setEditingTimeId(null);if(e.target.value)changeTime(ev,e.target.value);}}/>
            :ev.time&&<span onClick={e=>{e.stopPropagation();setEditingTimeId(ev.id);}} title="Tap to change time" style={{fontSize:10,color:'var(--blue)',flexShrink:0,fontWeight:600,cursor:'pointer',textDecoration:'underline dotted'}}>⏰{fmtHour(parseInt(ev.time.split(':')[0]))}</span>
          }
          <span style={{fontSize:10,flexShrink:0}}>{typeMap[ev.type]||'📌'}</span>
        </div>
        {(ev.type==='lifeadmin'||ev.type==='manual')&&<button onClick={handleDelete}
          title="Delete"
          style={{flexShrink:0,width:20,height:20,borderRadius:'50%',border:'none',background:'transparent',color:'var(--text4)',fontSize:12,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',padding:0,lineHeight:1}}>×</button>}
        <button onClick={(e)=>{e.stopPropagation();setInfoEvent(ev);}}
          title="More info"
          style={{flexShrink:0,width:20,height:20,borderRadius:'50%',border:'none',background:'transparent',color:'var(--text3)',fontSize:13,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',padding:0,lineHeight:1}}>ⓘ</button>
      </div>
    );
  };

  if(!goals||goals.length===0){
    return(
      <div className="card" style={{display:'flex',flexDirection:'column',height:'calc(100vh - 104px)',minHeight:500,overflow:'hidden'}}>
        <div style={{padding:'13px 16px',borderBottom:'1px solid var(--border2)',flexShrink:0}}>
          <div style={{fontFamily:'var(--font-display)',fontSize:17,fontWeight:700,color:'var(--text)'}}>{todayStr}</div>
          <div style={{fontSize:11,color:'var(--text3)'}}>No active goals</div>
        </div>
        <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:12,padding:24}}>
          <div style={{fontSize:36}}>🏔️</div>
          <div style={{fontSize:15,fontWeight:700,color:'var(--text)'}}>No active goals yet</div>
          <div style={{fontSize:13,color:'var(--text3)',textAlign:'center',lineHeight:1.5}}>Head to the Goals page to start a goal and your daily tasks will appear here.</div>
          <a href="peakly-goals.html" style={{marginTop:8,padding:'10px 20px',background:'var(--blue)',color:'#fff',borderRadius:100,fontSize:13,fontWeight:700,textDecoration:'none'}}>Go to Goals →</a>
        </div>
      </div>
    );
  }

  return(
    <div className="card" style={{display:'flex',flexDirection:'column',height:'calc(100vh - 104px)',minHeight:500,overflow:'hidden',padding:0}}>
      {infoEvent&&<TaskInfoModal ev={infoEvent} onClose={()=>setInfoEvent(null)}/>}
      {/* Header */}
      <div style={{padding:'13px 16px',borderBottom:'1px solid var(--border2)',flexShrink:0,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div>
          <div style={{fontFamily:'var(--font-display)',fontSize:17,fontWeight:700,color:'var(--text)'}}>{todayStr}</div>
          <div style={{fontSize:11,color:'var(--text3)'}}>{doneCount}/{events.length} tasks done today</div>
        </div>
        <a href="peakly-goals.html" style={{fontSize:11,padding:'4px 11px',borderRadius:100,background:'var(--blue-light)',color:'var(--blue)',fontWeight:700,textDecoration:'none',border:'1px solid var(--blue-muted)'}}>Goals →</a>
      </div>

      <div ref={calRef} style={{flex:1,overflowY:'auto'}}>

        {/* Unscheduled section */}
        {unscheduled.length>0&&(
          <div style={{padding:'10px 14px 6px',borderBottom:'1px solid var(--border2)',background:'var(--bg)'}}>
            <div style={{fontSize:10,fontWeight:700,letterSpacing:'0.6px',textTransform:'uppercase',color:'var(--text3)',marginBottom:8}}>Unscheduled</div>
            {/* Group by goal */}
            {Object.entries(unschedByGoal).map(([goalName,{color,events:gevs}])=>(

        {/* Time slots */}
        {HOURS.map(hr=>{
          const isNow=hr===curH;
          const isPast=hr<curH;
          const evs=byHour[hr]||[];
          if(evs.length===0&&!isNow)return(

          );
        })}
      </div>
    </div>
  );
}

// ─ Hour Calendar (center) — driven by Calendar page data ─
// Type colors matching calendar page
const CAL_TYPE_COLORS={
  goal:{bg:'#ECFEFF',border:'#0891B2',text:'#0E7490',icon:'🎯'},
  routine:{bg:'#FFF7ED',border:'#F97316',text:'#C2410C',icon:'🌅'},
  work:{bg:'#F5F3FF',border:'#7C3AED',text:'#6D28D9',icon:'💼'},
  lifeadmin:{bg:'#ECFDF5',border:'#059669',text:'#065F46',icon:'🏠'},
  manual:{bg:'#F8FAFC',border:'#64748B',text:'#475569',icon:'📌'},
};

function getCalendarEvents(){
  const today=new Date();today.setHours(0,0,0,0);
  const todayStr=today.toDateString();
  const evs=[];

  // 1. Manual events
  const manualEvs=LS.get('cal_manual_events',[]);
  manualEvs.forEach(e=>{
    const d=new Date(e.date);if(isNaN(d))return;
    if(d.toDateString()!==todayStr)return;
    if(!e.time)return;
    evs.push({id:'m_'+e.id,type:'manual',title:e.title,time:e.time,dur:e.dur||e.duration||60,color:e.color||'#64748B',srcId:e.id,checkKey:'manual_'+e.id,page:'peakly-calendar.html'});
  });

  // 2. Goal tasks — read from actual todayTasks (set by goals page)
  const goals=LS.get('peakly_goals',[]);
  goals.filter(g=>g.startedDate&&!g.completed).forEach(g=>{
    const sd=new Date(g.startedDate);sd.setHours(0,0,0,0);
    const dayNum=Math.floor((today-sd)/86400000)+1;
    const totalDays=g.totalDays||90;
    if(dayNum<1||dayNum>totalDays)return;
    const todayTasks=g.todayTasks||[];
    todayTasks.forEach(t=>{
      const tid=t.taskId||t.id||'task';
      const taskType=t.taskType||'daily';
      const today2=new Date();today2.setHours(0,0,0,0);
      const _today=todayKey();
      const checkKey=taskType==='planning'?'plan_'+g.id+'_'+tid+'_d'+dayNum
        :taskType==='checkin'?'checkin_'+g.id+'_'+tid+'_d'+dayNum
        :'daily_'+g.id+'_'+tid+'_'+_today;
      const time=window.PeaklyGoals&&window.PeaklyGoals.getTaskTime
        ? window.PeaklyGoals.getTaskTime(g.id,tid,todayStr,t.time||'09:00')
        : LS.get('time_'+g.id+'_'+tid+'_'+todayStr,'')||LS.get('time_'+g.id+'_'+tid,'')||t.time||'09:00';
      const evId='g_'+g.id+'_d'+dayNum+'_'+tid;
      // If goals page already marked t.done=true, mirror it into the storeKey
      // so the same value is read no matter which side updated last.
      if(t.done===true&&LS.get(checkKey,false)!==true)LS.set(checkKey,true);
      evs.push({id:evId,type:'goal',title:(t.task||t.name||'Task'),time,dur:LS.get('cal_dur_'+evId,30),color:g.color||'#0891B2',checkKey,goalId:g.id,taskId:tid,taskType,dateStr:todayStr,goalName:g.name,page:'peakly-goals.html'});
    });
  });

  // 3. Routines
  ['Morning_routine','Night_routine'].forEach(rk=>{
    const cfg=LS.get('routine_'+rk+'_cal',null);
    if(!cfg||!cfg.synced||!cfg.time)return;
    const dow=['sun','mon','tue','wed','thu','fri','sat'][today.getDay()];
    if(cfg.days&&cfg.days[dow]===false)return;
    const isNight=rk.includes('Night');
    const evId='r_'+rk+'_'+todayStr;
    evs.push({id:evId,type:'routine',title:(isNight?'🌙 Night':'🌄 Morning')+' Routine',time:LS.get('routine_'+rk+'_time_'+todayStr,null)||cfg.time,dur:LS.get('cal_dur_'+evId,parseInt(cfg.duration)||30),color:'#F97316',checkKey:'routine_done_'+rk+'_'+todayStr,routineKey:rk,page:'peakly-second-brain-1.html'});
  });

  // 4. Work shifts — support multiple jobs per day by cycling through them
  const shifts=LS.get('work_shifts',{});
  const tk=`${today.getFullYear()}-${today.getMonth()+1}-${today.getDate()}`;
  if(shifts[tk]){
    const shList=Array.isArray(shifts[tk])?shifts[tk]:[shifts[tk]];
    shList.forEach((sh,si)=>{
      const evId='w_'+tk+'_'+si;
      evs.push({id:evId,type:'work',title:(sh.jobName||'Work')+(sh.location?' @ '+sh.location:''),time:sh.start||'09:00',dur:LS.get('cal_dur_'+evId,480),color:sh.color||'#7C3AED',checkKey:'work_done_'+tk+'_'+si,page:'peakly-second-brain-2.html'});
    });
  }

  // 5. Life Admin cal events (ONLY include if they have a time — items with just dates belong in their section)
  const LA_PART2_KEYS=['pro_meetings','pro_certs','partner_dates','fam_events','comm_events'];
  const calEvs=LS.get('cal_events',[]);
  calEvs.forEach((e,i)=>{
    if(!e.date&&!e.title)return;
    // Skip goal_task entries — those are already rendered from peakly_goals.todayTasks
    // in section 2 above. Including them here would duplicate every goal task.
    if(e.type==='goal_task')return;
    // Include if date matches today or no date (treat as today)
    if(e.date){
      const d=new Date(e.date);
      if(!isNaN(d)&&d.toDateString()!==todayStr)return;
    }
    // Extract time from event — if no time, skip (it belongs in its Life Admin section, not home cal)
    let evTime=e.time||'';
    if(!evTime&&typeof e.date==='string'&&e.date.includes('T')){
      const tPart=e.date.split('T')[1];
      if(tPart)evTime=tPart.slice(0,5);
    }
    if(!evTime)return; // Skip events with no time
    const isPart2=e.sourceKey&&(LA_PART2_KEYS.includes(e.sourceKey)||e.sourceKey.startsWith('child_'));
    const sourcePage=isPart2?'peakly-second-brain-2.html':'peakly-second-brain-1.html';
    evs.push({id:'la_'+i,type:'lifeadmin',title:e.title||'Life Admin',time:evTime,dur:LS.get('cal_dur_'+'la_'+i,e.duration||30),color:'#059669',checkKey:'lifeadmin_done_'+i+'_'+todayStr,page:sourcePage,subType:e.type,sourceKey:e.sourceKey});
  });

  return evs.sort((a,b)=>{
    const [ah,am]=a.time.split(':').map(Number);
    const [bh,bm]=b.time.split(':').map(Number);
    return(ah*60+am)-(bh*60+bm);
  });
}

function HourCal(){
  const calRef=useRef(null);
  const now=new Date();
  const curH=now.getHours();
  const curM=now.getMinutes();
  const [events,setEvents]=useState(()=>getCalendarEvents());
  const [doneMap,setDoneMap]=useState(()=>{
    const m={};
    getCalendarEvents().forEach(e=>{m[e.checkKey]=LS.get(e.checkKey,false);});
    return m;
  });

  // Refresh every 60s to pick up any changes
  useEffect(()=>{
    if(calRef.current){calRef.current.scrollTop=Math.max(0,(curH-2)*60);}
    const interval=setInterval(()=>{
      setEvents(getCalendarEvents());
    },60000);
    return()=>clearInterval(interval);
  },[]);

  const [editingTimeId,setEditingTimeId]=useState(null);

  const changeTime=(ev,newTime)=>{
    if(!newTime)return;
    const tod=new Date().toDateString();
    if(ev.type==='goal'&&ev.goalId&&ev.taskId){
      const dateStr=ev.dateStr||todayKey();
      if(window.PeaklyGoals&&window.PeaklyGoals.applyTaskTime)window.PeaklyGoals.applyTaskTime(ev.goalId,ev.taskId,newTime,{dateStr});
      else LS.set('time_'+ev.goalId+'_'+ev.taskId+'_'+dateStr,newTime);
    }else if(ev.type==='routine'&&ev.routineKey){
      LS.set('routine_'+ev.routineKey+'_time_'+tod,newTime);
    }else if(ev.type==='work'&&ev.shiftKey){
      const sh=LS.get('work_shifts',{});
      const sd=sh[ev.shiftKey];
      if(sd){
        const parts=(ev.id||'').split('_');const idx=parseInt(parts[parts.length-1])||0;
        if(Array.isArray(sd)){if(sd[idx])sd[idx].start=newTime;}
        else sd.start=newTime;
        LS.set('work_shifts',sh);
      }
    }else if(ev.type==='lifeadmin'){
      const laIdx=parseInt((ev.id||'').replace('la_',''));
      if(!isNaN(laIdx)){const ce=LS.get('cal_events',[]);if(ce[laIdx]){ce[laIdx].time=newTime;LS.set('cal_events',ce);}}
    }else if(ev.type==='manual'&&ev.srcId){
      const me=LS.get('cal_manual_events',[]);const mi=me.findIndex(m=>String(m.id)===String(ev.srcId));
      if(mi>-1){me[mi].time=newTime;LS.set('cal_manual_events',me);}
    }
    setEvents(getCalendarEvents());
  };

  const toggleDone=(ev)=>{
    const newVal=!doneMap[ev.checkKey];
    const newMap={...doneMap,[ev.checkKey]:newVal};
    setDoneMap(newMap);
    LS.set(ev.checkKey,newVal);
    // Sync to goals page using same key format as goals page
    if(ev.type==='goal'&&ev.goalId&&ev.taskId){
      const _today=todayKey();
      const ttype=ev.taskType||'daily';
      if(ttype==='planning')LS.set('plan_'+ev.goalId+'_'+ev.taskId+'_d'+(ev.dayNum||1),newVal);
      else if(ttype==='checkin')LS.set('checkin_'+ev.goalId+'_'+ev.taskId+'_d'+(ev.dayNum||1),newVal);
      else LS.set('daily_'+ev.goalId+'_'+ev.taskId+'_'+_today,newVal);
      // Also update peakly_goals todayTasks done state
      const pg=LS.get('peakly_goals',[]);
      const gi=pg.findIndex(g=>String(g.id)===String(ev.goalId));
      if(gi>-1&&pg[gi].todayTasks){
        const ti=pg[gi].todayTasks.findIndex(t=>t.taskId===ev.taskId);
        if(ti>-1){pg[gi].todayTasks[ti].done=newVal;LS.set('peakly_goals',pg);}
      }
    }
  };

  // Group events by hour
  const byHour={};
  events.forEach(e=>{
    const hr=parseInt(e.time.split(':')[0]);
    if(!byHour[hr])byHour[hr]=[];
    byHour[hr].push(e);
  });

  const doneCount=events.filter(e=>doneMap[e.checkKey]).length;

  return(
    <div className="card" style={{padding:0,overflow:'hidden',display:'flex',flexDirection:'column',height:'calc(100vh - 104px)',minHeight:600,position:'sticky',top:72}}>
      <div style={{padding:'13px 16px',borderBottom:'1px solid var(--border2)',flexShrink:0,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div>
          <div style={{fontFamily:'var(--font-display)',fontSize:17,fontWeight:700,color:'var(--text)'}}>{now.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})}</div>
          <div style={{fontSize:11,color:'var(--text3)'}}>
            {events.length>0?`${doneCount}/${events.length} done today`:'No events scheduled — add them on the Calendar page'}
          </div>
        </div>
        <div style={{display:'flex',gap:6,alignItems:'center'}}>
          <span style={{fontSize:11,background:'var(--blue-light)',color:'var(--blue)',padding:'3px 10px',borderRadius:100,fontWeight:700}}>
            {doneCount}/{events.length}
          </span>
          <a href="peakly-calendar.html" style={{fontSize:11,padding:'3px 10px',borderRadius:100,background:'#ECFEFF',color:'#0891B2',fontWeight:700,textDecoration:'none',border:'1px solid #A5F3FC'}}>
            📅 Calendar
          </a>
        </div>
      </div>
      <div ref={calRef} style={{flex:1,overflowY:'auto'}}>
        {HOURS.map(hr=>{
          const isNow=hr===curH;
          const isPast=hr<curH;
          const evs=byHour[hr]||[];
          return(
            <div key={hr} style={{display:'flex',minHeight:60,borderBottom:'1px solid var(--border2)',position:'relative',background:isNow?'rgba(8,145,178,0.025)':isPast?'rgba(0,0,0,0.012)':'transparent'}}>
              <div style={{width:60,flexShrink:0,paddingTop:8,paddingRight:10,textAlign:'right',fontSize:11,fontWeight:isNow?700:400,color:isNow?'#0891B2':'var(--text4)',borderRight:'1px solid var(--border2)',userSelect:'none'}}>
                {fmtHour(hr)}
              </div>
              {isNow&&(
                <div style={{position:'absolute',left:60,right:0,top:`${curM/60*100}%`,height:'2px',background:'var(--orange)',zIndex:3,pointerEvents:'none'}}>
                  <div style={{width:9,height:9,borderRadius:'50%',background:'var(--orange)',marginLeft:-4,marginTop:-3.5}}/>
                </div>
              )}
              <div style={{flex:1,padding:'4px 8px',display:'flex',flexDirection:'column',gap:3}}>
                {evs.map(ev=>{
                  const tc=CAL_TYPE_COLORS[ev.type]||CAL_TYPE_COLORS.manual;
                  const done=doneMap[ev.checkKey]||false;

// ─ Pomodoro ─
function Pomo(){
  const W=25*60,B=5*60;
  const [time,setTime]=useState(LS.get('pt',W));
  const [run,setRun]=useState(false);
  const [brk,setBrk]=useState(false);
  const [rnd,setRnd]=useState(LS.get('pr',1));
  const ref=useRef(null);
  useEffect(()=>{
    if(!run){clearInterval(ref.current);return;}
    ref.current=setInterval(()=>{
      setTime(t=>{
        if(t<=1){clearInterval(ref.current);setRun(false);
          if(!brk){setBrk(true);setRnd(r=>{const n=r+1;LS.set('pr',n);return n;});return B;}
          else{setBrk(false);return W;}
        }
        const n=t-1;LS.set('pt',n);return n;
      });
    },1000);
    return()=>clearInterval(ref.current);
  },[run,brk]);
  const total=brk?B:W;
  const C=2*Math.PI*32;
  const off=C*(1-time/total);
  const reset=()=>{setRun(false);setTime(W);setBrk(false);setRnd(1);LS.set('pt',W);LS.set('pr',1);};
  return(
    <div className="card">
      <div className="clabel">Pomodoro Timer</div>
      <div style={{display:'flex',alignItems:'center',gap:12}}>
        <div style={{position:'relative',width:74,height:74,flexShrink:0}}>
          <svg width="74" height="74" viewBox="0 0 74 74" style={{transform:'rotate(-90deg)'}}>
            <circle cx="37" cy="37" r="32" fill="none" stroke="var(--bg2)" strokeWidth="6"/>
            <circle cx="37" cy="37" r="32" fill="none" stroke={brk?'var(--orange)':'var(--blue)'} strokeWidth="6" strokeLinecap="round" strokeDasharray={C} strokeDashoffset={off} style={{transition:'stroke-dashoffset 0.85s ease'}}/>
          </svg>
          <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>
            <span style={{fontFamily:'var(--font-display)',fontSize:15,fontWeight:700,color:'var(--text)'}}>{`${pad(Math.floor(time/60))}:${pad(time%60)}`}</span>
            <span style={{fontSize:8,color:'var(--text3)',letterSpacing:'0.5px',textTransform:'uppercase'}}>{brk?'break':'focus'}</span>
          </div>
        </div>
        <div style={{flex:1}}>
          <div style={{fontSize:12,color:'var(--text2)',marginBottom:8}}>Round <strong style={{color:'var(--text)'}}>{rnd}</strong> of 4</div>
          <div style={{display:'flex',gap:6}}>
            <button onClick={reset} style={{flex:1,padding:'6px 0',borderRadius:'var(--r-md)',border:'1px solid var(--border)',color:'var(--text2)',fontSize:11,fontWeight:500}}>Reset</button>
            <button onClick={()=>setRun(r=>!r)} style={{flex:1,padding:'6px 0',borderRadius:'var(--r-md)',background:run?'var(--orange-light)':'var(--blue)',color:run?'var(--orange-dark)':'#fff',fontSize:11,fontWeight:600,border:'none'}}>
              {run?'Pause':'Start'}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─ Move ─
function Move(){
  const [count,setCount]=useState(10);
  const [active,setActive]=useState(false);
  const [done,setDone]=useState(false);
  const ref=useRef(null);
  const start=()=>{
    if(active)return;
    setActive(true);setDone(false);setCount(10);
    ref.current=setInterval(()=>{
      setCount(c=>{if(c<=1){clearInterval(ref.current);setActive(false);setDone(true);return 0;}return c-1;});
    },1000);
  };
  return(
    <div className="card">
      <div className="clabel">Get Moving</div>
      <div style={{display:'flex',alignItems:'center',gap:12}}>
        <div style={{fontFamily:'var(--font-display)',fontSize:46,fontWeight:700,color:done?'var(--orange)':active?'var(--blue)':'var(--text)',lineHeight:1,minWidth:56,textAlign:'center',transition:'color 0.3s'}}>
          {done?'🎉':count}
        </div>
        <div style={{flex:1}}>
          <div style={{fontSize:12,color:'var(--text2)',marginBottom:8}}>{done?'Stand up — go!':active?'seconds to stand…':'tap to start'}</div>
          <button onClick={start} disabled={active} style={{width:'100%',padding:'7px',borderRadius:'var(--r-md)',background:active?'var(--bg2)':'var(--orange)',color:active?'var(--text3)':'#fff',fontSize:12,fontWeight:600,border:'none',transition:'all 0.2s'}}>
            {active?'counting…':done?'Again?':'Start countdown'}
          </button>
        </div>
      </div>
    </div>
  );
}

// ─ Brain Dump ─
function Brain(){
  const [text,setText]=useState(LS.get('bdt',''));
  const [items,setItems]=useState(LS.get('bdi',[]));
  const save=v=>{setText(v);LS.set('bdt',v);};
  const capture=()=>{
    const lines=text.split('\n').filter(l=>l.trim());
    if(!lines.length)return;
    const ni=lines.map(l=>({id:Date.now()+Math.random(),text:l.trim(),t:new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})}));
    const all=[...items,...ni];setItems(all);LS.set('bdi',all);setText('');LS.set('bdt','');
  };
  const remove=id=>{const a=items.filter(i=>i.id!==id);setItems(a);LS.set('bdi',a);};
  return(
    <div className="card">
      <div className="clabel">Quick Notes / Brain Dump</div>
      <textarea value={text} onChange={e=>save(e.target.value)} rows={3}
        placeholder="Capture it fast — ideas, tasks, worries…"
        style={{width:'100%',padding:'9px 11px',borderRadius:'var(--r-md)',border:'1px solid var(--border)',fontSize:12,color:'var(--text)',background:'var(--bg)',lineHeight:1.6,outline:'none'}}
        onKeyDown={e=>{if(e.key==='Enter'&&e.metaKey)capture();}}/>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:6}}>
        <span style={{fontSize:10,color:'var(--text4)'}}>⌘+Enter to capture</span>
        <button onClick={capture} style={{fontSize:11,padding:'4px 12px',borderRadius:'var(--r-md)',background:'var(--blue)',color:'#fff',fontWeight:600,border:'none'}}>Capture</button>
      </div>
      {items.length>0&&(
        <div style={{marginTop:8,display:'flex',flexDirection:'column',gap:3}}>
          {items.map(item=>(
            <div key={item.id} style={{display:'flex',alignItems:'flex-start',gap:7,padding:'5px 8px',background:'var(--bg)',borderRadius:'var(--r-sm)'}}>
              <div style={{width:5,height:5,borderRadius:'50%',background:'var(--orange)',marginTop:5,flexShrink:0}}/>

  );
}

// UserAvatar - shows user initials from Supabase auth
function UserAvatar(){
  const [initials,setInitials]=React.useState('JD');
  React.useEffect(()=>{
    // Only check auth on real domain, not local files
    if(window.location.protocol==='file:')return;
    ensureSb().then(async client=>{
      if(!client){return;}
      const session=await(window.PeaklyAuth?.robustGetSession?window.PeaklyAuth.robustGetSession(client):client.auth.getSession().then(r=>r.data.session));
      if(!session&&window.location.protocol!=='file:'){window.location.href='peakly-auth.html';return;}
      if(!session)return;
      const user=session.user;
      const lastUserId=localStorage.getItem('peakly_last_user_id');
      if(lastUserId&&lastUserId!==user.id){
        // User switched — clear app data but preserve Supabase session keys
        const saved={};
        Object.keys(localStorage).forEach(k=>{if(k.startsWith('sb-')||k.includes('supabase.auth'))saved[k]=localStorage.getItem(k);});
        localStorage.clear();
        Object.entries(saved).forEach(([k,v])=>localStorage.setItem(k,v));
        localStorage.setItem('peakly_last_user_id',user.id);
        window.location.reload();
        return;
      }
      localStorage.setItem('peakly_last_user_id',user.id);
      // Cross-device sync: pull newer cloud data, then back up local edits.
      if(window.PeaklySync){
        try{
          const r = await window.PeaklySync.init(client, user, { reloadOnRestore:true });
          if(r.restored) return;
        }catch(e){}
      }
      // Load subscription state from Supabase and render trial banner if needed
      if(window.PeaklyAuth){
        try{
          const result = await window.PeaklyAuth.loadSubscription(client, user);
          window.PeaklyAuth.renderTrialBanner(result);
          if(result.plan==='free' && localStorage.getItem('peakly_plan_was_trial')==='1'){
            sessionStorage.setItem('peakly_trial_just_expired','1');
            localStorage.removeItem('peakly_plan_was_trial');
            window.PeaklyAuth.renderTrialBanner(result);
          }
          if(result.plan==='trial'){
            localStorage.setItem('peakly_plan_was_trial','1');
          }
        }catch(e){}
      }
      const meta=user.user_metadata||{};
      const first=(meta.first_name||meta.full_name||user.email||'').trim();
      const last=(meta.last_name||'').trim();
      let ini='?';
      if(first&&last) ini=(first[0]+last[0]).toUpperCase();
      else if(first) ini=first.slice(0,2).toUpperCase();
      setInitials(ini);
      LS.set('peakly_profile',{
        firstName:meta.first_name||meta.full_name?.split(' ')[0]||'',
        lastName:meta.last_name||meta.full_name?.split(' ')[1]||'',
        email:user.email,
        avatar:LS.get('peakly_profile',{}).avatar||'😊'
      });
    });
  },[]);
  return(
    <div style={{width:32,height:32,borderRadius:'50%',background:'var(--blue)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,color:'#fff',cursor:'pointer'}}
      onClick={()=>window.location.href='peakly-profile.html'} title="My account">
      {initials}
    </div>
  );
}

              _sd.setHours(0,0,0,0);
              const _now=new Date();_now.setHours(0,0,0,0);
              const _dayNum=Math.floor((_now-_sd)/86400000)+1;
              const _storeKey=_type==='planning'?'plan_'+_gid+'_'+_tid+'_d'+_dayNum
                :_type==='checkin'?'checkin_'+_gid+'_'+_tid+'_d'+_dayNum
                :'daily_'+_gid+'_'+_tid+'_'+_today;

                time:t.time||'',

                done:LS.get(_storeKey,false)
              };
            })

        });

  });

  const [confetti,setConfetti]=useState(false);
  const [congrats,setCongrats]=useState(null);
  const [sickModal,setSickModal]=useState(false);

  // Reload goals from localStorage when window gets focus (so goal page changes show here)
  const {useEffect}=React;
  useEffect(()=>{
    const reload=()=>{
      const pg=LS.get('peakly_goals',[]);
      if(pg&&pg.length>0){
        const updated=pg.filter(g=>g.startedDate&&!g.completed).map(g=>{
          const tasks=g.todayTasks||[];
          return {
            id:g.id,name:g.name,emoji:g.emoji||'🎯',color:g.color||'blue',img:g.img||null,
            habits:tasks.map((t,ti)=>{
              const _gid=g.id,_tid=t.taskId||('t'+ti),_type=t.taskType||'daily';
              const _today=todayKey();
              const _sd=g.startedDate?new Date(g.startedDate):new Date();
              _sd.setHours(0,0,0,0);
              const _now=new Date();_now.setHours(0,0,0,0);
              const _dayNum=Math.floor((_now-_sd)/86400000)+1;
              const _storeKey=_type==='planning'?'plan_'+_gid+'_'+_tid+'_d'+_dayNum
                :_type==='checkin'?'checkin_'+_gid+'_'+_tid+'_d'+_dayNum
                :'daily_'+_gid+'_'+_tid+'_'+_today;
              const _done=LS.get(_storeKey,false)===true||t.done===true;
              return {id:g.id+'_'+ti,taskId:_tid,homeKey:t.homeKey||('home_task_'+g.id+'_'+ti+'_'+new Date().toDateString()),
                storeKey:_storeKey,name:t.task||t.name||String(t),time:t.time||'',taskType:_type,done:_done};
            })
          };
        });
