<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Peakly — Life Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --blue:#1A5FA8;--blue-light:#EFF6FF;--blue-dark:#0F3D6E;--blue-muted:#DBEAFE;
  --orange:#F97316;--orange-light:#FFF7ED;--orange-dark:#C2410C;--orange-muted:#FED7AA;
  --bg:#F0F4FA;--bg2:#E8EFF8;--white:#fff;
  --text:#0F1C2E;--text2:#3D5068;--text3:#7A93B0;--text4:#A8BDD1;
  --border:#D4E0EE;--border2:#EAF0F8;
  --green:#059669;--green-light:#ECFDF5;--green-dark:#065F46;
  --red:#DC2626;--red-light:#FEF2F2;
  --purple:#7C3AED;--purple-light:#F5F3FF;
  --font:'Plus Jakarta Sans',system-ui,sans-serif;
  --display:'Playfair Display',Georgia,serif;
  --r:8px;--rm:12px;--rl:16px;
  --shadow:0 1px 4px rgba(15,28,46,0.07),0 0 0 1px rgba(15,28,46,0.04);
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;}
button{font-family:var(--font);cursor:pointer;border:none;background:none;}
input,textarea,select{font-family:var(--font);}
textarea{resize:vertical;}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
@keyframes slideIn{from{opacity:0;transform:translateX(-6px);}to{opacity:1;transform:translateX(0);}}

nav{background:var(--white);border-bottom:1px solid var(--border2);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:54px;position:sticky;top:0;z-index:100;box-shadow:0 1px 8px rgba(15,28,46,0.06);}
.nav-brand{display:flex;align-items:center;gap:10px;}
.nav-links{display:flex;gap:2px;}
.nav-links button{padding:6px 14px;border-radius:var(--rm);font-size:13px;color:var(--text2);transition:background .15s;}
.nav-links button.active{background:var(--blue);color:#fff;font-weight:600;}
.nav-links button:hover:not(.active){background:var(--bg);}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;}
.ph{background:var(--white);border-bottom:1px solid var(--border2);padding:16px 20px;}
.ph h1{font-family:var(--display);font-size:24px;font-weight:700;margin-bottom:2px;}
.ph p{font-size:13px;color:var(--text3);}
.body{max-width:1380px;margin:0 auto;padding:18px 20px;display:grid;grid-template-columns:220px 1fr;gap:16px;align-items:start;}
.sidebar{position:sticky;top:72px;}
.snav{background:var(--white);border-radius:var(--rl);box-shadow:var(--shadow);border:1px solid var(--border2);overflow:hidden;margin-bottom:12px;}
.snav button{width:100%;padding:11px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border2);background:transparent;border-left:3px solid transparent;transition:all .15s;text-align:left;}
.snav button:last-child{border-bottom:none;}
.snav button.active{background:var(--blue-light);border-left-color:var(--blue);}
.snav button .ni{font-size:16px;}
.snav button .nl{font-size:13px;color:var(--text2);}
.snav button.active .nl{color:var(--blue);font-weight:700;}
.upbox{padding:14px;background:var(--orange-light);border-radius:var(--rl);border:1px solid var(--orange-muted);text-align:center;}
.upbox h4{font-size:12px;font-weight:700;color:var(--orange-dark);margin-bottom:4px;}
.upbox p{font-size:11px;color:var(--text3);margin-bottom:10px;}
.content{animation:slideIn .25s ease;}
.sblock{background:var(--white);border-radius:var(--rl);border:1px solid var(--border2);box-shadow:var(--shadow);overflow:hidden;margin-bottom:14px;}
.sh{padding:13px 16px;border-bottom:1px solid var(--border2);display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none;transition:background .15s;}
.sh:hover{background:var(--bg);}
.sh-left{display:flex;align-items:center;gap:8px;}
.sh-left .si{font-size:18px;}
.sh-left .st{font-size:14px;font-weight:700;color:var(--text);}
.sb{padding:16px;}
.sb.hidden{display:none;}
.inp{width:100%;padding:8px 10px;border-radius:var(--r);border:1px solid var(--border);font-size:13px;color:var(--text);background:var(--bg);outline:none;font-family:var(--font);transition:border-color .2s;}
.inp:focus{border-color:var(--blue);}
.clabel{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text4);margin-bottom:8px;}
.field{margin-bottom:10px;}
.field label{display:block;font-size:11px;font-weight:600;color:var(--text2);margin-bottom:4px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px;}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;margin-bottom:10px;}
.check-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border2);}
.check-row:last-child{border-bottom:none;}
.chk{width:20px;height:20px;border-radius:6px;border:2px solid var(--border);background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;transition:all .2s;}
.chk.done{background:var(--green);border-color:var(--green);}
.info{padding:10px 12px;border-radius:var(--rm);font-size:12px;margin-bottom:10px;}
.info.blue{background:var(--blue-light);color:var(--blue);}
.info.orange{background:var(--orange-light);color:var(--orange-dark);}
.info.green{background:var(--green-light);color:var(--green-dark);}
.info.red{background:var(--red-light);color:var(--red);}
.info.purple{background:var(--purple-light);color:var(--purple);}
.ubanner{padding:10px 12px;background:var(--orange-light);border-radius:var(--rm);display:flex;align-items:center;gap:8px;border:1px solid var(--orange-muted);margin-top:10px;}
.ubanner h5{font-size:12px;font-weight:700;color:var(--orange-dark);}
.ubanner p{font-size:11px;color:var(--text3);}
.addbtn{width:100%;padding:8px;border-radius:var(--rm);border:1.5px dashed var(--border);font-size:12px;color:var(--text3);display:flex;align-items:center;justify-content:center;gap:6px;background:none;margin-top:8px;transition:all .15s;cursor:pointer;}
.addbtn:hover{border-color:var(--blue);color:var(--blue);}
.bar-wrap{background:var(--bg2);border-radius:100px;overflow:hidden;}
.bar-fill{height:100%;border-radius:100px;transition:width .6s ease;}
.tag{display:inline-flex;align-items:center;padding:3px 9px;border-radius:100px;font-size:11px;font-weight:600;}
.ttoggle{display:flex;gap:6px;margin-bottom:10px;}
.ttoggle button{flex:1;padding:7px;border-radius:var(--r);border:2px solid var(--border);background:var(--bg);color:var(--text2);font-size:12px;font-weight:600;transition:all .2s;}
.ttoggle button.active{border-color:var(--blue);background:var(--blue-light);color:var(--blue);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:8px;}
.cal-day-hdr{font-size:10px;font-weight:700;color:var(--text4);text-align:center;padding:4px 0;letter-spacing:.5px;}
.cal-day{min-height:56px;border-radius:var(--r);border:1px solid var(--border2);padding:4px;cursor:pointer;transition:background .15s;position:relative;background:var(--white);}
.cal-day:hover{background:var(--blue-light);}
.cal-day.today{border-color:var(--blue);background:var(--blue-light);}
.cal-day .dn{font-size:10px;font-weight:600;color:var(--text3);}
.cal-day.today .dn{color:var(--blue);}
.cal-day .event{font-size:9px;padding:1px 4px;border-radius:3px;margin-top:2px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sticky-note{position:relative;padding:12px;border-radius:var(--rm);min-height:100px;cursor:pointer;}
.sticky-note textarea{background:transparent;border:none;outline:none;width:100%;font-size:13px;line-height:1.6;resize:none;font-family:var(--font);}
.sticky-note .del-btn{position:absolute;top:6px;right:8px;font-size:16px;color:rgba(0,0,0,0.3);opacity:0;transition:opacity .2s;}
.sticky-note:hover .del-btn{opacity:1;}
.graph-wrap{position:relative;width:100%;height:120px;margin:8px 0;}
canvas.graph{width:100%;height:100%;}
.metric-toggle{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border2);}
.metric-toggle:last-child{border-bottom:none;}
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:12px;}
.week-col{background:var(--bg);border-radius:var(--rm);padding:8px;border:1px solid var(--border2);}
.week-col .wday{font-size:10px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;text-align:center;}
.week-col .wdate{font-size:11px;color:var(--text3);text-align:center;margin-bottom:8px;}
</style>

<script>
const LS={get:(k,d)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch{return d;}},set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}}};

function mk(tag,css,html){const e=document.createElement(tag);if(css)e.className=css;if(html)e.innerHTML=html;return e;}
function inp(ph,val,cb,type='text'){const i=mk('input','inp');i.type=type;i.placeholder=ph||'';i.value=val||'';if(cb)i.addEventListener('input',e=>cb(e.target.value));return i;}
function ta(ph,val,cb,rows=2){const t=mk('textarea','inp');t.placeholder=ph||'';t.value=val||'';t.rows=rows;if(cb)t.addEventListener('input',e=>cb(e.target.value));return t;}
function fld(lbl,inputEl,mb=10){const d=mk('div','field');d.style.marginBottom=mb+'px';const l=mk('label');l.textContent=lbl;d.appendChild(l);d.appendChild(inputEl);return d;}
function grid(cols,...kids){const d=mk('div');d.style.cssText=`display:grid;grid-template-columns:${cols};gap:10px;margin-bottom:10px;`;kids.filter(Boolean).forEach(k=>d.appendChild(k));return d;}
function sblock(title,icon,fn,open=true){
  const w=mk('div','sblock');
  const h=mk('div','sh');h.innerHTML=`<div class="sh-left"><span class="si">${icon}</span><span class="st">${title}</span></div><span style="font-size:20px;color:var(--text3);font-weight:300;">${open?'−':'+'}</span>`;
  const b=mk('div','sb'+(open?'':' hidden'));
  fn(b);
  h.addEventListener('click',()=>{const o=!b.classList.contains('hidden');b.classList.toggle('hidden',o);h.querySelector('span:last-child').textContent=o?'+':'−';});
  w.appendChild(h);w.appendChild(b);return w;
}
function chkRow(label,sub,done,onToggle,extra){
  const r=mk('div','check-row');
  const c=mk('div','chk'+(done?' done':''));
  if(done)c.innerHTML='<svg width="10" height="8" viewBox="0 0 10 8"><path d="M1 4l3 3L9 1" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>';
  c.addEventListener('click',onToggle);
  const info=mk('div');info.style.flex='1';
  const lbl=mk('div');lbl.style.cssText=`font-size:13px;color:${done?'var(--text3)':'var(--text)'};text-decoration:${done?'line-through':'none'};`;lbl.textContent=label;
  info.appendChild(lbl);
  if(sub){const s=mk('div');s.style.cssText='font-size:11px;color:var(--text3);margin-top:1px;';s.textContent=sub;info.appendChild(s);}
  r.appendChild(c);r.appendChild(info);
  if(extra)r.appendChild(extra);
  return r;
}
function ubanner(feat){const d=mk('div','ubanner');d.innerHTML=`<span style="font-size:16px">⭐</span><div><h5>Paid — ${feat}</h5><p>Upgrade to Peakly Pro</p></div>`;return d;}
function addbtn(lbl,cb){const b=mk('button','addbtn');b.innerHTML=`<span style="font-size:16px;line-height:1">+</span> ${lbl}`;if(cb)b.addEventListener('click',cb);return b;}
function infoBox(html,type='blue'){const d=mk('div','info '+type);d.innerHTML=html;return d;}
function badge(txt,bg,color){const s=mk('span','tag');s.style.cssText=`background:${bg};color:${color};`;s.textContent=txt;return s;}
function hasServerProAccess(){
  return !!(window.PeaklyAuth && window.PeaklyAuth.hasServerAccess && window.PeaklyAuth.hasServerAccess());
}
function isPro(){return hasServerProAccess();}
function calSyncBtn(label,dataKey,data){
  const b=mk('button');b.style.cssText='font-size:11px;padding:4px 10px;border-radius:var(--r);background:var(--blue-light);color:var(--blue);font-weight:600;border:1px solid var(--blue-muted);cursor:pointer;display:flex;align-items:center;gap:4px;';
  b.innerHTML='📅 '+label;
  b.addEventListener('click',()=>{
    const stored=LS.get('cal_events',[]);
    stored.push({...data,key:dataKey,synced:new Date().toISOString()});
    LS.set('cal_events',stored);
    b.style.background='var(--green-light)';b.style.color='var(--green-dark)';b.style.borderColor='var(--green)';b.innerHTML='✓ Saved for calendar';
    setTimeout(()=>{b.style.background='var(--blue-light)';b.style.color='var(--blue)';b.style.borderColor='var(--blue-muted)';b.innerHTML='📅 '+label;},2000);
  });
  return b;
}
function dateValue(d){
  if(!d)return '';
  if(typeof d==='string'&&/^\d{4}-\d{2}-\d{2}/.test(d))return d.slice(0,10);
  const dt=new Date(d);
  if(isNaN(dt))return '';
  return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
}
function todayValue(){
  const d=new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function addMonthsDateValue(start,months){
  const d=start?new Date(start):new Date();
  if(isNaN(d))return todayValue();
  d.setMonth(d.getMonth()+months);
  return dateValue(d);
}
function advanceDateByFrequency(date,freq){
  if(freq==='daily')date.setDate(date.getDate()+1);
  else if(freq==='biweekly')date.setDate(date.getDate()+14);
  else if(freq==='monthly')date.setMonth(date.getMonth()+1);
  else if(freq==='annually')date.setFullYear(date.getFullYear()+1);
  else date.setDate(date.getDate()+7);
}
function combineLocalDateTime(date,time){
  return (date||todayValue())+(time?'T'+time:'');
}
function syncChoreToCalendar(chore){
  const chores=LS.get('chores',[]);
  const idx=chores.findIndex(c=>String(c.id)===String(chore.id));
  const scheduleDate=dateValue(chore.scheduleDate||chore.nextDue)||todayValue();
  const time=chore.time||'09:00';
  chore.scheduleDate=scheduleDate;
  chore.time=time;
  chore.synced=true;
  if(idx>-1){chores[idx]={...chores[idx],scheduleDate,time,synced:true};LS.set('chores',chores);}
  const key='chore_'+chore.id;
  const stored=LS.get('cal_events',[]).filter(e=>e.key!==key);
  stored.push({
    key,
    title:chore.label||'Chore',
    date:combineLocalDateTime(scheduleDate,time),
    time,
    duration:30,
    type:'chore',
    recurring:chore.freq||'weekly',
    sourceKey:'chores',
    sourceId:chore.id,
    sourceField:'scheduleDate',
    sourceTitleField:'label',
    synced:new Date().toISOString()
  });
  LS.set('cal_events',stored);
}

// ── NAV ───────────────────────────────────────────────────────────────────
const NAV=[
  {id:'dashboard',label:'Dashboard',icon:'🗂️'},
  {id:'health',label:'Health & Wellness',icon:'💚'},
  {id:'vehicle',label:'Vehicle',icon:'🚗'},
  {id:'housing',label:'Housing',icon:'🏠'},
  {id:'part2',label:'Professional, Finances & more →',icon:'📂'},
];
let cur='dashboard';
function buildNav(){
  const n=document.getElementById('snav');n.innerHTML='';
  // Server-confirmed Pro/trial access is required before unlocking paid sections.
  const hasAccess=hasServerProAccess();
  // Free: only first 3 sections (health, vehicle, housing) + dashboard
  // Pro/Trial: all sections + part 2
  const FREE_SECTIONS=['dashboard','health','vehicle','housing'];
  NAV.forEach((item,idx)=>{
    const b=mk('button');b.dataset.id=item.id;
    const isLocked=!hasAccess&&!FREE_SECTIONS.includes(item.id)&&item.id!=='part2';
    b.innerHTML=`<span class="ni">${item.icon}</span><span class="nl">${item.label}</span>${isLocked?'<span style="margin-left:auto;font-size:10px;color:var(--text4);">🔒</span>':''}`;
    if(item.id===cur)b.classList.add('active');
    b.addEventListener('click',()=>{
      if(item.id==='part2'){
        if(!hasAccess){showUpgradePrompt();return;}
        window.location.href='peakly-second-brain-2.html';return;
      }
      if(isLocked){showUpgradePrompt();return;}
      loadPage(item.id);
    });
    n.appendChild(b);
  });
}
function showUpgradePrompt(){
  const box=document.getElementById('upgradeBox');
  if(box){box.style.animation='pulse 0.4s ease';setTimeout(()=>box.style.animation='',500);}
  window.location.href='peakly-plan.html';
}
function loadPage(id){
  cur=id;buildNav();
  const c=document.getElementById('content');
  c.innerHTML='';c.style.animation='none';
  requestAnimationFrame(()=>c.style.animation='slideIn .25s ease');
  const nav=NAV.find(n=>n.id===id);
  const hdr=mk('div');hdr.style.cssText='display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;';
  const t=mk('div');t.style.cssText='font-family:var(--display);font-size:20px;font-weight:700;color:var(--text);';t.textContent=`${nav.icon} ${nav.label}`;
  hdr.appendChild(t);c.appendChild(hdr);
  PAGES[id](c);
}

  const strip=mk('div');strip.style.cssText='display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;';
  [{label:'Tasks due today',val:'5',color:'var(--blue)'},{label:'Upcoming reminders',val:'3',color:'var(--orange)'},{label:'Streak',val:'14 🔥',color:'var(--orange)'},{label:'Goals active',val:'4 / 5',color:'var(--green)'}].forEach(s=>{
    const c=mk('div');c.style.cssText=`background:var(--white);border-radius:var(--rl);border:1px solid var(--border2);padding:14px;text-align:center;box-shadow:var(--shadow);`;
    c.innerHTML=`<div style="font-size:22px;font-weight:700;color:${s.color};margin-bottom:4px;">${s.val}</div><div style="font-size:11px;color:var(--text3);">${s.label}</div>`;
    strip.appendChild(c);
  });
  wrap.appendChild(strip);
  // Category cards
  const g=mk('div');g.style.cssText='display:grid;grid-template-columns:repeat(2,1fr);gap:14px;';
  cats.forEach(cat=>{
    const card=mk('div');card.style.cssText=`background:var(--white);border-radius:var(--rl);border:1px solid var(--border2);padding:16px;box-shadow:var(--shadow);cursor:pointer;transition:box-shadow .2s;`;
    card.onmouseover=()=>card.style.boxShadow='0 4px 16px rgba(15,28,46,0.12)';
    card.onmouseout=()=>card.style.boxShadow='var(--shadow)';
    const top=mk('div');top.style.cssText='display:flex;align-items:center;gap:10px;margin-bottom:12px;';
    const ic=mk('div');ic.style.cssText=`width:36px;height:36px;border-radius:var(--rm);background:${cat.bg};display:flex;align-items:center;justify-content:center;font-size:18px;`;ic.textContent=cat.icon;
    const nm=mk('div');nm.style.cssText='font-size:14px;font-weight:700;color:var(--text);';nm.textContent=cat.label;
    top.appendChild(ic);top.appendChild(nm);card.appendChild(top);
    cat.items.forEach(item=>{
      const row=mk('div');row.style.cssText='display:flex;align-items:center;gap:7px;margin-bottom:5px;';
      const dot=mk('div');dot.style.cssText=`width:5px;height:5px;border-radius:50%;background:${cat.color};flex-shrink:0;`;
      const txt=mk('div');txt.style.cssText='font-size:12px;color:var(--text2);';txt.textContent=item;
      row.appendChild(dot);row.appendChild(txt);card.appendChild(row);
    });
    const openBtn=mk('button');openBtn.style.cssText=`margin-top:12px;width:100%;padding:7px;border-radius:var(--rm);background:${cat.bg};color:${cat.color};font-size:12px;font-weight:600;border:none;`;
    openBtn.textContent='Open '+cat.label+' →';
    openBtn.addEventListener('click',()=>{
      if(['professional','finances','family','pets','community'].includes(cat.id)){window.location.href='peakly-second-brain-2.html';}
      else loadPage(cat.id);
    });
    card.appendChild(openBtn);g.appendChild(card);
  });
  wrap.appendChild(g);
}

// ═══════════════════════════════════════════════════════════════════════════
// HEALTH & WELLNESS
// ═══════════════════════════════════════════════════════════════════════════
function buildHealth(wrap){
  // ── NUTRITION ────────────────────────────────────────────────────────────
  wrap.appendChild(sblock('Nutrition & Meal Planning','🥗',b=>{
    b.appendChild(infoBox('🔗 Linked to your Home page meal tracker — meals planned here appear automatically on your daily planner.','blue'));
    const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const today=new Date();
    const weekStart=new Date(today);weekStart.setDate(today.getDate()-today.getDay());
    const wg=mk('div','week-grid');
    days.forEach((d,i)=>{
      const date=new Date(weekStart);date.setDate(weekStart.getDate()+i);
      const col=mk('div','week-col');
      col.innerHTML=`<div class="wday">${d}</div><div class="wdate">${date.getMonth()+1}/${date.getDate()}</div>`;
      ['Breakfast','Lunch','Dinner','Snack'].forEach(meal=>{
        const key=`meal_${date.toDateString()}_${meal}`;
        const mf=mk('div');mf.style.marginBottom='4px';
        const lbl=mk('div');lbl.style.cssText='font-size:9px;font-weight:700;color:var(--text4);text-transform:uppercase;margin-bottom:2px;';lbl.textContent=meal;
        const mi=mk('input','inp');mi.placeholder=meal+'…';mi.value=LS.get(key,'');mi.style.cssText='font-size:11px;padding:4px 6px;';
        mi.addEventListener('input',e=>{LS.set(key,e.target.value);});
        mf.appendChild(lbl);mf.appendChild(mi);col.appendChild(mf);
      });
      wg.appendChild(col);
    });
    b.appendChild(wg);

    // Samsung Health-style calorie tracker
    const calBox=mk('div');calBox.style.cssText='background:var(--bg);border-radius:18px;padding:12px;margin-top:10px;';
    let calories=LS.get('calorie_entries',[]);
    let selectedMeal='Breakfast';
    let pendingPhoto='';
    const mealTypes=['Breakfast','Lunch','Dinner','Snack','Other'];
    const calGoal=mk('input','inp');calGoal.type='number';calGoal.min='0';calGoal.step='50';calGoal.value=LS.get('calorie_goal',2000);calGoal.style.cssText='font-size:12px;max-width:120px;';
    const calDate=mk('input','inp');calDate.type='date';calDate.value=todayValue();calDate.style.cssText='font-size:12px;max-width:150px;';
    const calHero=mk('div','cal-hero');
    const calTabs=mk('div','cal-meal-tabs');
    const calName=mk('input','inp');calName.placeholder='What did you eat?';calName.style.fontSize='12px';
    const calAmount=mk('input','inp');calAmount.type='number';calAmount.min='0';calAmount.step='1';calAmount.placeholder='Calories';calAmount.style.fontSize='12px';
    const photoInput=mk('input');photoInput.type='file';photoInput.accept='image/*';photoInput.setAttribute('capture','environment');photoInput.style.display='none';
    const photoTile=mk('div','cal-photo-tile');
    const calAdd=mk('button');calAdd.textContent='+ Add meal';calAdd.style.cssText='width:100%;padding:11px;border-radius:var(--rm);background:var(--green);color:#fff;font-size:13px;font-weight:800;margin-top:8px;';
    const calWrap=mk('div');

    function setPendingPhoto(src){
      pendingPhoto=src||'';
      photoTile.innerHTML=pendingPhoto?`<img src="${pendingPhoto}" alt="Meal photo preview">`:'<div><div style="font-size:24px;margin-bottom:4px;">📷</div><div>Add meal photo</div><div style="font-size:10px;font-weight:500;margin-top:2px;">camera or gallery</div></div>';
    }
    function resizeMealPhoto(file,cb){
      const reader=new FileReader();
      reader.onload=ev=>{
        const img=new Image();
        img.onload=()=>{
          const max=720;
          const scale=Math.min(1,max/Math.max(img.width,img.height));
          const canvas=document.createElement('canvas');
          canvas.width=Math.max(1,Math.round(img.width*scale));
          canvas.height=Math.max(1,Math.round(img.height*scale));
          canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);
          cb(canvas.toDataURL('image/jpeg',0.72));
        };
        img.onerror=()=>cb(ev.target.result);
        img.src=ev.target.result;
      };
      reader.readAsDataURL(file);
    }
    function saveCalories(){LS.set('calorie_entries',calories);}
    function renderMealTabs(){
      calTabs.innerHTML='';
      const selectedDate=calDate.value||todayValue();
      mealTypes.forEach(meal=>{
        const mealTotal=calories.filter(e=>e.date===selectedDate&&(e.meal||'Other')===meal).reduce((s,e)=>s+(parseInt(e.calories)||0),0);
        const btn=mk('button');btn.className=meal===selectedMeal?'active':'';
        btn.innerHTML=`${meal}<br><span style="font-size:10px;font-weight:500;">${mealTotal||0}</span>`;
        btn.addEventListener('click',()=>{selectedMeal=meal;renderCalories();});
        calTabs.appendChild(btn);
      });
    }
    function renderCalories(){
      const selectedDate=calDate.value||todayValue();
      const goal=parseInt(calGoal.value)||0;
      const dayEntries=calories.filter(e=>e.date===selectedDate);
      const dayTotal=dayEntries.reduce((sum,e)=>sum+(parseInt(e.calories)||0),0);
      const remaining=Math.max(0,goal-dayTotal);
      const pct=goal?Math.min(100,Math.round(dayTotal/goal*100)):0;
      calHero.innerHTML=`<div style="display:flex;gap:14px;align-items:center;flex-wrap:wrap;">
        <div class="cal-ring" style="--cal-pct:${pct}%"><div class="cal-ring-inner"><div style="font-size:20px;font-weight:800;color:var(--green-dark);">${remaining.toLocaleString()}</div><div style="font-size:10px;color:var(--text3);font-weight:700;">cal left</div></div></div>
        <div style="flex:1;min-width:210px;">
          <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:8px;">
            <div><div class="clabel" style="margin:0;">Daily calories</div><div style="font-size:13px;color:var(--text3);">Tap a meal, add calories, optionally attach a photo.</div></div>
          </div>
          <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;">
            <div class="cal-stat"><div style="font-size:16px;font-weight:800;color:var(--text);">${dayTotal.toLocaleString()}</div><div style="font-size:10px;color:var(--text3);font-weight:700;">eaten</div></div>
            <div class="cal-stat"><div style="font-size:16px;font-weight:800;color:var(--green-dark);">${goal.toLocaleString()}</div><div style="font-size:10px;color:var(--text3);font-weight:700;">goal</div></div>
            <div class="cal-stat"><div style="font-size:16px;font-weight:800;color:${dayTotal>goal?'var(--orange-dark)':'var(--blue)'};">${pct}%</div><div style="font-size:10px;color:var(--text3);font-weight:700;">logged</div></div>
          </div>
        </div>
      </div>`;
      renderMealTabs();
      calWrap.innerHTML='';
      if(!dayEntries.length){
        const empty=mk('div');empty.style.cssText='font-size:12px;color:var(--text3);padding:14px;text-align:center;background:var(--white);border-radius:var(--rm);border:1px dashed var(--border);';
        empty.textContent='No meals logged for this date yet. Add your first meal below.';
        calWrap.appendChild(empty);
      }
      dayEntries.forEach(entry=>{
        const realIdx=calories.findIndex(e=>String(e.id)===String(entry.id));
        const card=mk('div','cal-card');
        const thumb=mk('div','cal-thumb');thumb.innerHTML=entry.photo?`<img src="${entry.photo}" alt="Meal photo">`:'🍽️';
        const info=mk('div');
        const mealSel=mk('select','inp');mealSel.style.cssText='font-size:11px;padding:5px;margin-bottom:5px;max-width:150px;';
        mealTypes.forEach(meal=>{const o=mk('option');o.value=meal;o.textContent=meal;if((entry.meal||'Other')===meal)o.selected=true;mealSel.appendChild(o);});
        mealSel.addEventListener('change',e=>{if(realIdx>-1){calories[realIdx].meal=e.target.value;saveCalories();renderCalories();}});
        const nameIn=mk('input','inp');nameIn.value=entry.name||'';nameIn.placeholder='Food / meal';nameIn.style.cssText='font-size:12px;margin-bottom:5px;';
        nameIn.addEventListener('input',e=>{if(realIdx>-1){calories[realIdx].name=e.target.value;saveCalories();}});
        const amountIn=mk('input','inp');amountIn.type='number';amountIn.min='0';amountIn.step='1';amountIn.value=parseInt(entry.calories)||0;amountIn.style.cssText='font-size:12px;';
        amountIn.addEventListener('input',e=>{if(realIdx>-1){calories[realIdx].calories=parseInt(e.target.value)||0;saveCalories();renderCalories();}});
        info.appendChild(mealSel);info.appendChild(nameIn);info.appendChild(amountIn);
        const del=mk('button');del.textContent='×';del.title='Delete meal';del.style.cssText='color:var(--text4);font-size:18px;padding:4px 8px;';
        del.addEventListener('click',()=>{if(realIdx>-1){calories.splice(realIdx,1);saveCalories();renderCalories();}});
        card.appendChild(thumb);card.appendChild(info);card.appendChild(del);calWrap.appendChild(card);
      });
    }
    calGoal.addEventListener('input',()=>{LS.set('calorie_goal',parseInt(calGoal.value)||0);renderCalories();});
    calDate.addEventListener('input',renderCalories);
    photoTile.addEventListener('click',()=>photoInput.click());
    photoInput.addEventListener('change',e=>{
      const file=e.target.files&&e.target.files[0];
      if(!file)return;
      resizeMealPhoto(file,setPendingPhoto);
    });
    calAdd.addEventListener('click',()=>{
      const amount=parseInt(calAmount.value);
      if(!amount||amount<0)return;
      calories.push({id:Date.now(),date:calDate.value||todayValue(),meal:selectedMeal,name:calName.value.trim(),calories:amount,photo:pendingPhoto});
      saveCalories();
      calName.value='';calAmount.value='';photoInput.value='';setPendingPhoto('');
      renderCalories();
    });
    const calControls=mk('div');calControls.style.cssText='display:flex;justify-content:space-between;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:10px;';
    calControls.appendChild(fld('Date',calDate,0));calControls.appendChild(fld('Daily goal',calGoal,0));
    const calForm=mk('div');calForm.style.cssText='display:grid;grid-template-columns:1fr 120px 120px;gap:8px;margin:10px 0;align-items:stretch;';
    calForm.appendChild(calName);calForm.appendChild(calAmount);calForm.appendChild(photoTile);
    const calClear=mk('button');calClear.textContent='Clear selected day';calClear.style.cssText='font-size:11px;color:var(--text3);margin-top:8px;text-decoration:underline;';
    calClear.addEventListener('click',()=>{
      const selectedDate=calDate.value||todayValue();
      calories=calories.filter(e=>e.date!==selectedDate);
      saveCalories();
      renderCalories();
    });
    setPendingPhoto('');
    calBox.appendChild(calControls);calBox.appendChild(calHero);calBox.appendChild(calTabs);calBox.appendChild(calForm);calBox.appendChild(photoInput);calBox.appendChild(calAdd);calBox.appendChild(calWrap);calBox.appendChild(calClear);
    renderCalories();
    b.appendChild(calBox);

    // Meal prep & grocery planning
    const mpd=mk('div');mpd.style.cssText='background:var(--bg);border-radius:var(--rm);padding:12px;margin-top:8px;';
    mpd.innerHTML='<div class="clabel">Meal prep & grocery schedule</div>';
    ['Meal planning','Meal prep','Grocery shopping'].forEach(task=>{
      const row=mk('div');row.style.cssText='display:flex;align-items:center;gap:8px;margin-bottom:8px;';
      const key=`mprep_${task}`;
      let data=LS.get(key,{done:false,date:''});
      const chk=mk('div','chk'+(data.done?' done':''));
      if(data.done)chk.innerHTML='<svg width="10" height="8" viewBox="0 0 10 8"><path d="M1 4l3 3L9 1" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>';
      chk.addEventListener('click',()=>{
        data.done=!data.done;LS.set(key,data);
        chk.className='chk'+(data.done?' done':'');
        chk.innerHTML=data.done?'<svg width="10" height="8" viewBox="0 0 10 8"><path d="M1 4l3 3L9 1" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>':'';
      });
      const lbl=mk('span');lbl.style.cssText='font-size:13px;font-weight:500;color:var(--text);min-width:120px;';lbl.textContent=task;
      const di=mk('input','inp');di.type='datetime-local';di.value=data.date;di.style.cssText='font-size:12px;flex:1;';
      di.addEventListener('input',e=>{data.date=e.target.value;LS.set(key,data);});
      const csb=calSyncBtn('Sync',`mprep_${task}`,{title:task,date:data.date,type:'meal_prep'});
      row.appendChild(chk);row.appendChild(lbl);row.appendChild(di);row.appendChild(csb);mpd.appendChild(row);
    });
    b.appendChild(mpd);

    // Grocery list
    const gld=mk('div');gld.style.cssText='background:var(--bg);border-radius:var(--rm);padding:12px;margin-top:10px;';
    gld.innerHTML='<div class="clabel" style="margin-bottom:8px;">Grocery list</div>';
    let groceries=LS.get('groceries',[]);
    const glWrap=mk('div');
    const renderGL=()=>{
      glWrap.innerHTML='';
      groceries.forEach((g,i)=>{
        const row=mk('div');row.style.cssText='display:flex;align-items:center;gap:8px;margin-bottom:5px;';
        const chk=mk('div','chk'+(g.done?' done':''));
        if(g.done)chk.innerHTML='<svg width="10" height="8" viewBox="0 0 10 8"><path d="M1 4l3 3L9 1" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>';
        chk.addEventListener('click',()=>{g.done=!g.done;LS.set('groceries',groceries);renderGL();});
        const gi=mk('input','inp');gi.value=g.text;gi.style.cssText='font-size:12px;flex:1;text-decoration:'+(g.done?'line-through':'none')+';';
        gi.addEventListener('input',e=>{g.text=e.target.value;LS.set('groceries',groceries);});
        const del=mk('button');del.textContent='×';del.style.cssText='color:var(--text4);font-size:16px;';
        del.addEventListener('click',()=>{groceries.splice(i,1);LS.set('groceries',groceries);renderGL();});
        row.appendChild(chk);row.appendChild(gi);row.appendChild(del);glWrap.appendChild(row);
      });
    };
    renderGL();
    gld.appendChild(glWrap);
    gld.appendChild(addbtn('Add item',()=>{groceries.push({text:'',done:false});LS.set('groceries',groceries);renderGL();}));
    b.appendChild(gld);
  },true));

  // ── WORKOUT PLAN ─────────────────────────────────────────────────────────
  wrap.appendChild(sblock('Workout Plan','💪',b=>{
    const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const today=new Date();const weekStart=new Date(today);weekStart.setDate(today.getDate()-today.getDay());
    const wg=mk('div','week-grid');
    days.forEach((d,i)=>{
      const date=new Date(weekStart);date.setDate(weekStart.getDate()+i);
      const key=`workout_${date.toDateString()}`;
      let data=LS.get(key,{plan:'',time:'',location:'',done:false});
      const col=mk('div','week-col');
      col.innerHTML=`<div class="wday">${d}</div><div class="wdate">${date.getMonth()+1}/${date.getDate()}</div>`;
      const pi=mk('textarea','inp');pi.placeholder='Workout…';pi.value=data.plan;pi.rows=3;pi.style.cssText='font-size:11px;margin-bottom:4px;';
      pi.addEventListener('input',e=>{data.plan=e.target.value;LS.set(key,data);});
      const ti=mk('input','inp');ti.type='time';ti.value=data.time;ti.style.cssText='font-size:11px;margin-bottom:4px;';
      ti.addEventListener('input',e=>{data.time=e.target.value;LS.set(key,data);});
      const li=mk('input','inp');li.placeholder='Location';li.value=data.location;li.style.cssText='font-size:11px;margin-bottom:4px;';
      li.addEventListener('input',e=>{data.location=e.target.value;LS.set(key,data);});
      const csb=calSyncBtn('Sync','workout_'+date.toDateString(),{title:'Workout',date:date.toDateString(),time:data.time,location:data.location,type:'workout'});
      csb.style.fontSize='10px';
      col.appendChild(pi);col.appendChild(ti);col.appendChild(li);col.appendChild(csb);wg.appendChild(col);
    });
    b.appendChild(wg);
  },false));

  // ── BODY METRICS ─────────────────────────────────────────────────────────
  wrap.appendChild(sblock('Body Metrics','📏',b=>{
    let m=LS.get('body_met',{weight:'',height:'',bmi:'',fat:'',goalWeight:'',waist:'',hips:'',chest:'',arms:'',legs:''});
    const save=()=>LS.set('body_met',m);
    b.appendChild(infoBox('💡 Track up to 3 time-period groups for before/after comparisons.','blue'));
    const row1=mk('div');row1.innerHTML='<div class="clabel">Measurements</div>';
    row1.appendChild(grid('1fr 1fr 1fr 1fr 1fr',
      fld('Weight (lbs)',inp('—',m.weight,v=>{m.weight=v;save();})),
      fld('Height',inp('—',m.height,v=>{m.height=v;save();})),
      fld('BMI',inp('—',m.bmi,v=>{m.bmi=v;save();})),
      fld('Body Fat %',inp('—',m.fat,v=>{m.fat=v;save();})),
      fld('Goal Weight',inp('—',m.goalWeight,v=>{m.goalWeight=v;save();}))
    ));
    b.appendChild(row1);
    const row2=mk('div');row2.innerHTML='<div class="clabel">Circumference (inches)</div>';
    row2.appendChild(grid('1fr 1fr 1fr 1fr 1fr',
      fld('Waist',inp('—',m.waist,v=>{m.waist=v;save();})),
      fld('Hips',inp('—',m.hips,v=>{m.hips=v;save();})),
      fld('Chest',inp('—',m.chest,v=>{m.chest=v;save();})),
      fld('Arms',inp('—',m.arms,v=>{m.arms=v;save();})),
      fld('Legs',inp('—',m.legs,v=>{m.legs=v;save();}))
    ));
    b.appendChild(row2);
  },false));

  // ── 30-DAY TRACKER ────────────────────────────────────────────────────────
  wrap.appendChild(sblock('30-Day Tracker','📈',b=>{
    const metrics=[

      metrics.filter(m=>enabledMetrics[m.key]).forEach(mt=>{

        gl.appendChild(gn);gw.appendChild(gl);

        // Build 30 days of data
        const pts=[];
        for(let i=29;i>=0;i--){
          const d=new Date();d.setDate(d.getDate()-i);
          const key=d.toISOString().split('T')[0];
          pts.push({d:d.getDate(),v:trackerData[key]?parseFloat(trackerData[key][mt.key])||null:null});
        }

        // Mini canvas graph
        const canvas=mk('canvas');canvas.width=600;canvas.height=80;canvas.style.cssText='width:100%;height:80px;display:block;';
        gw.appendChild(canvas);

        setTimeout(()=>{
          const ctx=canvas.getContext('2d');
          const W=canvas.width,H=canvas.height;
          ctx.clearRect(0,0,W,H);
          const vals=pts.map(p=>p.v).filter(v=>v!==null);
          if(!vals.length){ctx.fillStyle='#A8BDD1';ctx.font='12px sans-serif';ctx.textAlign='center';ctx.fillText('No data yet — add data above',W/2,H/2);return;}
          const maxV=Math.max(...vals)*1.2||10;
          const step=W/29;
          ctx.strokeStyle=mt.color;ctx.lineWidth=2;ctx.lineJoin='round';ctx.lineCap='round';
          ctx.beginPath();
          let first=true;
          pts.forEach((p,i)=>{
            if(p.v===null)return;
            const x=i*step;const y=H-(p.v/maxV)*(H-16)-4;
            if(first){ctx.moveTo(x,y);first=false;}else ctx.lineTo(x,y);
          });
          ctx.stroke();
          // Fill under line
          ctx.fillStyle=mt.color+'22';
          ctx.beginPath();
          let fx=null,fy=null;
          pts.forEach((p,i)=>{
            if(p.v===null)return;
            const x=i*step;const y=H-(p.v/maxV)*(H-16)-4;
            if(fx===null){ctx.moveTo(x,H);ctx.lineTo(x,y);fx=x;fy=y;}else ctx.lineTo(x,y);
          });
          if(fx!==null){ctx.lineTo(pts[pts.length-1-[...pts].reverse().findIndex(p=>p.v!==null)]*step+step,H);ctx.closePath();ctx.fill();}
          // Dots
          pts.forEach((p,i)=>{if(p.v===null)return;const x=i*step;const y=H-(p.v/maxV)*(H-16)-4;ctx.fillStyle=mt.color;ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);ctx.fill();});

          ctx.fillStyle='#A8BDD1';ctx.font='9px sans-serif';ctx.textAlign='center';

      calPanel.appendChild(note);
      rd.appendChild(calPanel);

      // Tasks section
      const tasksPanel=mk('div');tasksPanel.style.cssText='padding:12px 14px;background:var(--white);';
      const tWrap=mk('div');
      const renderTasks=()=>{
        tWrap.innerHTML='';
        const done=tasks.filter(t=>t.done).length;
        if(tasks.length){
          const prog=mk('div');prog.style.cssText='display:flex;align-items:center;gap:8px;margin-bottom:8px;';
          const bw=mk('div','bar-wrap');bw.style.cssText='flex:1;height:5px;';
          const bf=mk('div','bar-fill');bf.style.cssText=`width:${tasks.length?Math.round(done/tasks.length*100):0}%;background:${routine.color};`;
          bw.appendChild(bf);
          const pct=mk('span');pct.style.cssText=`font-size:11px;font-weight:600;color:${routine.colorDark};`;pct.textContent=done+'/'+tasks.length;
          prog.appendChild(bw);prog.appendChild(pct);tWrap.appendChild(prog);
        }
        tasks.forEach((t,i)=>{
          const row=mk('div');row.style.cssText='display:flex;align-items:center;gap:8px;margin-bottom:6px;';
          const chk=mk('div','chk'+(t.done?' done':''));
          if(t.done)chk.innerHTML='<svg width="10" height="8" viewBox="0 0 10 8"><path d="M1 4l3 3L9 1" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>';
          chk.addEventListener('click',()=>{t.done=!t.done;LS.set(routine.key,tasks);renderTasks();});
          const ti=mk('input','inp');ti.value=t.text||'';ti.placeholder='Task…';ti.style.cssText='flex:1;font-size:12px;border:none;background:transparent;';
          ti.addEventListener('input',e=>{t.text=e.target.value;LS.set(routine.key,tasks);});
          const del=mk('button');del.textContent='×';del.style.cssText='color:var(--text4);font-size:16px;cursor:pointer;';
          del.addEventListener('click',()=>{tasks.splice(i,1);LS.set(routine.key,tasks);renderTasks();});
          row.appendChild(chk);row.appendChild(ti);row.appendChild(del);tWrap.appendChild(row);
        });
      };
      renderTasks();
      tasksPanel.appendChild(tWrap);
      tasksPanel.appendChild(addbtn('Add task',()=>{tasks.push({text:'',done:false});LS.set(routine.key,tasks);renderTasks();}));
      rd.appendChild(tasksPanel);
      b.appendChild(rd);
    });

    // Streak
    const streak=LS.get('habit_streak',0);
    const sd=mk('div');sd.style.cssText='display:flex;align-items:center;justify-content:center;gap:8px;padding:12px;background:var(--orange-light);border-radius:var(--rm);margin-top:4px;';
    sd.innerHTML=`<span style="font-size:20px;">🔥</span><span style="font-size:16px;font-weight:700;color:var(--orange-dark);">${streak} day streak</span>`;
    b.appendChild(sd);
  },false));
}

// ═══════════════════════════════════════════════════════════════════════════
// VEHICLE
// ═══════════════════════════════════════════════════════════════════════════
function buildVehicle(wrap){
  let cars=LS.get('cars',[]);
  const carsWrap=mk('div');carsWrap.id='carsWrap';wrap.appendChild(carsWrap);

  const renderCars=()=>{
    carsWrap.innerHTML='';
    cars.forEach((car,ci)=>{
      const block=sblock((car.year&&car.make)?`${car.year} ${car.make} ${car.model}`:'Vehicle '+(ci+1),'🚗',b=>{
        // Details
        b.appendChild(grid('1fr 1fr 1fr',
          fld('Year',inp('2022',car.year,v=>{car.year=v;LS.set('cars',cars);})),
          fld('Make',inp('Toyota',car.make,v=>{car.make=v;LS.set('cars',cars);})),
          fld('Model',inp('Camry',car.model,v=>{car.model=v;LS.set('cars',cars);}))
        ));
        // Lease info with finances link
        const lbox=mk('div');lbox.style.cssText='padding:10px 12px;background:var(--bg);border-radius:var(--rm);border:1px solid var(--border2);margin-bottom:10px;';
        lbox.innerHTML='<div style="font-size:12px;font-weight:700;color:var(--text2);margin-bottom:8px;">Leasing Info</div>';
        lbox.appendChild(grid('1fr 1fr 1fr',
          fld('Due date',inp('1st of month',car.leaseDate,v=>{car.leaseDate=v;LS.set('cars',cars);})),
          fld('Payment',inp('$350/mo',car.payment,v=>{car.payment=v;LS.set('cars',cars);})),
          fld('Leasing bank',inp('Toyota Financial',car.bank,v=>{car.bank=v;LS.set('cars',cars);}))
        ));
        const finRow=mk('div');finRow.style.cssText='display:flex;gap:8px;align-items:center;';
        const finBtn=mk('button');finBtn.style.cssText='font-size:11px;padding:4px 10px;border-radius:var(--r);background:var(--green-light);color:var(--green-dark);font-weight:600;border:1px solid #BBF7D0;cursor:pointer;';
        finBtn.innerHTML='💰 Auto-add to Finances';
        finBtn.addEventListener('click',()=>{
          if(car.payment&&car.leaseDate){
            const fe=LS.get('fin_exp',[]);
            const exists=fe.find(e=>e.cat==='Car lease — '+(car.make||'Vehicle '+(ci+1)));
            if(!exists){fe.push({id:Date.now(),cat:'Car lease — '+(car.make||'Vehicle '+(ci+1)),budget:car.payment,actual:'',type:'need',due:car.leaseDate,source:'vehicle'});LS.set('fin_exp',fe);}
            const calEvt=LS.get('cal_events',[]);calEvt.push({title:'Car lease payment — '+(car.make||''),date:car.leaseDate,type:'payment',recurring:'monthly'});LS.set('cal_events',calEvt);
            finBtn.style.background='var(--green)';finBtn.style.color='#fff';finBtn.textContent='✓ Added to Finances & Calendar';
          }else{alert('Please enter due date and payment amount first.');}
        });
        finRow.appendChild(finBtn);lbox.appendChild(finRow);b.appendChild(lbox);

        // Maintenance
        let maint=LS.get('car_maint_'+ci,[
          {id:1,label:'Oil change',months:5,done:false,nextDue:''},
          {id:2,label:'Rotate tires',months:10,done:false,nextDue:''},
          {id:3,label:'Replace wipers',months:10,done:false,nextDue:''},
          {id:4,label:'Replace air & cabin filters',months:10,done:false,nextDue:''},
          {id:5,label:'Register car',months:12,done:false,nextDue:''},
          {id:6,label:'Car insurance renewal',months:12,done:false,nextDue:''},
          {id:7,label:'Change tires',months:48,done:false,nextDue:''},
          {id:8,label:'Brake pads',months:48,done:false,nextDue:''},
          {id:9,label:'Spark plugs',months:48,done:false,nextDue:''},
          {id:10,label:'Coolant flush',months:48,done:false,nextDue:''},
        ]);
        const mw=mk('div');mw.innerHTML='<div class="clabel" style="margin-top:12px;">Maintenance tracker</div>';
        const done=maint.filter(m=>m.done).length;
        const prow=mk('div');prow.style.cssText='display:flex;align-items:center;gap:10px;margin-bottom:8px;';
        prow.innerHTML=`<span style="font-size:12px;color:var(--text3);flex-shrink:0">${done}/${maint.length}</span>`;
        const bw=mk('div','bar-wrap');bw.style.cssText='flex:1;height:7px;';
        const bf=mk('div','bar-fill');bf.style.cssText=`width:${Math.round(done/maint.length*100)}%;background:var(--green);`;
        bw.appendChild(bf);prow.appendChild(bw);mw.appendChild(prow);

        const renderMaint=()=>{
          const existing=mw.querySelectorAll('.maint-row');existing.forEach(e=>e.remove());
          maint.forEach(m=>{
            const row=mk('div','check-row maint-row');
            const chk=mk('div','chk'+(m.done?' done':''));
            if(m.done)chk.innerHTML='<svg width="10" height="8" viewBox="0 0 10 8"><path d="M1 4l3 3L9 1" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>';
            chk.addEventListener('click',()=>{m.done=!m.done;LS.set('car_maint_'+ci,maint);renderMaint();});
            const info=mk('div');info.style.flex='1';
            const lbl=mk('div');lbl.style.cssText=`font-size:13px;color:${m.done?'var(--text3)':'var(--text)'};text-decoration:${m.done?'line-through':'none'};`;lbl.textContent=m.label;
            const sub=mk('div');sub.style.cssText='font-size:11px;color:var(--text3);margin-top:1px;';
            sub.textContent='Every '+m.months+' months'+(m.nextDue?' · Next: '+m.nextDue:'');
            info.appendChild(lbl);info.appendChild(sub);
            // Date/time inputs
            const di=mk('input','inp');di.type='datetime-local';di.placeholder='Date done';di.value=m.completedDate||'';di.style.cssText='width:160px;font-size:11px;';
            di.addEventListener('input',e=>{
              m.completedDate=e.target.value;
              if(e.target.value)m.nextDue=addMonthsDateValue(e.target.value,m.months);
              LS.set('car_maint_'+ci,maint);
              renderMaint();
            });
            const eventDate=m.nextDue?dateValue(m.nextDue):dateValue(m.completedDate);
            const csb=calSyncBtn('Sync','car_maint_'+m.id+ci,{title:m.label,date:combineLocalDateTime(eventDate||todayValue(),'09:00'),time:'09:00',type:'vehicle_maintenance',duration:30,recurMonths:m.months});
            row.appendChild(chk);row.appendChild(info);row.appendChild(di);row.appendChild(csb);mw.appendChild(row);
            // Next due when done
            if(m.done&&!m.nextDue){
              m.completedDate=m.completedDate||combineLocalDateTime(todayValue(),'09:00');
              m.nextDue=addMonthsDateValue(m.completedDate,m.months);LS.set('car_maint_'+ci,maint);
            }
          });
        };
        renderMaint();b.appendChild(mw);

        // Notes
        b.appendChild(fld('Vehicle notes',ta('VIN, insurance info, quirks, notes…',car.notes,v=>{car.notes=v;LS.set('cars',cars);},2)));
        // Custom data fields
        const cdfBox=mk('div');cdfBox.style.cssText='padding:10px 12px;background:var(--bg);border-radius:var(--rm);border:1px solid var(--border2);margin-bottom:10px;';
        cdfBox.innerHTML='<div style="font-size:12px;font-weight:700;color:var(--text2);margin-bottom:8px;">📌 Custom info (tires, insurance, etc.)</div>';
        let cFields=LS.get('car_custom_'+ci,[]);
        const renderCF=()=>{
          const wrap2=cdfBox.querySelector('.cf-wrap')||(()=>{const d=mk('div');d.className='cf-wrap';cdfBox.appendChild(d);return d;})();
          wrap2.innerHTML='';
          cFields.forEach((cf,cfi)=>{
            const row=mk('div');row.style.cssText='display:flex;gap:6px;margin-bottom:6px;align-items:center;';
            const li=mk('input','inp');li.placeholder='Label (e.g. Tires)';li.value=cf.label||'';li.style.cssText='flex:1;font-size:12px;';li.addEventListener('input',e=>{cf.label=e.target.value;LS.set('car_custom_'+ci,cFields);});
            const vi=mk('input','inp');vi.placeholder='Value (e.g. Michelin 225/65R17)';vi.value=cf.value||'';vi.style.cssText='flex:2;font-size:12px;';vi.addEventListener('input',e=>{cf.value=e.target.value;LS.set('car_custom_'+ci,cFields);});
            const del=mk('button');del.textContent='×';del.style.cssText='padding:4px 8px;border-radius:var(--r);border:1px solid var(--border);background:var(--white);color:var(--text3);cursor:pointer;font-size:14px;flex-shrink:0;';del.addEventListener('click',()=>{cFields.splice(cfi,1);LS.set('car_custom_'+ci,cFields);renderCF();});
            row.appendChild(li);row.appendChild(vi);row.appendChild(del);wrap2.appendChild(row);
          });
          wrap2.appendChild(addbtn('+ Add custom field',()=>{cFields.push({label:'',value:''});LS.set('car_custom_'+ci,cFields);renderCF();}));
        };
        renderCF();b.appendChild(cdfBox);
        const docsBox=mk('div');docsBox.style.cssText='padding:10px 12px;background:var(--bg);border-radius:var(--rm);border:1px solid var(--border2);margin-bottom:10px;';
        docsBox.innerHTML='<div style="font-size:12px;font-weight:700;color:var(--text2);margin-bottom:8px;">📎 Vehicle documents</div>';
        if(isPro()){
          let docs=LS.get('car_docs_'+ci,[]);
          const docsWrap=mk('div');docsBox.appendChild(docsWrap);
          const renderDocs=()=>{
            docsWrap.innerHTML='';
            if(!docs.length){
              const empty=mk('div');empty.style.cssText='font-size:11px;color:var(--text3);margin-bottom:8px;';empty.textContent='Upload registration, insurance cards, receipts or maintenance records.';
              docsWrap.appendChild(empty);
            }
            docs.forEach((doc,di)=>{
              const row=mk('div');row.style.cssText='display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border2);';
              const link=mk('a');link.href=doc.data;link.target='_blank';link.rel='noopener';link.download=doc.name;link.style.cssText='flex:1;font-size:12px;color:var(--blue);font-weight:600;text-decoration:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;';link.textContent=doc.name;
              const meta=mk('span');meta.style.cssText='font-size:10px;color:var(--text3);';meta.textContent=doc.added?new Date(doc.added).toLocaleDateString():'';
              const del=mk('button');del.textContent='×';del.style.cssText='color:var(--text4);font-size:16px;';
              del.addEventListener('click',()=>{docs.splice(di,1);LS.set('car_docs_'+ci,docs);renderDocs();});
              row.appendChild(link);row.appendChild(meta);row.appendChild(del);docsWrap.appendChild(row);
            });
            const file=mk('input');file.type='file';file.multiple=true;file.style.display='none';
            file.addEventListener('change',()=>{
              Array.from(file.files||[]).forEach(f=>{
                const r=new FileReader();
                r.onload=ev=>{docs.push({id:Date.now()+Math.random(),name:f.name,type:f.type,size:f.size,data:ev.target.result,added:new Date().toISOString()});LS.set('car_docs_'+ci,docs);renderDocs();};
                r.readAsDataURL(f);
              });
              file.value='';
            });
            const up=mk('button','addbtn');up.innerHTML='<span style="font-size:16px;line-height:1">+</span> Upload document';
            up.addEventListener('click',()=>file.click());
            docsWrap.appendChild(file);docsWrap.appendChild(up);
          };
          renderDocs();
        }else{
          docsBox.appendChild(ubanner('file & document uploads'));
        }
        b.appendChild(docsBox);
      },ci===0);
      carsWrap.appendChild(block);
    });

    const addCarBtn=mk('button','addbtn add-car-btn');addCarBtn.innerHTML='<span style="font-size:16px">+</span> Add another vehicle';
    addCarBtn.addEventListener('click',()=>{
      cars.push({year:'',make:'',model:'',leaseDate:'',payment:'',bank:'',notes:''});
      LS.set('cars',cars);renderCars();
    });
    carsWrap.appendChild(addCarBtn);
  };
  renderCars();
}

// ═══════════════════════════════════════════════════════════════════════════
// HOUSING
// ═══════════════════════════════════════════════════════════════════════════
function buildHousing(wrap){
  // ── HOME DETAILS ──────────────────────────────────────────────────────────
  wrap.appendChild(sblock('Home Details','🏠',b=>{
    let info=LS.get('house',{type:'rent',place:'apartment',address:'',amount:'',dueDay:''});
    const save=()=>LS.set('house',info);
    const g=mk('div');g.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;';
    // Own/Rent toggle
    const td=mk('div');
    const tl=mk('label');tl.textContent='Own or Rent';tl.style.cssText='display:block;font-size:11px;font-weight:600;color:var(--text2);margin-bottom:4px;';
    const tog=mk('div','ttoggle');tog.style.marginBottom='0';
    ['own','rent'].forEach(t=>{
      const btn=mk('button',t===info.type?'active':'');btn.textContent=t;
      btn.addEventListener('click',()=>{info.type=t;save();tog.querySelectorAll('button').forEach(b=>b.className='');btn.className='active';});
      tog.appendChild(btn);
    });
    td.appendChild(tl);td.appendChild(tog);
    const pd=mk('div');
    const pl=mk('label');pl.textContent='Home type';pl.style.cssText='display:block;font-size:11px;font-weight:600;color:var(--text2);margin-bottom:4px;';
    const sel=mk('select','inp');sel.style.padding='8px 10px';
    ['apartment','house','condo','townhouse','manufactured home'].forEach(p=>{const o=mk('option');o.value=p;o.textContent=p.charAt(0).toUpperCase()+p.slice(1);if(info.place===p)o.selected=true;sel.appendChild(o);});
    sel.addEventListener('change',e=>{info.place=e.target.value;save();});
    pd.appendChild(pl);pd.appendChild(sel);
    g.appendChild(td);g.appendChild(pd);b.appendChild(g);
    b.appendChild(fld('Address',inp('123 Main St, City, State',info.address,v=>{info.address=v;save();})));
    b.appendChild(grid('1fr 1fr',
      fld('Monthly rent/mortgage amount',inp('$1,500',info.amount,v=>{info.amount=v;save();})),
      fld('Due day of month',inp('1st',info.dueDay,v=>{info.dueDay=v;save();}))
    ));
    // Link to finances button
    const finRow=mk('div');finRow.style.cssText='display:flex;gap:8px;margin-top:6px;';
    const finBtn=mk('button');finBtn.style.cssText='font-size:11px;padding:6px 12px;border-radius:var(--r);background:var(--green-light);color:var(--green-dark);font-weight:600;border:1px solid #BBF7D0;cursor:pointer;';
    finBtn.innerHTML='💰 Auto-add to Finances';
    finBtn.addEventListener('click',()=>{
      if(info.amount&&info.dueDay){
        const fe=LS.get('fin_exp',[]);
        if(!fe.find(e=>e.source==='housing_rent')){
          fe.push({id:Date.now(),cat:info.type==='rent'?'Rent':'Mortgage',budget:info.amount,actual:'',type:'need',due:info.dueDay,source:'housing_rent'});
          LS.set('fin_exp',fe);
          const calEvt=LS.get('cal_events',[]);
          calEvt.push({title:(info.type==='rent'?'Rent':'Mortgage')+' due',day:info.dueDay,type:'payment',recurring:'monthly'});
          LS.set('cal_events',calEvt);
          finBtn.style.background='var(--green)';finBtn.style.color='#fff';finBtn.textContent='✓ Added to Finances & Calendar';
        }else{finBtn.textContent='✓ Already linked';}
      }else{alert('Enter amount and due date first.');}
    });
    const rentLinkInput=mk('input','inp');rentLinkInput.placeholder='Rent/mortgage payment website URL…';rentLinkInput.style.cssText='flex:1;font-size:12px;';
    const openLink=mk('button');openLink.style.cssText='font-size:11px;padding:6px 12px;border-radius:var(--r);background:var(--blue-light);color:var(--blue);font-weight:600;border:1px solid var(--blue-muted);cursor:pointer;';
    openLink.textContent='Open payment site →';
    openLink.addEventListener('click',()=>{const u=rentLinkInput.value;if(u)window.open(u,'_blank');});
    finRow.appendChild(finBtn);b.appendChild(finRow);
    b.appendChild(fld('Payment website',rentLinkInput));
  },true));

  // ── CHORES ────────────────────────────────────────────────────────────────
  wrap.appendChild(sblock('Household Chores','🧹',b=>{
    let chores=LS.get('chores',[
      {id:1,label:'Vacuum / sweep floors',freq:'weekly',done:false,time:''},
      {id:2,label:'Clean bathrooms',freq:'weekly',done:false,time:''},
      {id:3,label:'Take out trash',freq:'weekly',done:false,time:''},
      {id:4,label:'Clean kitchen',freq:'weekly',done:false,time:''},
      {id:5,label:'Laundry',freq:'weekly',done:false,time:''},
      {id:6,label:'Dust surfaces',freq:'biweekly',done:false,time:''},
      {id:7,label:'Mop floors',freq:'biweekly',done:false,time:''},
      {id:8,label:'Clean refrigerator',freq:'monthly',done:false,time:''},
      {id:9,label:'Deep clean oven',freq:'monthly',done:false,time:''},
      {id:10,label:'Check smoke detectors',freq:'monthly',done:false,time:''},
    ]);
    const freqs=['daily','weekly','biweekly','monthly','annually'];
    const freqLabels={daily:'Daily',weekly:'Weekly',biweekly:'Bi-weekly',monthly:'Monthly',annually:'Annually'};
    const cWrap=mk('div');b.appendChild(cWrap);

    const renderChores=()=>{
      cWrap.innerHTML='';
      freqs.forEach(freq=>{
        const group=chores.filter(c=>c.freq===freq&&!c.done);
        if(!group.length)return;
        const lbl=mk('div','clabel');lbl.textContent=freqLabels[freq];cWrap.appendChild(lbl);
        group.forEach(c=>{
          const row=mk('div','check-row');
          const chk=mk('div','chk');
          chk.addEventListener('click',()=>{
            c.done=true;
            const nd=new Date(c.scheduleDate||new Date());
            if(isNaN(nd))nd.setTime(Date.now());
            if(c.freq==='daily')nd.setDate(nd.getDate()+1);
            else if(c.freq==='biweekly')nd.setDate(nd.getDate()+14);
            else if(c.freq==='monthly')nd.setMonth(nd.getMonth()+1);
            else if(c.freq==='annually')nd.setFullYear(nd.getFullYear()+1);
            else nd.setDate(nd.getDate()+7);
            c.scheduleDate=dateValue(nd);c.nextDue=c.scheduleDate;c.done=false;
            LS.set('chores',chores);
            if(c.synced)syncChoreToCalendar(c);
            renderChores();
          });
          const info=mk('div');info.style.flex='1';
          const ci=mk('input','inp');ci.value=c.label;ci.style.cssText='font-size:13px;border:none;background:transparent;padding:2px 4px;font-weight:500;';
          ci.addEventListener('input',e=>{c.label=e.target.value;LS.set('chores',chores);if(c.synced)syncChoreToCalendar(c);});
          const csub=mk('div');csub.style.cssText='font-size:10px;color:var(--text3);margin-top:1px;';
          csub.textContent=c.scheduleDate?'Scheduled: '+c.scheduleDate+(c.synced?' · synced':''):c.nextDue?'Next due: '+c.nextDue:'Pick a day to put this chore on your calendar.';
          info.appendChild(ci);info.appendChild(csub);
          const di=mk('input','inp');di.type='date';di.value=dateValue(c.scheduleDate||c.nextDue)||todayValue();di.style.cssText='width:130px;font-size:11px;';
          di.addEventListener('input',e=>{c.scheduleDate=e.target.value;c.nextDue=e.target.value;LS.set('chores',chores);if(c.synced)syncChoreToCalendar(c);renderChores();});
          const ti=mk('input','inp');ti.type='time';ti.value=c.time||'09:00';ti.style.cssText='width:100px;font-size:11px;';
          ti.addEventListener('input',e=>{c.time=e.target.value;LS.set('chores',chores);if(c.synced)syncChoreToCalendar(c);});
          const csb=mk('button');csb.style.cssText='font-size:11px;padding:4px 10px;border-radius:var(--r);background:var(--blue-light);color:var(--blue);font-weight:600;border:1px solid var(--blue-muted);cursor:pointer;display:flex;align-items:center;gap:4px;';
          csb.innerHTML=c.synced?'✓ Synced':'📅 Add to schedule';
          csb.addEventListener('click',()=>{
            c.scheduleDate=di.value||todayValue();c.nextDue=c.scheduleDate;c.time=ti.value||'09:00';
            syncChoreToCalendar(c);
            csb.style.background='var(--green-light)';csb.style.color='var(--green-dark)';csb.style.borderColor='var(--green)';csb.innerHTML='✓ Synced';
            renderChores();
          });
          const del=mk('button');del.textContent='×';del.style.cssText='color:var(--text4);font-size:16px;';
          del.addEventListener('click',()=>{chores=chores.filter(x=>x.id!==c.id);LS.set('chores',chores);LS.set('cal_events',LS.get('cal_events',[]).filter(e=>e.key!=='chore_'+c.id));renderChores();});
          row.appendChild(chk);row.appendChild(info);row.appendChild(di);row.appendChild(ti);row.appendChild(csb);row.appendChild(del);cWrap.appendChild(row);
        });
      });
      // Add chore form
      const addForm=mk('div');addForm.style.cssText='margin-top:10px;padding:10px;background:var(--bg);border-radius:var(--rm);';
      const newLabel=mk('input','inp');newLabel.placeholder='Chore name…';newLabel.style.cssText='font-size:12px;margin-bottom:6px;';
      const row2=mk('div');row2.style.cssText='display:flex;gap:8px;';
      const freqSel=mk('select','inp');freqSel.style.cssText='font-size:12px;padding:7px;flex:1;';
      freqs.forEach(f=>{const o=mk('option');o.value=f;o.textContent=freqLabels[f];freqSel.appendChild(o);});
      const timeIn=mk('input','inp');timeIn.type='time';timeIn.style.cssText='font-size:12px;width:120px;';
      const addBtn2=mk('button');addBtn2.style.cssText='padding:7px 14px;border-radius:var(--rm);background:var(--blue);color:#fff;font-size:12px;font-weight:600;border:none;cursor:pointer;white-space:nowrap;';
      addBtn2.textContent='+ Add';
      addBtn2.addEventListener('click',()=>{
        if(newLabel.value.trim()){
          chores.push({id:Date.now(),label:newLabel.value.trim(),freq:freqSel.value,time:timeIn.value||'09:00',done:false,nextDue:'',scheduleDate:todayValue()});
          LS.set('chores',chores);newLabel.value='';renderChores();
        }
      });
      row2.appendChild(freqSel);row2.appendChild(timeIn);row2.appendChild(addBtn2);
      addForm.appendChild(newLabel);addForm.appendChild(row2);cWrap.appendChild(addForm);
      b.appendChild(ubanner('assign chores to household members'));
    };
    renderChores();
  }));

  // ── UTILITIES ─────────────────────────────────────────────────────────────
  wrap.appendChild(sblock('Utility Tracker','💡',b=>{
    let utilities=LS.get('utilities',[
      {name:'Electric',amount:'',due:'',done:false,nextDue:''},
      {name:'Gas',amount:'',due:'',done:false,nextDue:''},
      {name:'Water',amount:'',due:'',done:false,nextDue:''},
      {name:'Internet',amount:'',due:'',done:false,nextDue:''},
      {name:'Trash',amount:'',due:'',done:false,nextDue:''},
    ]);
    const uWrap=mk('div');b.appendChild(uWrap);
    const renderUtils=()=>{
      uWrap.innerHTML='';
      const hdr=mk('div');hdr.style.cssText='display:grid;grid-template-columns:100px 1fr 1fr 120px 60px;gap:8px;margin-bottom:6px;';
      ['Utility','Monthly $','Due date','',''].forEach(h=>{const d=mk('div');d.style.cssText='font-size:10px;font-weight:700;color:var(--text4);text-transform:uppercase;';d.textContent=h;hdr.appendChild(d);});
      uWrap.appendChild(hdr);
      utilities.forEach(u=>{
        const row=mk('div');row.style.cssText='display:flex;align-items:center;gap:8px;margin-bottom:8px;';
        const lbl=mk('div');lbl.style.cssText='font-size:12px;font-weight:600;color:var(--text);min-width:80px;';lbl.textContent=u.name;
        const ai=mk('input','inp');ai.placeholder='$0';ai.value=u.amount;ai.style.cssText='font-size:12px;width:80px;';
        ai.addEventListener('input',e=>{u.amount=e.target.value;LS.set('utilities',utilities);});
        const di=mk('input','inp');di.type='date';di.value=u.due;di.style.cssText='font-size:12px;width:140px;';
        di.addEventListener('input',e=>{u.due=e.target.value;LS.set('utilities',utilities);});
        const chk=mk('div','chk'+(u.done?' done':''));
        if(u.done)chk.innerHTML='<svg width="10" height="8" viewBox="0 0 10 8"><path d="M1 4l3 3L9 1" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>';
        chk.addEventListener('click',()=>{
          u.done=!u.done;
          if(u.done){const nd=new Date(u.due||new Date());nd.setMonth(nd.getMonth()+1);u.nextDue=nd.toLocaleDateString();}
          LS.set('utilities',utilities);renderUtils();
        });
        const finBtn=mk('button');finBtn.style.cssText='font-size:10px;padding:4px 8px;border-radius:var(--r);background:var(--green-light);color:var(--green-dark);font-weight:600;border:1px solid #BBF7D0;cursor:pointer;';
        finBtn.innerHTML='💰';finBtn.title='Add to Finances';
        finBtn.addEventListener('click',()=>{
          const fe=LS.get('fin_exp',[]);
          if(!fe.find(e=>e.cat===u.name+' utility')){
            fe.push({id:Date.now(),cat:u.name+' utility',budget:u.amount,actual:'',type:'need',due:u.due,source:'utility_'+u.name});
            LS.set('fin_exp',fe);finBtn.textContent='✓';
          }
        });
        row.appendChild(lbl);row.appendChild(ai);row.appendChild(di);row.appendChild(chk);row.appendChild(finBtn);uWrap.appendChild(row);
        if(u.nextDue){const nd=mk('div');nd.style.cssText='font-size:10px;color:var(--green-dark);font-weight:600;margin-left:88px;margin-bottom:4px;';nd.textContent='✓ Paid · Next due: '+u.nextDue;uWrap.appendChild(nd);}
      });
    };
    renderUtils();
  }));

  // ── HOME MAINTENANCE ──────────────────────────────────────────────────────
  wrap.appendChild(sblock('Home Maintenance','🔨',b=>{
    let info=LS.get('house',{type:'rent',place:'apartment'});
    const maintByType={
      own:{house:['HVAC filter change (every 3 mo)','Check water heater (yearly)','Gutter cleaning (twice yearly)','Pest inspection (yearly)','Roof inspection (every 3–5 yrs)','Check caulking & seals (yearly)','Service garage door (yearly)','Test sump pump (yearly)'],
        apartment:['HVAC filter check (every 3 mo)','Test smoke & CO detectors (monthly)','Check for leaks (monthly)'],
        condo:['HVAC filter change (every 3 mo)','Check water heater (yearly)','Test smoke detectors (monthly)'],
        townhouse:['HVAC filter change (every 3 mo)','Gutter cleaning (twice yearly)','Pest inspection (yearly)','Test smoke detectors (monthly)'],
        'manufactured home':['HVAC filter change (every 3 mo)','Check roof seals (yearly)','Test smoke detectors (monthly)','Check skirting & vents (twice yearly)']},
      rent:{house:['Report any leaks to landlord','Test smoke & CO detectors (monthly)','Change HVAC filter if allowed (every 3 mo)'],
        apartment:['Test smoke & CO detectors (monthly)','Report maintenance issues to landlord','Change HVAC filter if allowed'],
        condo:['Test smoke & CO detectors (monthly)','Report issues to landlord or HOA'],
        townhouse:['Test smoke & CO detectors (monthly)','Report issues to landlord'],
        'manufactured home':['Test smoke & CO detectors (monthly)','Report issues to landlord']}
    };
    const tasks=(maintByType[info.type]||maintByType.rent)[info.place]||maintByType.rent.apartment;
    let savedMaint=LS.get('home_maint_'+info.type+'_'+info.place,tasks.map((t,i)=>({id:i,label:t,done:false,time:'',nextDue:''})));
    const mWrap=mk('div');b.appendChild(mWrap);
    const renderMaint=()=>{
      mWrap.innerHTML='';
      savedMaint.forEach(m=>{
        const row=mk('div','check-row');
        const chk=mk('div','chk'+(m.done?' done':''));
        if(m.done)chk.innerHTML='<svg width="10" height="8" viewBox="0 0 10 8"><path d="M1 4l3 3L9 1" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>';
        chk.addEventListener('click',()=>{m.done=!m.done;LS.set('home_maint_'+info.type+'_'+info.place,savedMaint);renderMaint();});
        const info2=mk('div');info2.style.flex='1';
        const lbl=mk('div');lbl.style.cssText=`font-size:13px;color:${m.done?'var(--text3)':'var(--text)'};text-decoration:${m.done?'line-through':'none'};`;lbl.textContent=m.label;
        if(m.nextDue){const nd=mk('div');nd.style.cssText='font-size:10px;color:var(--green-dark);margin-top:2px;';nd.textContent='Next: '+m.nextDue;info2.appendChild(nd);}
        info2.insertBefore(lbl,info2.firstChild);
        const ti=mk('input','inp');ti.type='datetime-local';ti.style.cssText='width:160px;font-size:11px;';
        const csb=calSyncBtn('Sync','hmaint_'+m.id,{title:m.label,type:'home_maintenance'});
        row.appendChild(chk);row.appendChild(info2);row.appendChild(ti);row.appendChild(csb);mWrap.appendChild(row);
      });
      mWrap.appendChild(addbtn('Add maintenance task',()=>{savedMaint.push({id:Date.now(),label:'',done:false,time:'',nextDue:''});LS.set('home_maint_'+info.type+'_'+info.place,savedMaint);renderMaint();}));
    };
    b.appendChild(infoBox(`🏠 Showing ${info.type==='own'?'homeowner':'renter'} maintenance for a ${info.place}. Update in Home Details to change.`,'blue'));
    renderMaint();
  }));

  // ── WHITEBOARD / INSPO ────────────────────────────────────────────────────
  wrap.appendChild(sblock('Whiteboard & Inspiration','🎨',b=>{
    b.appendChild(infoBox('🖊️ Free: sticky notes & text. Upgrade for image uploads & full collage builder.','blue'));
    let notes=LS.get('inspo_notes',[]);
    const colors=['#FEF3C7','#DBEAFE','#DCFCE7','#FCE7F3','#EDE9FE','#FFF7ED'];
    const notesGrid=mk('div');notesGrid.style.cssText='display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:10px;';

    const renderNotes=()=>{
      notesGrid.innerHTML='';
      notes.forEach((note,i)=>{
        const sn=mk('div','sticky-note');sn.style.cssText=`background:${note.color};border-radius:var(--rm);padding:12px;min-height:100px;position:relative;`;
        const del=mk('button','del-btn');del.textContent='×';del.style.cssText='position:absolute;top:6px;right:8px;font-size:18px;color:rgba(0,0,0,0.3);opacity:0;transition:opacity .2s;background:none;border:none;cursor:pointer;';
        sn.onmouseover=()=>del.style.opacity='1';sn.onmouseout=()=>del.style.opacity='0';
        del.addEventListener('click',()=>{notes.splice(i,1);LS.set('inspo_notes',notes);renderNotes();});
        const ta2=mk('textarea');ta2.style.cssText='background:transparent;border:none;outline:none;width:100%;font-size:13px;line-height:1.6;resize:none;font-family:var(--font);color:var(--text);min-height:80px;';
        ta2.value=note.text;ta2.placeholder='Type a note…';
        ta2.addEventListener('input',e=>{note.text=e.target.value;LS.set('inspo_notes',notes);});
        sn.appendChild(del);sn.appendChild(ta2);notesGrid.appendChild(sn);
      });
      b.appendChild(notesGrid);
    };
    renderNotes();

    // Color picker for new note
    const addRow=mk('div');addRow.style.cssText='display:flex;gap:8px;align-items:center;margin-top:4px;';
    const colorPicker=mk('div');colorPicker.style.cssText='display:flex;gap:4px;';
    let selectedColor=colors[0];
    colors.forEach(c=>{
      const dot=mk('div');dot.style.cssText=`width:20px;height:20px;border-radius:50%;background:${c};cursor:pointer;border:2px solid ${c===selectedColor?'var(--text)':'transparent'};transition:border .15s;`;
      dot.addEventListener('click',()=>{selectedColor=c;colorPicker.querySelectorAll('div').forEach(d=>d.style.border='2px solid transparent');dot.style.border='2px solid var(--text)';});
      colorPicker.appendChild(dot);
    });
    const addNoteBtn=mk('button');addNoteBtn.style.cssText='padding:7px 14px;border-radius:var(--rm);background:var(--blue);color:#fff;font-size:12px;font-weight:600;border:none;cursor:pointer;';
    addNoteBtn.textContent='+ Add sticky note';
    addNoteBtn.addEventListener('click',()=>{notes.push({text:'',color:selectedColor});LS.set('inspo_notes',notes);renderNotes();});
    addRow.appendChild(colorPicker);addRow.appendChild(addNoteBtn);b.appendChild(addRow);

    // Upgrade section for image collage
    b.appendChild(ubanner('image uploads & drag-and-drop collage builder'));
  },false));
}

// ═══════════════════════════════════════════════════════════════════════════
// ROUTER
// ═══════════════════════════════════════════════════════════════════════════
const PAGES={dashboard:buildDashboard,health:buildHealth,vehicle:buildVehicle,housing:buildHousing};

buildNav();
loadPage('dashboard');

// Re-render the current page when fresh data lands from another device.
window.addEventListener('peakly:sync-restored',()=>{
  try{ loadPage(cur||'dashboard'); }catch(e){}
});

// Re-render locks once Supabase has confirmed paid entitlement for this session.
window.addEventListener('peakly:entitlements-updated',()=>{
  try{
    const box = document.getElementById('upgradeBox');
    if(box) box.style.display = hasServerProAccess() ? 'none' : '';
    loadPage(cur||'dashboard');
  }catch(e){}
});

// Hide upgrade box for users with Pro access (paid or trial)
(function(){
  const hasAccess = hasServerProAccess();
  if(hasAccess){
    const box = document.getElementById('upgradeBox');
    if(box) box.style.display = 'none';
  }
})();
</script>
</body>
</html>
