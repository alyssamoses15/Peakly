<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Peakly — Life Admin (Part 2)</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --blue:#1A5FA8;--blue-light:#EFF6FF;--blue-dark:#0F3D6E;--blue-muted:#DBEAFE;
  --orange:#F97316;--orange-light:#FFF7ED;--orange-dark:#C2410C;--orange-muted:#FED7AA;
  --bg:#F0F4FA;--bg2:#E8EFF8;--white:#fff;
  --text:#0F1C2E;--text2:#3D5068;--text3:#7A93B0;--text4:#A8BDD1;
  --border:#D4E0EE;--border2:#EAF0F8;
  --green:#059669;--green-light:#ECFDF5;--green-dark:#065F46;
  --red:#DC2626;--red-light:#FEF2F2;
  --purple:#7C3AED;--purple-light:#F5F3FF;
  --font:'Plus Jakarta Sans',system-ui,sans-serif;
  --display:'Playfair Display',Georgia,serif;
  --r:8px;--rm:12px;--rl:16px;
  --shadow:0 1px 4px rgba(15,28,46,0.07),0 0 0 1px rgba(15,28,46,0.04);
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;}
button{font-family:var(--font);cursor:pointer;border:none;background:none;}
input,textarea,select{font-family:var(--font);}
textarea{resize:vertical;}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px;}
@keyframes slideIn{from{opacity:0;transform:translateX(-6px);}to{opacity:1;transform:translateX(0);}}
nav{background:var(--white);border-bottom:1px solid var(--border2);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:54px;position:sticky;top:0;z-index:100;box-shadow:0 1px 8px rgba(15,28,46,0.06);}
.nav-links{display:flex;gap:2px;}
.nav-links button{padding:6px 14px;border-radius:var(--rm);font-size:13px;color:var(--text2);transition:background .15s;}
.nav-links button.active{background:var(--blue);color:#fff;font-weight:600;}
.nav-links button:hover:not(.active){background:var(--bg);}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;}
.ph{background:var(--white);border-bottom:1px solid var(--border2);padding:16px 20px;}
.body{max-width:1380px;margin:0 auto;padding:18px 20px;display:grid;grid-template-columns:220px 1fr;gap:16px;align-items:start;}
.sidebar{position:sticky;top:72px;}
.snav{background:var(--white);border-radius:var(--rl);box-shadow:var(--shadow);border:1px solid var(--border2);overflow:hidden;margin-bottom:12px;}
.snav button{width:100%;padding:11px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border2);background:transparent;border-left:3px solid transparent;transition:all .15s;text-align:left;}
.snav button:last-child{border-bottom:none;}
.snav button.active{background:var(--blue-light);border-left-color:var(--blue);}
.snav button .ni{font-size:16px;}
.snav button .nl{font-size:13px;color:var(--text2);}
.snav button.active .nl{color:var(--blue);font-weight:700;}
.content{animation:slideIn .25s ease;}
.sblock{background:var(--white);border-radius:var(--rl);border:1px solid var(--border2);box-shadow:var(--shadow);overflow:hidden;margin-bottom:14px;}
.sh{padding:13px 16px;border-bottom:1px solid var(--border2);display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none;transition:background .15s;}
.sh:hover{background:var(--bg);}
.sh-left{display:flex;align-items:center;gap:8px;}
.sh-left .si{font-size:18px;}
.sh-left .st{font-size:14px;font-weight:700;color:var(--text);}
.sb{padding:16px;}
.sb.hidden{display:none;}
.inp{width:100%;padding:8px 10px;border-radius:var(--r);border:1px solid var(--border);font-size:13px;color:var(--text);background:var(--bg);outline:none;font-family:var(--font);transition:border-color .2s;}
.inp:focus{border-color:var(--blue);}
.clabel{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text4);margin-bottom:8px;}
.field{margin-bottom:10px;}
.field label{display:block;font-size:11px;font-weight:600;color:var(--text2);margin-bottom:4px;}
.check-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border2);}
.check-row:last-child{border-bottom:none;}
.chk{width:20px;height:20px;border-radius:6px;border:2px solid var(--border);background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;transition:all .2s;}
.chk.done{background:var(--green);border-color:var(--green);}
.info{padding:10px 12px;border-radius:var(--rm);font-size:12px;margin-bottom:10px;}
.info.blue{background:var(--blue-light);color:var(--blue);}
.info.orange{background:var(--orange-light);color:var(--orange-dark);}
.info.green{background:var(--green-light);color:var(--green-dark);}
.info.red{background:var(--red-light);color:var(--red);}
.ubanner{padding:10px 12px;background:var(--orange-light);border-radius:var(--rm);display:flex;align-items:center;gap:8px;border:1px solid var(--orange-muted);margin-top:10px;}
.ubanner h5{font-size:12px;font-weight:700;color:var(--orange-dark);}
.ubanner p{font-size:11px;color:var(--text3);}
.addbtn{width:100%;padding:8px;border-radius:var(--rm);border:1.5px dashed var(--border);font-size:12px;color:var(--text3);display:flex;align-items:center;justify-content:center;gap:6px;background:none;margin-top:8px;transition:all .15s;cursor:pointer;}
.addbtn:hover{border-color:var(--blue);color:var(--blue);}
.bar-wrap{background:var(--bg2);border-radius:100px;overflow:hidden;}
.bar-fill{height:100%;border-radius:100px;transition:width .6s ease;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:8px;}
.cal-day-hdr{font-size:10px;font-weight:700;color:var(--text4);text-align:center;padding:4px 0;}
.cal-day{min-height:56px;border-radius:var(--r);border:1px solid var(--border2);padding:4px;cursor:pointer;transition:background .15s;background:var(--white);}
.cal-day:hover{background:var(--blue-light);}
.cal-day.today{border-color:var(--blue);background:var(--blue-light);}
.cal-day.has-shift{background:#FFF7ED;border-color:var(--orange-muted);}
.cal-day .dn{font-size:11px;font-weight:600;color:var(--text3);}
.cal-day.today .dn{color:var(--blue);}
.cal-day .shift-label{font-size:9px;color:var(--orange-dark);font-weight:600;margin-top:2px;}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

(function(){

  const SKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJvZm50aGN6enBzc3dkdGxwYWhrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0MjgxNzEsImV4cCI6MjA5MjAwNDE3MX0.6K1IWbNSv0s0l283cGJbRQKF6FgnHQTAyK5s5z1zfeU';

    if(first)localStorage.setItem('peakly_user_name',first+(last?' '+last:''));

      } else {
        av.textContent=ini;
      }
    }
  });
})();
</script>
</head>
<body>
<nav>
  <div style="display:flex;align-items:center;gap:10px;">
    <svg width="32" height="32" viewBox="0 0 64 64"><rect width="64" height="64" rx="13" fill="#1A5FA8"/><polyline points="8,50 22,28 33,38 44,17 56,50" fill="none" stroke="white" stroke-width="3.2" stroke-linejoin="round" stroke-linecap="round"/><circle cx="44" cy="17" r="4.5" fill="#F97316"/><line x1="44" y1="17" x2="56" y2="17" stroke="#F97316" stroke-width="2.2" stroke-linecap="round"/></svg>
    <div><div style="font-family:var(--display);font-size:18px;font-weight:700;color:var(--text);">Peakly</div><div style="font-size:9px;color:var(--text4);letter-spacing:.8px;text-transform:uppercase;">Lock in your goals</div></div>
  </div>
  <div class="nav-links">
    <button onclick="window.location.href='peakly.html'">Home</button>
    <button onclick="window.location.href='peakly-goals.html'">Goals</button>
    <button class="active">Life Admin</button>
    <button onclick="window.location.href='peakly-calendar.html'">Calendar</button>
  </div>
  <div class="avatar" onclick="window.location.href='peakly-profile.html'" title="My account" style="cursor:pointer;" id="navAvatar">JD</div>

<div class="ph"><h1 style="font-family:var(--display);font-size:24px;font-weight:700;">🧠 Life Admin</h1><p style="font-size:13px;color:var(--text3);">Your life command center — everything in one place</p></div>
<div class="body">
  <div class="sidebar">
    <div class="snav" id="snav"></div>
    <div id="upgradeBox2" style="padding:14px;background:var(--orange-light);border-radius:var(--rl);border:1px solid var(--orange-muted);text-align:center;margin-bottom:10px;">
      <h4 style="font-size:12px;font-weight:700;color:var(--orange-dark);margin-bottom:4px;">⭐ Upgrade to Pro</h4>

      <button onclick="window.location.href='peakly-plan.html'" style="width:100%;padding:8px;border-radius:var(--rm);background:var(--orange);color:#fff;font-size:12px;font-weight:700;">Upgrade — $6/mo</button>
    </div>
    <div style="padding:10px 12px;background:var(--white);border-radius:var(--rl);border:1px solid var(--border2);font-size:11px;color:var(--text3);text-align:center;">
      Part 2 of 2 · <a href="peakly-second-brain-1.html" style="color:var(--blue);font-weight:600;text-decoration:none;">← Back to Part 1</a>
    </div>

  <div class="content" id="content"></div>
</div>

<script>
const LS={get:(k,d)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch{return d;}},set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}}};
function mk(tag,css,html){const e=document.createElement(tag);if(css)e.className=css;if(html)e.innerHTML=html;return e;}
function inp(ph,val,cb,type='text'){const i=mk('input','inp');i.type=type;i.placeholder=ph||'';i.value=val||'';if(cb)i.addEventListener('input',e=>cb(e.target.value));return i;}
function ta(ph,val,cb,rows=2){const t=mk('textarea','inp');t.placeholder=ph||'';t.value=val||'';t.rows=rows;if(cb)t.addEventListener('input',e=>cb(e.target.value));return t;}
function fld(lbl,inputEl,mb=10){const d=mk('div','field');d.style.marginBottom=mb+'px';const l=mk('label');l.textContent=lbl;d.appendChild(l);d.appendChild(inputEl);return d;}
function grid(cols,...kids){const d=mk('div');d.style.cssText=`display:grid;grid-template-columns:${cols};gap:10px;margin-bottom:10px;`;kids.filter(Boolean).forEach(k=>d.appendChild(k));return d;}
function sblock(title,icon,fn,open=true){
  const w=mk('div','sblock');
  const h=mk('div','sh');h.innerHTML=`<div class="sh-left"><span class="si">${icon||""}</span><span class="st">${title}</span></div><span style="font-size:20px;color:var(--text3);font-weight:300;">${open?'−':'+'}</span>`;
  const b=mk('div','sb'+(open?'':' hidden'));fn(b);
  h.addEventListener('click',()=>{const o=!b.classList.contains('hidden');b.classList.toggle('hidden',o);h.querySelector('span:last-child').textContent=o?'+':'−';});
  w.appendChild(h);w.appendChild(b);return w;
}
function chkRow(label,sub,done,onToggle){
  const r=mk('div','check-row');
  const c=mk('div','chk'+(done?' done':''));
  if(done)c.innerHTML='<svg width="10" height="8" viewBox="0 0 10 8"><path d="M1 4l3 3L9 1" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>';
  c.addEventListener('click',onToggle);
  const info=mk('div');info.style.flex='1';
  const lbl=mk('div');lbl.style.cssText=`font-size:13px;color:${done?'var(--text3)':'var(--text)'};text-decoration:${done?'line-through':'none'};`;lbl.textContent=label;
  info.appendChild(lbl);
  if(sub){const s=mk('div');s.style.cssText='font-size:11px;color:var(--text3);margin-top:1px;';s.textContent=sub;info.appendChild(s);}
  r.appendChild(c);r.appendChild(info);return r;
}
function ubanner(feat){const d=mk('div','ubanner');d.innerHTML=`<span style="font-size:16px">⭐</span><div><h5>Paid — ${feat}</h5><p>Upgrade to Peakly Pro</p></div>`;return d;}
function addbtn(lbl,cb){const b=mk('button','addbtn');b.innerHTML=`<span style="font-size:16px;line-height:1">+</span> ${lbl}`;if(cb)b.addEventListener('click',cb);return b;}
function infoBox(html,type='blue'){const d=mk('div','info '+type);d.innerHTML=html;return d;}
function calSyncBtn(label,getEvent){
  const b=mk('button');b.style.cssText='font-size:11px;padding:4px 10px;border-radius:var(--r);background:var(--blue-light);color:var(--blue);font-weight:600;border:1px solid var(--blue-muted);cursor:pointer;white-space:nowrap;';
  b.innerHTML='📅 '+label;
  b.addEventListener('click',()=>{
    if(typeof getEvent==='function'){
      const ev=getEvent();
      if(ev&&ev.title&&ev.date){
        const stored=LS.get('cal_events',[]);
        stored.push({...ev,synced:new Date().toISOString()});
        LS.set('cal_events',stored);
      }
    }
    b.style.background='var(--green-light)';b.style.color='var(--green-dark)';b.style.borderColor='var(--green)';b.innerHTML='✓ Saved';
    setTimeout(()=>{b.style.background='var(--blue-light)';b.style.color='var(--blue)';b.style.borderColor='var(--blue-muted)';b.innerHTML='📅 '+label;},2000);
  });
  return b;
}

const CORE_NAV=[
  {id:'professional',label:'Professional',icon:'💼',deletable:false},
  {id:'finances',label:'Finances',icon:'💰',deletable:false},
  {id:'family',label:'Family & Friends',icon:'👨‍👩‍👧',deletable:false},
  {id:'pets',label:'Pets',icon:'🐾',deletable:false},
  {id:'community',label:'Community',icon:'🌍',deletable:false},
  {id:'custom',label:'Template Library',icon:'✨',deletable:false},
];
let cur='professional';
let hiddenTabs=LS.get('hidden_tabs2',[]);
let customTabs=LS.get('custom_tabs',[]);

function getNav(){
  const custom=customTabs.map(t=>({id:'custom_'+t.id,label:t.name,icon:t.icon,deletable:true,isCustom:true,tabData:t}));
  return [...CORE_NAV.filter(n=>!hiddenTabs.includes(n.id)),...custom,{id:'part1',label:'← Part 1 (Health, Vehicle…)',icon:'📂',deletable:false}];
}
// Free plan: allow professional + finances (2 from part2, 3 from part1 = 5 total)
const FREE_SECTIONS_P2=['professional','finances'];
function isSectionLocked(sectionId){
  if(window.hasProAccess)return false;
  return!FREE_SECTIONS_P2.includes(sectionId)&&sectionId!=='part1';
}

let menuOpen=null;
function closeMenu(){if(menuOpen){menuOpen.remove();menuOpen=null;}}

function showToast(msg){
  const t=mk('div');t.style.cssText='position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:10px 20px;border-radius:var(--rm);font-size:13px;z-index:999;box-shadow:0 4px 16px rgba(0,0,0,0.2);';
  t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),3000);
}

function buildNav(){
  const n=document.getElementById('snav');n.innerHTML='';
  const allNav=getNav();
  allNav.forEach(item=>{
    const wrap=mk('div');wrap.style.cssText='position:relative;border-bottom:1px solid var(--border2);display:flex;align-items:stretch;';
    // Main tab button
    const b=mk('button');b.dataset.id=item.id;
    b.style.cssText='flex:1;padding:11px 14px;display:flex;align-items:center;gap:10px;background:transparent;border-left:3px solid transparent;transition:all .15s;text-align:left;border:none;cursor:pointer;min-width:0;';
    if(item.id===cur){b.style.background='var(--blue-light)';b.style.borderLeft='3px solid var(--blue)';}
    b.innerHTML=`<span style="font-size:16px;flex-shrink:0;">${item.icon}</span><span style="font-size:13px;color:${item.id===cur?'var(--blue)':'var(--text2)'};font-weight:${item.id===cur?700:400};overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${item.label}</span>`;
    b.addEventListener('click',()=>{
      if(item.id==='part1'){window.location.href='peakly-second-brain-1.html';return;}
      if(isSectionLocked(item.id)){
        window.location.href='peakly-plan.html';return;
      }
      closeMenu();loadPage(item.id);
    });
    // Add lock icon for free users
    if(isSectionLocked(item.id)){
      const lockSpan=mk('span');lockSpan.style.cssText='position:absolute;right:40px;top:50%;transform:translateY(-50%);font-size:11px;color:var(--text4);pointer-events:none;';lockSpan.textContent='🔒';
      wrap.appendChild(lockSpan);
    }
    wrap.appendChild(b);
    // ⋯ menu button — separate button, never overlaps the tab
    if(item.id!=='part1'){
      const menuBtn=mk('button');
      menuBtn.style.cssText='flex-shrink:0;width:28px;padding:0;background:transparent;border:none;cursor:pointer;color:var(--text4);font-size:16px;opacity:0;transition:opacity .15s;align-self:stretch;display:flex;align-items:center;justify-content:center;';
      menuBtn.textContent='⋯';
      menuBtn.title='Tab options';
      wrap.onmouseover=()=>menuBtn.style.opacity='1';
      wrap.onmouseout=()=>menuBtn.style.opacity='0';
      menuBtn.addEventListener('click',e=>{
        e.stopPropagation();
        closeMenu();
        // Position menu relative to viewport using getBoundingClientRect
        const rect=menuBtn.getBoundingClientRect();
        const menu=mk('div');
        menu.style.cssText=`position:fixed;left:${rect.left-130}px;top:${rect.bottom+4}px;z-index:1000;background:var(--white);border:1px solid var(--border);border-radius:var(--rm);box-shadow:0 4px 20px rgba(15,28,46,0.16);min-width:160px;overflow:hidden;`;
        const hideOpt=mk('button');
        hideOpt.style.cssText='width:100%;padding:10px 14px;text-align:left;font-size:12px;color:var(--text2);border:none;border-bottom:1px solid var(--border2);background:transparent;cursor:pointer;display:block;';
        hideOpt.textContent='👁️  Hide tab';
        hideOpt.onmouseover=()=>hideOpt.style.background='var(--bg)';
        hideOpt.onmouseout=()=>hideOpt.style.background='transparent';
        hideOpt.addEventListener('click',e2=>{
          e2.stopPropagation();
          hiddenTabs.push(item.id);
          LS.set('hidden_tabs2',hiddenTabs);
          if(cur===item.id)cur='professional';
          closeMenu();buildNav();loadPage(cur);
          showToast('Tab hidden — restore it from the Hidden Tabs section below.');
        });
        menu.appendChild(hideOpt);
        if(item.isCustom){
          const delOpt=mk('button');
          delOpt.style.cssText='width:100%;padding:10px 14px;text-align:left;font-size:12px;color:var(--red);border:none;background:transparent;cursor:pointer;display:block;';
          delOpt.textContent='🗑️  Delete tab';
          delOpt.onmouseover=()=>delOpt.style.background='var(--red-light)';
          delOpt.onmouseout=()=>delOpt.style.background='transparent';
          delOpt.addEventListener('click',e2=>{
            e2.stopPropagation();
            if(confirm('⚠️ Delete "'+item.label+'"?\n\nThis will permanently delete all data in this section. This cannot be undone.')){
              const tabId=item.id.replace('custom_','');
              customTabs=customTabs.filter(t=>String(t.id)!==String(tabId));
              LS.set('custom_tabs',customTabs);
              if(cur===item.id)cur='professional';
              closeMenu();buildNav();loadPage(cur);
            }
          });
          menu.appendChild(delOpt);
        }
        menuOpen=menu;
        document.body.appendChild(menu);
        setTimeout(()=>document.addEventListener('click',closeMenu,{once:true}),0);
      });
      wrap.appendChild(menuBtn);
    }
    n.appendChild(wrap);
  });
  // Hidden tabs restore section
  const visibleHidden=hiddenTabs.filter(id=>CORE_NAV.find(n=>n.id===id));
  if(visibleHidden.length){
    const hSection=mk('div');hSection.style.cssText='border-top:2px solid var(--border2);padding:8px 14px;';

function loadPage(id){
  cur=id;buildNav();
  const c=document.getElementById('content');c.innerHTML='';c.style.animation='none';
  requestAnimationFrame(()=>c.style.animation='slideIn .25s ease');
  if(id.startsWith('custom_')){
    const tabId=id.replace('custom_','');
    const tab=customTabs.find(t=>String(t.id)===String(tabId));
    if(tab){buildCustomTabPage(c,tab);return;}
  }
  const allNav=getNav();
  const nav=allNav.find(n=>n.id===id)||{icon:'',label:id};
  const hdr=mk('div');hdr.style.cssText='font-family:var(--display);font-size:20px;font-weight:700;color:var(--text);margin-bottom:16px;';
  hdr.textContent=`${nav.icon} ${nav.label}`;c.appendChild(hdr);
  if(PAGES[id])PAGES[id](c);
}

function buildGenericCreative(key,name,skillsList,projectFields,extraSectionsFn){
  return function(wrap){
    wrap.appendChild(sblock('Skills Checklist',null,b=>{
      skillsList.forEach(skill=>{
        const row=mk('div');row.style.cssText='display:flex;align-items:center;gap:10px;margin-bottom:8px;';
        const chk=mk('div','chk'+(LS.get(key+'_skill_'+skill,false)?' done':''));
        if(LS.get(key+'_skill_'+skill,false))chk.innerHTML='<svg width="10" height="8" viewBox="0 0 10 8"><path d="M1 4l3 3L9 1" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>';
        chk.addEventListener('click',()=>{
          const nd=!LS.get(key+'_skill_'+skill,false);LS.set(key+'_skill_'+skill,nd);
          chk.className='chk'+(nd?' done':'');
          chk.innerHTML=nd?'<svg width="10" height="8" viewBox="0 0 10 8"><path d="M1 4l3 3L9 1" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>':'';
        });
        const lbl=mk('span');lbl.style.cssText='font-size:13px;color:var(--text);';lbl.textContent=skill;
        row.appendChild(chk);row.appendChild(lbl);b.appendChild(row);
      });
    },true));
    wrap.appendChild(sblock('Projects / Works Log',null,b=>{
      let projects=LS.get(key+'_projects',[]);
      const rP=()=>{
        const w=b.querySelector('.gcpw')||(()=>{const d=mk('div');d.className='gcpw';b.appendChild(d);return d;})();w.innerHTML='';
        projects.forEach((p,i)=>{
          const card=mk('div');card.style.cssText='padding:8px 10px;background:var(--bg);border-radius:var(--r);margin-bottom:6px;';
          const cols=Math.min(projectFields.length,3);
          const g=mk('div');g.style.cssText='display:grid;grid-template-columns:repeat('+cols+',1fr);gap:8px;';
          projectFields.slice(0,cols).forEach(f=>{
            let el;
            if(f.type==='select'){
              el=mk('select','inp');el.style.cssText='font-size:12px;';
              f.options.forEach(o=>{const op=mk('option');op.value=o;op.textContent=o;if(p[f.key]===o)op.selected=true;el.appendChild(op);});
              el.addEventListener('change',e=>{p[f.key]=e.target.value;LS.set(key+'_projects',projects);});
            } else if(f.type==='textarea'){
              el=ta('',p[f.key]||'',v=>{p[f.key]=v;LS.set(key+'_projects',projects);},2);
            } else {
              el=inp('',p[f.key]||'',v=>{p[f.key]=v;LS.set(key+'_projects',projects);});
            }
            g.appendChild(fld(f.label,el));
          });
          card.appendChild(g);
          if(projectFields.length>cols){
            projectFields.slice(cols).forEach(f=>{
              let el2;
              if(f.type==='textarea'){el2=ta('',p[f.key]||'',v=>{p[f.key]=v;LS.set(key+'_projects',projects);},2);}
              else{el2=inp('',p[f.key]||'',v=>{p[f.key]=v;LS.set(key+'_projects',projects);});}
              card.appendChild(fld(f.label,el2));
            });
          }
          const del=mk('button');del.textContent='Remove';del.style.cssText='font-size:11px;color:var(--red);cursor:pointer;background:none;border:none;margin-top:4px;';
          del.addEventListener('click',()=>{projects.splice(i,1);LS.set(key+'_projects',projects);rP();});
          card.appendChild(del);w.appendChild(card);
        });
        w.appendChild(addbtn('+ Add project',()=>{const np={};projectFields.forEach(f=>np[f.key]=f.default||'');projects.push(np);LS.set(key+'_projects',projects);rP();}));
      };rP();
    },false));
    wrap.appendChild(sblock('Session Log',null,b=>{
      let sessions=LS.get(key+'_sessions',[]);
      const rS=()=>{
        const w=b.querySelector('.gcsw')||(()=>{const d=mk('div');d.className='gcsw';b.appendChild(d);return d;})();w.innerHTML='';
        sessions.forEach((s,i)=>{
          const card=mk('div');card.style.cssText='padding:8px 10px;background:var(--bg);border-radius:var(--r);margin-bottom:6px;';
          card.appendChild(grid('1fr 1fr',fld('Date',inp('',s.date,v=>{s.date=v;LS.set(key+'_sessions',sessions);},'date')),fld('Duration',inp('e.g. 1 hour',s.duration,v=>{s.duration=v;LS.set(key+'_sessions',sessions);}))));
          card.appendChild(fld('What I worked on',ta('',s.notes,v=>{s.notes=v;LS.set(key+'_sessions',sessions);},2)));
          const del=mk('button');del.textContent='Remove';del.style.cssText='font-size:11px;color:var(--red);cursor:pointer;background:none;border:none;';
          del.addEventListener('click',()=>{sessions.splice(i,1);LS.set(key+'_sessions',sessions);rS();});
          card.appendChild(del);w.appendChild(card);
        });
        w.appendChild(addbtn('+ Log session',()=>{sessions.push({date:'',duration:'',notes:''});LS.set(key+'_sessions',sessions);rS();}));
      };rS();
    },false));
    wrap.appendChild(sblock('Goals & Notes',null,b=>{
      b.appendChild(ta('Short and long term goals...',LS.get(key+'_goals',''),v=>LS.set(key+'_goals',v),4));
    }));
    if(extraSectionsFn)extraSectionsFn(wrap);
  };
}

function buildCustomTabPage(wrap,tab){
  const hdr=mk('div');hdr.style.cssText='font-family:var(--display);font-size:20px;font-weight:700;color:var(--text);margin-bottom:16px;';
  hdr.textContent=(tab.icon||'')+' '+tab.name;wrap.appendChild(hdr);
  // Rich template - call its builder function
  if(tab.rich && tab.build && typeof window[tab.build]==='function'){
    window[tab.build](wrap);
    return;
  }
  // Field-list template
  const key='custom_data_'+tab.id;
  let data=LS.get(key,{});
  if(tab.fields && tab.fields.length){
    wrap.appendChild(sblock(tab.name,tab.icon,b=>{
      tab.fields.forEach(field=>{
        const fi=mk('input','inp');fi.placeholder='Enter '+field.toLowerCase()+'...';fi.value=data[field]||'';
        fi.addEventListener('input',e=>{data[field]=e.target.value;LS.set(key,data);});
        b.appendChild(fld(field,fi));
      });
      b.appendChild(addbtn('+ Add entry',()=>{
        const entries=LS.get(key+'_entries',[]);
        const entry={};tab.fields.forEach(f=>entry[f]=data[f]||'');
        entries.push(entry);LS.set(key+'_entries',entries);
        showToast('Entry saved!');
      }));
    },true));
    const entries=LS.get(key+'_entries',[]);
    if(entries.length){
      wrap.appendChild(sblock('Saved entries',null,b=>{
        entries.forEach((entry,i)=>{
          const card=mk('div');card.style.cssText='padding:8px 10px;background:var(--bg);border-radius:var(--r);margin-bottom:6px;';
          tab.fields.forEach(f=>{
            const row=mk('div');row.style.cssText='font-size:12px;color:var(--text2);margin-bottom:2px;';
            row.innerHTML='<strong>'+f+':</strong> '+(entry[f]||'—');
            card.appendChild(row);
          });
          const del=mk('button');del.textContent='Remove';del.style.cssText='font-size:11px;color:var(--red);cursor:pointer;background:none;border:none;margin-top:4px;';
          del.addEventListener('click',()=>{entries.splice(i,1);LS.set(key+'_entries',entries);buildCustomTabPage(wrap,tab);});
          card.appendChild(del);b.appendChild(card);
        });
      },false));
    }
  } else {
    wrap.appendChild(sblock('Notes',null,b=>{
      b.appendChild(ta('Add your notes here...',LS.get(key+'_notes',''),v=>LS.set(key+'_notes',v),8));
    },true));
  }
}

// ═══════════════════════════════════════════════════════════════════════════
// PROFESSIONAL
// ═══════════════════════════════════════════════════════════════════════════
function buildProfessional(wrap){
  // Monthly work schedule calendar
  wrap.appendChild(sblock('Work Schedule','💼',b=>{
    b.appendChild(infoBox('💡 <strong>Great for those working multiple jobs or odd/rotating schedules.</strong> Add each job separately and color-code your shifts. All shifts sync to your calendar.','blue'));

    // Jobs list — users can add multiple jobs
    let jobs=LS.get('work_jobs',[{id:1,name:'Job 1',color:'#1A5FA8'},{id:2,name:'Job 2',color:'#F97316'}]);
    const saveJobs=()=>LS.set('work_jobs',jobs);

    // Jobs setup panel
    const jobPanel=mk('div');jobPanel.style.cssText='padding:10px 12px;background:var(--bg);border-radius:var(--rm);margin-bottom:12px;border:1px solid var(--border2);';
    jobPanel.innerHTML='<div class="clabel" style="margin-bottom:8px;">Your jobs / workplaces</div>';
    const jobsWrap=mk('div');
    const renderJobs=()=>{
      jobsWrap.innerHTML='';
      jobs.forEach((j,i)=>{
        const row=mk('div');row.style.cssText='display:flex;align-items:center;gap:8px;margin-bottom:6px;';
        const colorDot=mk('input');colorDot.type='color';colorDot.value=j.color;colorDot.style.cssText='width:28px;height:28px;border-radius:50%;border:none;cursor:pointer;padding:0;flex-shrink:0;';
        colorDot.addEventListener('input',e=>{j.color=e.target.value;saveJobs();});
        const ni=mk('input','inp');ni.placeholder='Job / workplace name…';ni.value=j.name||'';ni.style.cssText='flex:1;font-size:12px;';
        ni.addEventListener('input',e=>{j.name=e.target.value;saveJobs();});
        const del=mk('button');del.textContent='×';del.style.cssText='font-size:16px;color:var(--text4);cursor:pointer;';
        del.addEventListener('click',()=>{jobs.splice(i,1);saveJobs();renderJobs();renderCal();});
        row.appendChild(colorDot);row.appendChild(ni);row.appendChild(del);jobsWrap.appendChild(row);
      });
    };
    renderJobs();jobPanel.appendChild(jobsWrap);
    jobPanel.appendChild(addbtn('Add another job',()=>{const colors=['#059669','#7C3AED','#DC2626','#0EA5E9'];jobs.push({id:Date.now(),name:'',color:colors[jobs.length%colors.length]});saveJobs();renderJobs();renderCal();}));
    b.appendChild(jobPanel);

    const now=new Date();
    let month=now.getMonth(),year=now.getFullYear();
    let shifts=LS.get('work_shifts',{});
    const calWrap=mk('div');

    // Shift modal (inline, no browser prompt)
    const modal=mk('div');modal.style.cssText='display:none;padding:14px;background:var(--white);border:1px solid var(--border);border-radius:var(--rl);box-shadow:0 4px 20px rgba(15,28,46,0.15);margin-bottom:12px;';
    let editKey=null;
    const openModal=(key,dateLabel)=>{
      editKey=key;
      const existing=shifts[key]||{};
      modal.style.display='block';
      modal.innerHTML=`<div style="font-size:13px;font-weight:700;color:var(--text);margin-bottom:10px;">📅 ${dateLabel}</div>`;
      // Support multiple jobs per day: shifts[key] is now an array
      let dayJobs=shifts[editKey];if(!Array.isArray(dayJobs))dayJobs=dayJobs?[dayJobs]:[];
      const selectedJobIds=new Set(dayJobs.map(j=>j.jobId));
      // Job selector — click to toggle
      const jRow=mk('div');jRow.style.cssText='display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;';
      jobs.forEach(j=>{
        const isSelected=selectedJobIds.has(j.id);
        const jb=mk('button');jb.style.cssText=`padding:5px 12px;border-radius:100px;font-size:11px;font-weight:600;border:2px solid ${j.color};background:${isSelected?j.color:'transparent'};color:${isSelected?'#fff':j.color};cursor:pointer;transition:all .2s;`;
        jb.textContent=j.name||'Job';
        jb.addEventListener('click',()=>{
          if(selectedJobIds.has(j.id)){
            selectedJobIds.delete(j.id);
            dayJobs=dayJobs.filter(x=>x.jobId!==j.id);
            jb.style.background='transparent';jb.style.color=j.color;
          }else{
            selectedJobIds.add(j.id);
            dayJobs.push({jobId:j.id,jobName:j.name,color:j.color,start:'09:00',end:'17:00',location:''});
            jb.style.background=j.color;jb.style.color='#fff';
          }
        });
        jRow.appendChild(jb);
      });
      modal.appendChild(jRow);
      // Job detail form for first selected job (or empty if none)
      const firstJob=dayJobs[0]||{};
      const g2=mk('div');g2.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;';
      const startFld=mk('div');
      startFld.innerHTML='<label style="display:block;font-size:11px;font-weight:600;color:var(--text2);margin-bottom:3px;">Start time</label>';
      const si=mk('input','inp');si.type='time';si.value=firstJob.start||'09:00';si.style.fontSize='13px';si.disabled=dayJobs.length===0;
      si.addEventListener('input',e=>{if(dayJobs[0])dayJobs[0].start=e.target.value;});
      startFld.appendChild(si);
      const endFld=mk('div');
      endFld.innerHTML='<label style="display:block;font-size:11px;font-weight:600;color:var(--text2);margin-bottom:3px;">End time</label>';
      const ei=mk('input','inp');ei.type='time';ei.value=firstJob.end||'17:00';ei.style.fontSize='13px';ei.disabled=dayJobs.length===0;
      ei.addEventListener('input',e=>{if(dayJobs[0])dayJobs[0].end=e.target.value;});
      endFld.appendChild(ei);
      g2.appendChild(startFld);g2.appendChild(endFld);modal.appendChild(g2);
      const ni2=mk('input','inp');ni2.placeholder='Location / notes (optional)';ni2.value=firstJob.location||'';ni2.style.cssText='margin-bottom:8px;font-size:12px;';ni2.disabled=dayJobs.length===0;
      ni2.addEventListener('input',e=>{if(dayJobs[0])dayJobs[0].location=e.target.value;});
      modal.appendChild(ni2);
      const btnRow=mk('div');btnRow.style.cssText='display:flex;gap:8px;';
      const saveBtn=mk('button');saveBtn.style.cssText='flex:1;padding:8px;border-radius:var(--rm);background:var(--blue);color:#fff;font-size:12px;font-weight:600;border:none;cursor:pointer;';
      saveBtn.textContent=dayJobs.length>0?'💾 Save '+dayJobs.length+' job'+(dayJobs.length!==1?'s':'')+' to calendar':'💾 Save';
      saveBtn.addEventListener('click',()=>{
        shifts[editKey]=dayJobs.length>0?dayJobs:undefined;
        if(!dayJobs.length)delete shifts[editKey];
        LS.set('work_shifts',shifts);
        modal.style.display='none';renderCal();
      });
      const clearBtn=mk('button');clearBtn.style.cssText='padding:8px 14px;border-radius:var(--rm);border:1px solid var(--border);color:var(--red);font-size:12px;cursor:pointer;';
      clearBtn.textContent='Clear all';
      clearBtn.addEventListener('click',()=>{delete shifts[editKey];LS.set('work_shifts',shifts);modal.style.display='none';renderCal();});
      const cancelBtn=mk('button');cancelBtn.style.cssText='padding:8px 14px;border-radius:var(--rm);border:1px solid var(--border);color:var(--text2);font-size:12px;cursor:pointer;';
      cancelBtn.textContent='Cancel';cancelBtn.addEventListener('click',()=>modal.style.display='none');
      btnRow.appendChild(saveBtn);btnRow.appendChild(clearBtn);btnRow.appendChild(cancelBtn);modal.appendChild(btnRow);
    };
    b.appendChild(modal);

    const renderCal=()=>{
      calWrap.innerHTML='';
      const hdr=mk('div');hdr.style.cssText='display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;';
      const prev=mk('button');prev.style.cssText='padding:5px 12px;border-radius:var(--r);border:1px solid var(--border);font-size:13px;cursor:pointer;';prev.textContent='←';
      const nxt=mk('button');nxt.style.cssText='padding:5px 12px;border-radius:var(--r);border:1px solid var(--border);font-size:13px;cursor:pointer;';nxt.textContent='→';
      const mLabel=mk('div');mLabel.style.cssText='font-family:var(--display);font-size:16px;font-weight:700;color:var(--text);';
      const months=['January','February','March','April','May','June','July','August','September','October','November','December'];
      mLabel.textContent=months[month]+' '+year;
      prev.addEventListener('click',()=>{month--;if(month<0){month=11;year--;}renderCal();});
      nxt.addEventListener('click',()=>{month++;if(month>11){month=0;year++;}renderCal();});
      // Month summary — count all jobs across all days
      let totalJobs=0;
      Object.keys(shifts).filter(k=>k.startsWith(`${year}-${month+1}-`)).forEach(k=>{
        const sh=shifts[k];if(Array.isArray(sh))totalJobs+=sh.length;else if(sh)totalJobs++;
      });
      const summary=mk('div');summary.style.cssText='font-size:11px;color:var(--text3);';summary.textContent=totalJobs+' job'+(totalJobs!==1?'s':'')+' this month';
      hdr.appendChild(prev);hdr.appendChild(mLabel);hdr.appendChild(nxt);hdr.appendChild(summary);calWrap.appendChild(hdr);

      const g=mk('div','cal-grid');
      ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(d=>{const h2=mk('div','cal-day-hdr');h2.textContent=d;g.appendChild(h2);});
      const firstDay=new Date(year,month,1).getDay();
      const daysInMonth=new Date(year,month+1,0).getDate();
      for(let i=0;i<firstDay;i++){g.appendChild(mk('div'));}
      for(let d=1;d<=daysInMonth;d++){
        const key=`${year}-${month+1}-${d}`;
        let shiftList=shifts[key];if(shiftList&&!Array.isArray(shiftList))shiftList=[shiftList];
        const isToday=now.getDate()===d&&now.getMonth()===month&&now.getFullYear()===year;
        const dayEl=mk('div','cal-day'+(isToday?' today':'')+(shiftList&&shiftList.length?' has-shift':''));
        const dn=mk('div','dn');dn.textContent=d;dayEl.appendChild(dn);
        if(shiftList&&shiftList.length){
          const sl=mk('div');sl.style.cssText='display:flex;flex-direction:column;gap:2px;margin-top:2px;';
          shiftList.forEach(shift=>{
            const badge=mk('div');
            badge.style.cssText=`font-size:8px;font-weight:600;padding:1px 3px;border-radius:2px;background:${shift.color||'var(--blue)'};color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;`;
            badge.textContent=(shift.jobName||'Work')+' '+(shift.start||'');
            sl.appendChild(badge);
          });
          dayEl.appendChild(sl);
        }
        dayEl.addEventListener('click',()=>{
          openModal(key,`${months[month]} ${d}, ${year}`);
        });
        g.appendChild(dayEl);
      }
      calWrap.appendChild(g);
      // Legend
      if(jobs.length){
        const leg=mk('div');leg.style.cssText='display:flex;gap:10px;flex-wrap:wrap;margin-top:8px;';
        jobs.forEach(j=>{const d=mk('div');d.style.cssText='display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text2);';d.innerHTML=`<span style="width:10px;height:10px;border-radius:2px;background:${j.color};flex-shrink:0;display:inline-block;"></span>${j.name||'Job'}`;leg.appendChild(d);});
        calWrap.appendChild(leg);
      }
    };
    renderCal();b.appendChild(calWrap);
  },true));

  // Meetings
  wrap.appendChild(sblock('Meetings','📅',b=>{
    let meetings=LS.get('pro_meetings',[]);
    const mWrap=mk('div');b.appendChild(mWrap);
    const renderMtgs=()=>{
      mWrap.innerHTML='';
      meetings.forEach((m,i)=>{
        const card=mk('div');card.style.cssText='padding:10px;background:var(--bg);border-radius:var(--rm);margin-bottom:8px;';
        const r1=mk('div');r1.style.cssText='display:grid;grid-template-columns:2fr 1fr 80px;gap:8px;margin-bottom:6px;align-items:center;';
        const ti=mk('input','inp');ti.placeholder='Meeting title';ti.value=m.title||'';ti.style.fontSize='12px';
        ti.addEventListener('input',e=>{m.title=e.target.value;LS.set('pro_meetings',meetings);});
        const di=mk('input','inp');di.type='datetime-local';di.value=m.date||'';di.style.fontSize='12px';
        di.addEventListener('input',e=>{m.date=e.target.value;LS.set('pro_meetings',meetings);});
        const csb=calSyncBtn('Sync',()=>({title:m.title,date:m.date,notes:m.notes,type:'meeting',sourceKey:'pro_meetings',sourceId:m.id}));
        const ni=mk('textarea','inp');ni.placeholder='Agenda, notes, action items…';ni.value=m.notes||'';ni.rows=2;ni.style.fontSize='12px';
        ni.addEventListener('input',e=>{m.notes=e.target.value;LS.set('pro_meetings',meetings);});
        const del=mk('button');del.textContent='Remove';del.style.cssText='font-size:11px;color:var(--red);padding:0;margin-top:4px;';
        del.addEventListener('click',()=>{meetings.splice(i,1);LS.set('pro_meetings',meetings);renderMtgs();});
        r1.appendChild(ti);r1.appendChild(di);r1.appendChild(csb);
        card.appendChild(r1);card.appendChild(ni);card.appendChild(del);mWrap.appendChild(card);
      });
      mWrap.appendChild(addbtn('Add meeting',()=>{meetings.push({id:Date.now(),title:'',date:'',notes:''});LS.set('pro_meetings',meetings);renderMtgs();}));
    };
    renderMtgs();
  },false));

  // Certifications
  wrap.appendChild(sblock('Certifications & Licenses','🏆',b=>{
    let certs=LS.get('pro_certs',[]);
    const cWrap=mk('div');b.appendChild(cWrap);
    const renderCerts=()=>{
      cWrap.innerHTML='';
      certs.forEach((c,i)=>{
        const card=mk('div');card.style.cssText='padding:10px;background:var(--bg);border-radius:var(--rm);margin-bottom:8px;';
        const r1=mk('div');r1.style.cssText='display:grid;grid-template-columns:2fr 1fr 100px;gap:8px;margin-bottom:6px;align-items:center;';
        const ni=mk('input','inp');ni.placeholder='Certification name';ni.value=c.name||'';ni.style.fontSize='12px';
        ni.addEventListener('input',e=>{c.name=e.target.value;LS.set('pro_certs',certs);});
        const di=mk('input','inp');di.type='date';di.value=c.expiry||'';di.style.fontSize='12px';
        di.addEventListener('input',e=>{c.expiry=e.target.value;LS.set('pro_certs',certs);});
        const csb=calSyncBtn('Sync',()=>({title:(c.name||'Certification')+' renewal',date:c.expiry,notes:c.notes,type:'cert_renewal',reminder:'30days',sourceKey:'pro_certs',sourceId:c.id,sourceField:'expiry'}));
        const notesi=mk('input','inp');notesi.placeholder='Notes, renewal steps…';notesi.value=c.notes||'';notesi.style.fontSize='12px';
        notesi.addEventListener('input',e=>{c.notes=e.target.value;LS.set('pro_certs',certs);});
        const del=mk('button');del.textContent='Remove';del.style.cssText='font-size:11px;color:var(--red);margin-top:4px;';
        del.addEventListener('click',()=>{certs.splice(i,1);LS.set('pro_certs',certs);renderCerts();});
        r1.appendChild(ni);r1.appendChild(di);r1.appendChild(csb);
        card.appendChild(r1);card.appendChild(notesi);card.appendChild(del);cWrap.appendChild(card);
      });
      cWrap.appendChild(addbtn('Add certification',()=>{certs.push({id:Date.now(),name:'',expiry:'',notes:''});LS.set('pro_certs',certs);renderCerts();}));
      cWrap.appendChild(infoBox('🔔 You\'ll be reminded 30 days before any certification expires.','orange'));
    };
    renderCerts();
  },false));

  // Job applications
  wrap.appendChild(sblock('Job Applications','📄',b=>{
    let apps=LS.get('job_apps',[]);
    const aWrap=mk('div');b.appendChild(aWrap);
    const statusColors={Applied:'var(--blue)',Interview:'var(--orange-dark)',Offer:'var(--green-dark)',Rejected:'var(--red)',Accepted:'var(--green-dark)'};
    const renderApps=()=>{
      aWrap.innerHTML='';
      if(apps.length){
        const hdr=mk('div');hdr.style.cssText='display:grid;grid-template-columns:2fr 2fr 1fr 1fr 80px;gap:8px;margin-bottom:6px;';
        ['Company','Role','Date','Status',''].forEach(h=>{const d=mk('div');d.style.cssText='font-size:10px;font-weight:700;color:var(--text4);text-transform:uppercase;';d.textContent=h;hdr.appendChild(d);});
        aWrap.appendChild(hdr);
        apps.forEach((a,i)=>{
          const row=mk('div');row.style.cssText='display:grid;grid-template-columns:2fr 2fr 1fr 1fr 80px;gap:8px;margin-bottom:6px;align-items:center;';
          const ci=mk('input','inp');ci.placeholder='Company';ci.value=a.company||'';ci.style.fontSize='12px';ci.addEventListener('input',e=>{a.company=e.target.value;LS.set('job_apps',apps);});
          const ri=mk('input','inp');ri.placeholder='Role';ri.value=a.role||'';ri.style.fontSize='12px';ri.addEventListener('input',e=>{a.role=e.target.value;LS.set('job_apps',apps);});
          const di=mk('input','inp');di.type='date';di.value=a.date||'';di.style.fontSize='12px';di.addEventListener('input',e=>{a.date=e.target.value;LS.set('job_apps',apps);});
          const sel=mk('select','inp');sel.style.cssText='font-size:12px;padding:7px;';
          ['Applied','Interview','Offer','Rejected','Accepted'].forEach(s=>{const o=mk('option');o.textContent=s;o.value=s;if(a.status===s)o.selected=true;sel.appendChild(o);});
          sel.style.color=statusColors[a.status||'Applied'];
          sel.addEventListener('change',e=>{a.status=e.target.value;sel.style.color=statusColors[e.target.value];LS.set('job_apps',apps);});
          const del=mk('button');del.textContent='×';del.style.cssText='font-size:16px;color:var(--text4);';del.addEventListener('click',()=>{apps.splice(i,1);LS.set('job_apps',apps);renderApps();});
          row.appendChild(ci);row.appendChild(ri);row.appendChild(di);row.appendChild(sel);row.appendChild(del);aWrap.appendChild(row);
        });
      }
      aWrap.appendChild(addbtn('Add application',()=>{apps.push({id:Date.now(),company:'',role:'',date:'',status:'Applied'});LS.set('job_apps',apps);renderApps();}));
    };
    renderApps();
  },false));

  // Networking
  wrap.appendChild(sblock('Networking Contacts','🤝',b=>{
    b.appendChild(infoBox('Free: up to 5 contacts. Upgrade for unlimited.','blue'));
    let contacts=LS.get('net_contacts',[]);
    const cWrap=mk('div');b.appendChild(cWrap);
    const renderContacts=()=>{
      cWrap.innerHTML='';
      if(contacts.length){
        const hdr=mk('div');hdr.style.cssText='display:grid;grid-template-columns:2fr 2fr 1fr 1fr 60px;gap:8px;margin-bottom:6px;';
        ['Name','Company / Role','Last contact','Follow up',''].forEach(h=>{const d=mk('div');d.style.cssText='font-size:10px;font-weight:700;color:var(--text4);text-transform:uppercase;';d.textContent=h;hdr.appendChild(d);});
        cWrap.appendChild(hdr);
        contacts.forEach((c,i)=>{
          const row=mk('div');row.style.cssText='display:grid;grid-template-columns:2fr 2fr 1fr 1fr 60px;gap:8px;margin-bottom:6px;align-items:center;';
          const ni=mk('input','inp');ni.placeholder='Name';ni.value=c.name||'';ni.style.fontSize='12px';ni.addEventListener('input',e=>{c.name=e.target.value;LS.set('net_contacts',contacts);});
          const ci=mk('input','inp');ci.placeholder='Company / Role';ci.value=c.company||'';ci.style.fontSize='12px';ci.addEventListener('input',e=>{c.company=e.target.value;LS.set('net_contacts',contacts);});
          const li=mk('input','inp');li.type='date';li.value=c.last||'';li.style.fontSize='12px';li.addEventListener('input',e=>{c.last=e.target.value;LS.set('net_contacts',contacts);});
          const fi=mk('input','inp');fi.type='date';fi.value=c.follow||'';fi.style.fontSize='12px';fi.addEventListener('input',e=>{c.follow=e.target.value;LS.set('net_contacts',contacts);});
          const del=mk('button');del.textContent='×';del.style.cssText='font-size:16px;color:var(--text4);';del.addEventListener('click',()=>{contacts.splice(i,1);LS.set('net_contacts',contacts);renderContacts();});
          row.appendChild(ni);row.appendChild(ci);row.appendChild(li);row.appendChild(fi);row.appendChild(del);cWrap.appendChild(row);
        });
      }
      if(contacts.length<5){
        cWrap.appendChild(addbtn('Add contact',()=>{contacts.push({id:Date.now(),name:'',company:'',last:'',follow:''});LS.set('net_contacts',contacts);renderContacts();}));
      }else{
        cWrap.appendChild(ubanner('more than 5 networking contacts'));
      }
    };
    renderContacts();
  },false));

  wrap.appendChild(sblock('Professional Development','📚',b=>{
    b.appendChild(fld('Skills, courses & development notes',ta('Courses, books, skills you\'re building — and how they connect to your career goals…','',null,4)));
    ubanner('resume file storage');
  },false));
}

// ═══════════════════════════════════════════════════════════════════════════
// FINANCES
// ═══════════════════════════════════════════════════════════════════════════
function buildFinances(wrap){
  // Pull linked expenses from other sections
  const linkedExpenses=LS.get('fin_exp',[]);
  if(linkedExpenses.filter(e=>e.source).length){
    wrap.appendChild(infoBox(`💰 <strong>${linkedExpenses.filter(e=>e.source).length} item(s)</strong> auto-linked from Vehicle, Housing & Utilities: ${linkedExpenses.filter(e=>e.source).map(e=>e.cat).join(', ')}. These appear in your budget below.`,'green'));
  }

  // Basic budget calculator
  wrap.appendChild(sblock('Budget Calculator','🧮',b=>{
    b.appendChild(infoBox('Choose your preferred budgeting method below. You only need to use one.','blue'));
    let income=LS.get('fin_income','');
    b.appendChild(fld('Monthly take-home income',inp('$4,500',income,v=>{income=v;LS.set('fin_income',v);})));

    let expenses=LS.get('fin_exp',[
      {id:1,cat:'Housing / Rent',budget:'',actual:'',type:'need',due:'',source:''},
      {id:2,cat:'Food & Groceries',budget:'',actual:'',type:'need',due:'',source:''},
      {id:3,cat:'Transportation',budget:'',actual:'',type:'need',due:'',source:''},
      {id:4,cat:'Utilities',budget:'',actual:'',type:'need',due:'',source:''},
      {id:5,cat:'Healthcare',budget:'',actual:'',type:'need',due:'',source:''},
      {id:6,cat:'Dining out',budget:'',actual:'',type:'want',due:'',source:''},
      {id:7,cat:'Entertainment',budget:'',actual:'',type:'want',due:'',source:''},
      {id:8,cat:'Shopping',budget:'',actual:'',type:'want',due:'',source:''},
      {id:9,cat:'Savings',budget:'',actual:'',type:'save',due:'',source:''},
      {id:10,cat:'Debt payment',budget:'',actual:'',type:'save',due:'',source:''},
    ]);
    const typeColor={need:'var(--blue)',want:'var(--orange-dark)',save:'var(--green-dark)'};
    const typeBg={need:'var(--blue-light)',want:'var(--orange-light)',save:'var(--green-light)'};

    const tbl=mk('div');tbl.style.marginTop='12px';
    const hdr=mk('div');hdr.style.cssText='display:grid;grid-template-columns:2fr 1fr 1fr 80px 1fr 40px;gap:8px;margin-bottom:6px;';
    ['Category','Budget','Actual','Type','Due date',''].forEach(h=>{const d=mk('div');d.style.cssText='font-size:10px;font-weight:700;color:var(--text4);text-transform:uppercase;';d.textContent=h;hdr.appendChild(d);});
    tbl.appendChild(hdr);

    const renderRows=()=>{
      const existingRows=tbl.querySelectorAll('.exp-row');existingRows.forEach(r=>r.remove());
      let totalBudget=0,totalActual=0;

function buildCommunity(wrap){

      const i=mk('input','inp');i.placeholder=ph;i.style.fontSize='12px';

    });
    // Community events list
    const evSection=mk('div');evSection.innerHTML='<div class="clabel" style="margin-top:10px;">Community events</div>';
    let events=LS.get('comm_events',[]);
    const evWrap=mk('div');
    const renderEvents=()=>{
      evWrap.innerHTML='';
      events.forEach((e,i)=>{
        const row=mk('div');row.style.cssText='display:flex;align-items:center;gap:8px;margin-bottom:6px;';
        const ni=mk('input','inp');ni.placeholder='Event name';ni.value=e.name||'';ni.style.cssText='flex:1;font-size:12px;';ni.addEventListener('input',ev=>{e.name=ev.target.value;LS.set('comm_events',events);});
        const di=mk('input','inp');di.type='datetime-local';di.value=e.date||'';di.style.cssText='font-size:12px;width:170px;';di.addEventListener('input',ev=>{e.date=ev.target.value;LS.set('comm_events',events);});

        const del=mk('button');del.textContent='×';del.style.cssText='font-size:16px;color:var(--text4);';del.addEventListener('click',()=>{events.splice(i,1);LS.set('comm_events',events);renderEvents();});
        row.appendChild(ni);row.appendChild(di);row.appendChild(csb);row.appendChild(del);evWrap.appendChild(row);
      });
      evWrap.appendChild(addbtn('Add community event',()=>{events.push({id:Date.now(),name:'',date:''});LS.set('comm_events',events);renderEvents();}));
    };
    renderEvents();evSection.appendChild(evWrap);b.appendChild(evSection);
  },true));

  wrap.appendChild(sblock('Volunteering','🤝',b=>{
    let hours=LS.get('vol_hours',[]);
    const hWrap=mk('div');b.appendChild(hWrap);
    const renderHours=()=>{
      hWrap.innerHTML='';
      const total=hours.reduce((s,h)=>s+parseFloat(h.hours||0),0);
      const tot=mk('div');tot.style.cssText='display:flex;justify-content:space-between;margin-bottom:8px;';
      tot.innerHTML=`<span style="font-size:12px;font-weight:600;color:var(--text);">Volunteer hours log</span><span style="font-size:13px;font-weight:700;color:var(--blue);">${total} hrs total</span>`;
      hWrap.appendChild(tot);
      hours.forEach((h,i)=>{
        const row=mk('div');row.style.cssText='display:grid;grid-template-columns:2fr 1fr 1fr 40px;gap:8px;margin-bottom:6px;align-items:center;';
        const oi=mk('input','inp');oi.placeholder='Organization';oi.value=h.org||'';oi.style.fontSize='12px';oi.addEventListener('input',e=>{h.org=e.target.value;LS.set('vol_hours',hours);});
        const di=mk('input','inp');di.type='date';di.value=h.date||'';di.style.fontSize='12px';di.addEventListener('input',e=>{h.date=e.target.value;LS.set('vol_hours',hours);});

      });
      hWrap.appendChild(addbtn('Log volunteer hours',()=>{hours.push({org:'',date:'',hours:''});LS.set('vol_hours',hours);renderHours();}));
    };
    renderHours();
    b.appendChild(fld('Donation reminders',ta('Goodwill purge schedule, food bank drop-offs, causes you support…','',null,2)));
  },false));

  wrap.appendChild(sblock('Local Resources','📍',b=>{
    let resources=LS.get('local_resources',[]);
    const rWrap=mk('div');b.appendChild(rWrap);
    const renderResources=()=>{
      rWrap.innerHTML='';
      resources.forEach((r,i)=>{
        const row=mk('div');row.style.cssText='display:flex;align-items:center;gap:8px;margin-bottom:6px;';
        const ni=mk('input','inp');ni.placeholder='Resource name (food bank, shelter, garden…)';ni.value=r.name||'';ni.style.cssText='flex:1;font-size:12px;';ni.addEventListener('input',e=>{r.name=e.target.value;LS.set('local_resources',resources);});
        const ai=mk('input','inp');ai.placeholder='Address or website';ai.value=r.address||'';ai.style.cssText='flex:1;font-size:12px;';ai.addEventListener('input',e=>{r.address=e.target.value;LS.set('local_resources',resources);});
        const del=mk('button');del.textContent='×';del.style.cssText='font-size:16px;color:var(--text4);';del.addEventListener('click',()=>{resources.splice(i,1);LS.set('local_resources',resources);renderResources();});
        row.appendChild(ni);row.appendChild(ai);row.appendChild(del);rWrap.appendChild(row);
      });
      rWrap.appendChild(addbtn('Add local resource',()=>{resources.push({name:'',address:''});LS.set('local_resources',resources);renderResources();}));
    };
    renderResources();
  },false));
}

    b.appendChild(grid2);
  },true));

  // ── Create your own template ──────────────────────────────────────────
  wrap.appendChild(sblock('Create your own template','✨',b=>{
    b.appendChild(infoBox('Build a custom tracker. Pick a name, an emoji, and the fields you want to track. It will be added as a new tab in your sidebar.','blue'));

    let newName='', newIcon='✨';
    let newFields=['',''];

    const nameInp=inp('Template name (e.g. Plant care)','',v=>{newName=v;});
    b.appendChild(fld('Template name',nameInp));

    const iconRow=mk('div');iconRow.style.cssText='display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap;';
    const iconLabel=mk('label');iconLabel.style.cssText='font-size:11px;font-weight:600;color:var(--text2);width:100%;margin-bottom:4px;';iconLabel.textContent='Icon';
    iconRow.appendChild(iconLabel);
    const EMOJI_PICKS=['✨','📝','🌱','🐾','🎨','💼','🏃','🍳','📚','💰','🎵','🎬','✈️','🛒','🎯','💡','🔧','🏆'];
    EMOJI_PICKS.forEach(em=>{
      const eb=mk('button');
      eb.type='button';
      eb.textContent=em;
      eb.dataset.icon=em;
      eb.style.cssText=`width:34px;height:34px;border-radius:var(--r);border:2px solid ${newIcon===em?'var(--blue)':'var(--border)'};background:${newIcon===em?'var(--blue-light)':'var(--white)'};font-size:16px;cursor:pointer;`;
      eb.addEventListener('click',()=>{
        newIcon=em;
        iconRow.querySelectorAll('button').forEach(x=>{x.style.border='2px solid var(--border)';x.style.background='var(--white)';});
        eb.style.border='2px solid var(--blue)';
        eb.style.background='var(--blue-light)';
      });
      iconRow.appendChild(eb);
    });
    b.appendChild(iconRow);

    const fieldsLabel=mk('label');fieldsLabel.style.cssText='display:block;font-size:11px;font-weight:600;color:var(--text2);margin-bottom:4px;';fieldsLabel.textContent='Fields to track';
    b.appendChild(fieldsLabel);
    const fieldsList=mk('div');fieldsList.style.cssText='display:flex;flex-direction:column;gap:6px;margin-bottom:8px;';
    b.appendChild(fieldsList);

    const renderFields=()=>{
      fieldsList.innerHTML='';
      newFields.forEach((val,idx)=>{
        const row=mk('div');row.style.cssText='display:flex;gap:6px;align-items:center;';
        const fi=mk('input','inp');fi.type='text';fi.placeholder=`Field ${idx+1} (e.g. Date, Notes…)`;fi.value=val;
        fi.addEventListener('input',e=>{newFields[idx]=e.target.value;});
        const del=mk('button');del.type='button';del.textContent='×';
        del.style.cssText='width:32px;height:32px;border-radius:var(--r);background:var(--bg);color:var(--text3);border:1px solid var(--border);font-size:16px;cursor:pointer;flex-shrink:0;';
        del.addEventListener('click',()=>{
          if(newFields.length<=1){showToast('Templates need at least one field.');return;}
          newFields.splice(idx,1);renderFields();
        });
        row.appendChild(fi);row.appendChild(del);
        fieldsList.appendChild(row);
      });
    };
    renderFields();

    b.appendChild(addbtn('Add field',()=>{newFields.push('');renderFields();}));

    const actions=mk('div');actions.style.cssText='display:flex;gap:8px;margin-top:14px;';
    const createBtn=mk('button','btn-blue');
    createBtn.style.cssText='padding:10px 16px;border-radius:var(--rm);background:var(--blue);color:#fff;font-size:13px;font-weight:700;border:none;cursor:pointer;';
    createBtn.textContent='Create template';
    createBtn.addEventListener('click',()=>{
      // Read live name from input (in case binding lost focus)
      const liveName=(nameInp.value||'').trim();
      const cleanFields=newFields.map(f=>(f||'').trim()).filter(Boolean);
      if(!liveName){showToast('Please give your template a name.');return;}
      if(cleanFields.length===0){showToast('Add at least one field.');return;}
      if(customTabs.some(ct=>ct.name.toLowerCase()===liveName.toLowerCase())){
        showToast('A tab with that name already exists.');return;
      }
      const newTab={id:Date.now(),name:liveName,icon:newIcon,fields:cleanFields,rich:false,build:null,custom:true};
      customTabs.push(newTab);
      LS.set('custom_tabs',customTabs);
      buildNav();
      showToast('"'+liveName+'" added to your sidebar! ✨');
      // Reset form
      nameInp.value='';newName='';newIcon='✨';newFields=['',''];
      iconRow.querySelectorAll('button').forEach((x,i)=>{
        const isFirst=x.dataset.icon==='✨';
        x.style.border='2px solid '+(isFirst?'var(--blue)':'var(--border)');
        x.style.background=isFirst?'var(--blue-light)':'var(--white)';
      });
      renderFields();
    });
    actions.appendChild(createBtn);
    b.appendChild(actions);
  },false));
}

const PAGES={professional:buildProfessional,finances:buildFinances,family:buildFamily,pets:buildPets,community:buildCommunity,custom:buildCustom};
// peakly_pro is true for both 'pro' and active 'trial' plans
window.hasProAccess = JSON.parse(localStorage.getItem('peakly_pro')||'false');
buildNav();
loadPage('professional');

// Hide upgrade box for users with Pro access
(function(){
  if(window.hasProAccess){
    const box = document.getElementById('upgradeBox2');
    if(box) box.style.display = 'none';
  }
})();
</script>
</body>
