<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Peakly — Goals</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --blue:#1A5FA8;--blue-light:#EFF6FF;--blue-dark:#0F3D6E;--blue-muted:#DBEAFE;
  --orange:#F97316;--orange-light:#FFF7ED;--orange-dark:#C2410C;--orange-muted:#FED7AA;
  --bg:#F0F4FA;--bg2:#E8EFF8;--white:#fff;
  --text:#0F1C2E;--text2:#3D5068;--text3:#7A93B0;--text4:#A8BDD1;
  --border:#D4E0EE;--border2:#EAF0F8;
  --green:#059669;--green-light:#ECFDF5;--green-dark:#065F46;
  --red:#DC2626;--red-light:#FEF2F2;
  --font:'Plus Jakarta Sans',system-ui,sans-serif;
  --display:'Playfair Display',Georgia,serif;
  --r:8px;--rm:12px;--rl:16px;
  --shadow:0 1px 4px rgba(15,28,46,0.07),0 0 0 1px rgba(15,28,46,0.04);
  --shadow-md:0 6px 24px rgba(15,28,46,0.12),0 0 0 1px rgba(15,28,46,0.04);
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;}
button{font-family:var(--font);cursor:pointer;border:none;background:none;}
input,textarea,select{font-family:var(--font);}
textarea{resize:vertical;}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px;}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
@keyframes pop{0%{transform:scale(0.85);opacity:0;}65%{transform:scale(1.06);}100%{transform:scale(1);opacity:1;}}
@keyframes confettiFall{to{transform:translateY(110vh) rotate(720deg);opacity:0;}}
@keyframes mountainFill{from{stroke-dashoffset:1000;}to{stroke-dashoffset:0;}}
@keyframes slideRight{from{opacity:0;transform:translateX(20px);}to{opacity:1;transform:translateX(0);}}
@keyframes shimmer{0%,100%{opacity:1;}50%{opacity:0.5;}}
@keyframes peakPulse{0%,100%{transform:scale(1);}50%{transform:scale(1.15);}}
.confetti-piece{position:fixed;top:-20px;border-radius:3px;animation:confettiFall linear forwards;pointer-events:none;z-index:9999;}
nav{background:var(--white);border-bottom:1px solid var(--border2);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:54px;position:sticky;top:0;z-index:100;box-shadow:0 1px 8px rgba(15,28,46,0.06);}
.nav-links button{padding:6px 14px;border-radius:var(--rm);font-size:13px;color:var(--text2);transition:background .15s;}
.nav-links button.active{background:var(--blue);color:#fff;font-weight:600;}
.nav-links button:hover:not(.active){background:var(--bg);}
.inp{width:100%;padding:9px 11px;border-radius:var(--r);border:1px solid var(--border);font-size:13px;color:var(--text);background:var(--bg);outline:none;font-family:var(--font);transition:border-color .2s;}
.inp:focus{border-color:var(--blue);background:var(--white);}
.fld{margin-bottom:12px;}
.fld label{display:block;font-size:11px;font-weight:600;color:var(--text2);margin-bottom:4px;}
.btn-blue{background:var(--blue);color:#fff;padding:10px 20px;border-radius:var(--rm);font-size:13px;font-weight:700;border:none;cursor:pointer;transition:background .15s;}
.btn-blue:hover{background:var(--blue-dark);}
.btn-orange{background:var(--orange);color:#fff;padding:10px 20px;border-radius:var(--rm);font-size:13px;font-weight:700;border:none;cursor:pointer;}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text2);padding:9px 18px;border-radius:var(--rm);font-size:13px;font-weight:500;cursor:pointer;}
.btn-ghost:hover{background:var(--bg);}
.chip{display:inline-flex;align-items:center;padding:3px 9px;border-radius:100px;font-size:11px;font-weight:600;}
.modal-bg{position:fixed;inset:0;background:rgba(15,28,46,.5);display:flex;align-items:center;justify-content:center;z-index:500;backdrop-filter:blur(3px);}
.modal{background:var(--white);border-radius:20px;width:94%;max-width:540px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 64px rgba(15,28,46,.2);animation:pop .3s cubic-bezier(.34,1.56,.64,1);}
.modal-lg{max-width:700px;}
.mhdr{padding:18px 22px;border-bottom:1px solid var(--border2);display:flex;align-items:center;gap:12px;position:sticky;top:0;background:var(--white);z-index:1;}
.mbody{padding:20px 22px;}
.mftr{padding:14px 22px;border-top:1px solid var(--border2);display:flex;gap:10px;position:sticky;bottom:0;background:var(--white);}
.task-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border2);}
.task-row:last-child{border-bottom:none;}
.chk{width:20px;height:20px;border-radius:6px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .2s;}
.chk.done{background:var(--green);border-color:var(--green);}
.view-toggle{display:flex;gap:4px;background:var(--bg2);border-radius:var(--rm);padding:4px;}
.vt-btn{padding:7px 16px;border-radius:var(--r);font-size:12px;font-weight:600;color:var(--text3);border:none;background:transparent;cursor:pointer;transition:all .2s;}
.vt-btn.on{background:var(--white);color:var(--blue);box-shadow:var(--shadow);}
.bar-wrap{background:var(--bg2);border-radius:100px;overflow:hidden;}
.bar-fill{height:100%;border-radius:100px;transition:width .7s ease;}
</style>

</head>
<body>

<!-- NAV -->
<nav>
  <div style="display:flex;align-items:center;gap:10px;">
    <svg width="32" height="32" viewBox="0 0 64 64"><rect width="64" height="64" rx="13" fill="#1A5FA8"/><polyline points="8,50 22,28 33,38 44,17 56,50" fill="none" stroke="white" stroke-width="3.2" stroke-linejoin="round" stroke-linecap="round"/><circle cx="44" cy="17" r="4.5" fill="#F97316"/><line x1="44" y1="17" x2="56" y2="17" stroke="#F97316" stroke-width="2.2" stroke-linecap="round"/></svg>

<script>
window.onerror = function(msg, src, line, col, err) {
  document.body.innerHTML = '<div style="font-family:monospace;padding:20px;background:#fee;color:#900;white-space:pre-wrap;font-size:13px;"><b>JS ERROR (line ' + line + '):</b>\n' + msg + '\n\n' + (err && err.stack ? err.stack : '') + '</div>';
  return false;
};

const LS={get:(k,d)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch{return d;}},set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}}};
function toast(msg){const t=document.getElementById('toastEl');t.textContent=msg;t.style.display='block';clearTimeout(toast._t);toast._t=setTimeout(()=>t.style.display='none',2800);}

// ── Confetti ──────────────────────────────────────────────────────────────
function confetti(){
  const colors=['#0891B2','#F97316','#3B82F6','#FB923C','#059669','#FED7AA','#7C3AED','#F472B6'];
  for(let i=0;i<80;i++){
    const el=document.createElement('div');el.className='confetti-piece';
    const s=6+Math.random()*9;
    el.style.cssText=`left:${Math.random()*100}vw;width:${s}px;height:${s}px;background:${colors[i%colors.length]};animation-duration:${1.4+Math.random()*2}s;animation-delay:${Math.random()*0.5}s;border-radius:${Math.random()>.5?'50%':'3px'};`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),4000);
  }
}


// ── GOALS GRID PAGE ───────────────────────────────────────────────────────

// ── Refresh todayTasks for ALL goals so home page always has current data ──
function refreshAllTodayTasks(){
  let changed=false;
  goals.forEach(g=>{
    if(!g.startedDate||g.completed)return;
    const def=getGoalTaskDef(g);
    const totalDays=def.totalDays||g.totalDays||90;
    let dayNum=getDayNum(g)||1;
    if(dayNum>totalDays)dayNum=totalDays;
    const{daily,planning,checkin}=getTasksForDay(g,dayNum);
    const allTasks=[...daily,...planning,...checkin];
    g.todayTasks=allTasks.map(t=>({
      task:t.task||t.name||t.text||'',
      time:t.time||t.defTime||'09:00',
      taskId:t.id,
      taskType:t.type||'daily',
      homeKey:'home_task_'+g.id+'_'+t.id+'_'+dateKey()
    }));
    changed=true;
  });
  if(changed)saveGoals();
}

function renderGoalsPage(){
  refreshAllTodayTasks(); // Keep home page tasks in sync
  document.getElementById('goalsPage').style.display='block';
  document.getElementById('goalDetailPage').style.display='none';
  const el=document.getElementById('goalsPage');
  const active=goals.filter(g=>!g.completed);
  const saved=goals.filter(g=>g.completed);
  const maxFree=5;
  el.innerHTML='';

  // Page header
  const hdr=document.createElement('div');
  hdr.style.cssText='background:var(--white);border-bottom:1px solid var(--border2);padding:16px 24px;';
  hdr.innerHTML=`
    <div style="max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;">
      <div>
        <div style="font-family:var(--display);font-size:26px;font-weight:700;color:var(--text);">🏔️ My Goals</div>
        <div style="font-size:13px;color:var(--text3);margin-top:2px;">${active.length} active · ${saved.length} completed · ${maxFree-active.length} slots remaining (free plan)</div>
      </div>
      <div style="display:flex;gap:10px;align-items:center;">
        <div style="text-align:right;">
          <div style="font-size:11px;color:var(--text3);margin-bottom:3px;">Overall progress</div>
          <div style="font-size:20px;font-weight:700;color:var(--blue);">${active.length?Math.round(active.reduce((s,g)=>s+g.pct,0)/active.length):0}%</div>
        </div>
        ${active.length<maxFree?`<button class="btn-blue" onclick="openCreate()" style="display:flex;align-items:center;gap:6px;"><span style="font-size:18px;">+</span> New Goal</button>`:
        `<div style="padding:10px 16px;background:var(--orange-light);border-radius:var(--rm);font-size:12px;color:var(--orange-dark);font-weight:600;border:1px solid var(--orange-muted);">⭐ Upgrade for more goals</div>`}
      </div>
    </div>`;
  el.appendChild(hdr);

  // Grid
  const main=document.createElement('div');
  main.style.cssText='max-width:1200px;margin:0 auto;padding:20px 24px;';

  if(active.length){
    const gridLabel=document.createElement('div');
    gridLabel.style.cssText='font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text4);margin-bottom:12px;';
    gridLabel.textContent='Active goals';
    main.appendChild(gridLabel);

    const grid=document.createElement('div');
    grid.style.cssText='display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;margin-bottom:28px;';

    active.forEach((g,i)=>{
      const card=buildGoalCard(g,i);
      grid.appendChild(card);
    });

    // Empty slot cards for remaining
    for(let i=active.length;i<maxFree;i++){
      const empty=document.createElement('div');
      empty.style.cssText='border-radius:var(--rl);border:2px dashed var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:32px 16px;cursor:pointer;transition:all .2s;min-height:220px;';
      empty.innerHTML=`<div style="font-size:32px;color:var(--text4);">+</div><div style="font-size:13px;font-weight:600;color:var(--text3);">Add a goal</div><div style="font-size:11px;color:var(--text4);text-align:center;">${i===0?'Start your first peak':'Keep climbing'}</div>`;
      empty.onmouseover=()=>{empty.style.borderColor='var(--blue)';empty.style.background='var(--blue-light)';};
      empty.onmouseout=()=>{empty.style.borderColor='var(--border)';empty.style.background='transparent';};
      empty.onclick=()=>openCreate();
      grid.appendChild(empty);
    }
    main.appendChild(grid);
  } else {
    const emptyState=document.createElement('div');
    emptyState.style.cssText='text-align:center;padding:60px 24px;';
    emptyState.innerHTML=`<div style="font-size:60px;margin-bottom:16px;">🏔️</div><div style="font-family:var(--display);font-size:24px;font-weight:700;color:var(--text);margin-bottom:8px;">No goals yet</div><p style="font-size:14px;color:var(--text3);line-height:1.7;max-width:360px;margin:0 auto 24px;">Every peak starts with a single step. Set your first goal and we'll build the path to get there.</p><button class="btn-blue" onclick="openCreate()" style="padding:12px 28px;font-size:14px;">Set my first goal 🏔️</button>`;
    main.appendChild(emptyState);
  }

  // Completed goals
  if(saved.length){
    const savedLabel=document.createElement('div');
    savedLabel.style.cssText='font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text4);margin-bottom:12px;';
    savedLabel.textContent='Completed peaks ✓';
    main.appendChild(savedLabel);
    const savedGrid=document.createElement('div');
    savedGrid.style.cssText='display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;';
    saved.forEach(g=>{
      const card=document.createElement('div');
      card.style.cssText='background:var(--white);border-radius:var(--rl);border:1px solid var(--border2);overflow:hidden;opacity:.7;';
      card.innerHTML=`<div style="height:80px;background:${g.img?`url(${g.img}) center/cover`:`linear-gradient(135deg,${g.color}44,${g.color}22)`};position:relative;"><div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:28px;">${g.emoji}</div><div style="position:absolute;top:8px;right:8px;background:var(--green);color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:100px;">✓ Completed</div></div><div style="padding:10px 12px;"><div style="font-size:13px;font-weight:700;color:var(--text);">${g.name}</div></div>`;
      savedGrid.appendChild(card);
    });
    main.appendChild(savedGrid);
  }

  el.appendChild(main);
}

function buildGoalCard(g,i){
  const card=document.createElement('div');
  card.style.cssText='background:var(--white);border-radius:var(--rl);box-shadow:var(--shadow);overflow:hidden;cursor:pointer;transition:box-shadow .2s,transform .2s;animation:fadeUp .35s ease both;';
  card.style.animationDelay=(i*.08)+'s';
  card.onmouseover=()=>{card.style.boxShadow='var(--shadow-md)';card.style.transform='translateY(-3px)';};
  card.onmouseout=()=>{card.style.boxShadow='var(--shadow)';card.style.transform='translateY(0)';};
  card.onclick=()=>openGoalDetail(g.id);

  const doneToday=allTasksForGoal(g).filter(t=>t.done).length;
  const totalToday=allTasksForGoal(g).length;

  card.innerHTML=`
    <div style="height:160px;position:relative;overflow:hidden;background:${g.img?'transparent':`linear-gradient(135deg,${g.color}33,${g.color}22)`};">
      ${g.img?`<img src="${g.img}" style="width:100%;height:100%;object-fit:cover;" onerror="this.style.display='none'"/>`:
      `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:52px;">${g.emoji}</div>`}
      <div style="position:absolute;inset:0;background:linear-gradient(to top,rgba(15,28,46,.7) 0%,transparent 50%);"></div>
      <div style="position:absolute;bottom:10px;left:12px;right:12px;">
        <div style="font-family:var(--display);font-size:17px;font-weight:700;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.4);">${g.name}</div>
      </div>

// ── Day calculation helpers ───────────────────────────────────────────────
function getDayNum(g){
  if(!g.startedDate)return null;
  const start=new Date(g.startedDate);start.setHours(0,0,0,0);
  const today=new Date();today.setHours(0,0,0,0);
  return Math.floor((today-start)/86400000)+1;
}
function dateKey(){return new Date().toDateString();}
// Get the actual calendar date string for a specific goal day number
function getDayDateStr(g,dayNum){
  if(!g.startedDate||!dayNum)return dateKey();
  const start=new Date(g.startedDate);
  start.setHours(0,0,0,0);
  const d=new Date(start);
  d.setDate(start.getDate()+(dayNum-1));
  return d.toDateString();
}
function getWeekNum(g){
  if(!g.startedDate)return 1;
  const dayNum=getDayNum(g)||1;
  return Math.ceil(dayNum/7);
}
function getTimePref(g,taskId){return LS.get('time_'+g.id+'_'+taskId,'');}
function setTimePref(g,taskId,time){LS.set('time_'+g.id+'_'+taskId,time);}

// ── isTaskDone / setTaskDone ───────────────────────────────────────────────
const PLANNING_DAYS=[1,8,16,24,32,40,48,56,64,72,80,88];
const CHECKIN_DAYS=[30,60,90];

function getTasksForDay(g,dayNum){
  const def=getGoalTaskDef(g);
  const totalDays=def.totalDays||g.totalDays||90;
  if(!dayNum||dayNum<1)return{daily:[],planning:[],checkin:[]};
  // Clamp to last day so goals past their end date still show tasks
  if(dayNum>totalDays)dayNum=totalDays;
  const daily=(def.daily(dayNum)||[]).map(t=>({...t}));
  const isPlanDay=def.planningDays.includes(dayNum);
  const isCheckinDay=def.checkinDays.includes(dayNum);
  // Always call planning/checkin — let the function decide what to return for each day
  const planning=(def.planning(dayNum)||[]).map(t=>({...t}));
  const checkin=isCheckinDay?(def.checkin(dayNum)||[]).map(t=>({...t})):[];
  return{daily,planning,checkin};
}

async function setTaskDone(g, taskId, taskType, dayNum, val) {
  const dayDate = (taskType === 'daily' || !taskType) ? getDayDateStr(g, dayNum) : 'milestone_' + dayNum;
  
  // 1. Keep LocalStorage so the checkmark stays if you're offline
  if(taskType === 'daily' || !taskType) {
    LS.set('daily_' + g.id + '_' + taskId + '_' + dayDate, val);
  } else if(taskType === 'planning') {
    LS.set('plan_' + g.id + '_' + taskId + '_d' + dayNum, val);
  } else if(taskType === 'checkin') {
    LS.set('checkin_' + g.id + '_' + taskId + '_d' + dayNum, val);
  }

  // 2. SYNC TO CLOUD (The missing piece)
  if (window.supabaseClient) {
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (session) {
      const storageKey = 'daily_' + g.id + '_' + taskId + '_' + dayDate;
      if (val) {
        await supabaseClient.from('habits').upsert({
          user_id: session.user.id,
          name: storageKey, // We use the specific key to ensure home/goals match
          is_checked: true,
          completed_at: new Date().toISOString().split('T')[0]
        });
      } else {
        await supabaseClient.from('habits').delete()
          .eq('user_id', session.user.id)
          .eq('name', storageKey);
      }
    }
  }
}
  function isTaskDone(g, taskId, taskType, dayNum) {
  const dayDate = (taskType === 'daily' || !taskType) ? getDayDateStr(g, dayNum) : 'milestone_' + dayNum;
  if(taskType === 'daily' || !taskType) {
    return !!LS.get('daily_' + g.id + '_' + taskId + '_' + dayDate);

// ── Overall progress helper ─────────────────────────────────────────────────
// numerator = tasks DONE from days 1..dayNum (elapsed only)
// denominator = ALL tasks across the FULL plan (1..totalDays)
// This prevents Day 1 fully done showing 100%
function calcOverallPct(g,dayNum){
  const def=getGoalTaskDef(g);
  const totalD=def.totalDays||g.totalDays||90;
  if(!g.startedDate||!dayNum)return 0;
  let done=0,planTotal=0;
  for(let d=1;d<=totalD;d++){
    const{daily,planning,checkin}=getTasksForDay(g,d);
    const tasks=[...daily,...planning,...checkin];
    planTotal+=tasks.length;
    if(d<=dayNum){
      done+=tasks.filter(t=>isTaskDone(g,t.id,t.type,d)).length;
    }
  }
  return planTotal>0?Math.round(done/planTotal*100):0;
}

const _celebratedDays={};
function checkDayComplete(g,dayNum){
  if(!dayNum)return;
  const freshG=goals.find(x=>String(x.id)===String(g.id))||g;
  const _def=getGoalTaskDef(freshG);
  const _totalD=_def?(_def.totalDays||freshG.totalDays||90):(freshG.totalDays||90);
  if(dayNum>_totalD)dayNum=_totalD;
  const{daily,planning,checkin}=getTasksForDay(freshG,dayNum);
  const allTasks=[...daily,...planning,...checkin];
  if(!allTasks.length)return;
  const allDone=allTasks.every(t=>isTaskDone(freshG,t.id,t.type||'daily',dayNum)===true);
  const celebKey=freshG.id+'_day'+dayNum+'_'+dateKey();
  if(allDone&&!_celebratedDays[celebKey]){
    _celebratedDays[celebKey]=true;
    if(dayNum===21){
      const def=getGoalTaskDef(freshG);
      const msg=def.day21msg||'21 days in. You are building something real.';
      setTimeout(()=>{confetti();showCongrats('Day 21 — You showed up! 🌟',msg,'🌟');},400);
    } else {
      setTimeout(()=>{confetti();showCongrats('Day '+dayNum+' complete! 🎉','Every task for today is done. See you tomorrow! 🏔️','🎉');},400);
    }
  }
}

// ── switchView / renderTaskView ────────────────────────────────────────────
function switchView(v){
  currentView=v;
  const g=goals.find(x=>x.id===activeGoalId);if(!g)return;
  document.querySelectorAll('.vt-btn').forEach(b=>{
    const isActive=b.dataset.view===v||b.textContent==={today:'Today',weekly:'Weekly',milestone:'Milestones',plan:'Full Plan'}[v];
    b.classList.toggle('on',isActive);
    // Update inline styles so active state is fully visible
    b.style.background=isActive?g.color:'var(--white)';
    b.style.color=isActive?'#fff':'var(--text2)';
    b.style.borderColor=isActive?g.color:'var(--border)';
    b.style.fontWeight=isActive?'700':'600';
  });
  const panel=document.getElementById('taskPanel');
  if(panel){
    panel.style.animation='none';
    requestAnimationFrame(()=>{panel.style.animation='slideRight .25s ease';});
    renderTaskView(g,panel);
  }
}
function renderTaskView(g,panel){
  panel.innerHTML='';
  if(currentView==='today')renderTodayView(g,panel);
  else if(currentView==='weekly')renderWeeklyView(g,panel);
  else if(currentView==='plan')renderFullPlanView(g,panel);
  else renderMilestoneView(g,panel);
}

// ── renderFullPlanView ────────────────────────────────────────────────────
function renderFullPlanView(g,panel){
  const def=getGoalTaskDef(g);
  const totalDays=def.totalDays||g.totalDays||90;
  const today=g.startedDate?getDayNum(g)||1:1;

  // Header
  const hdr=document.createElement('div');
  hdr.style.cssText='padding:14px 16px;border-bottom:1px solid var(--border2);';
  hdr.innerHTML='<div style="font-size:14px;font-weight:700;color:var(--text);">Full '+totalDays+'-Day Plan</div>'
    +'<div style="font-size:11px;color:var(--text3);margin-top:2px;">Every task, every day — tap any day to expand</div>';
  panel.appendChild(hdr);

  const scroll=document.createElement('div');
  scroll.style.cssText='padding:10px 16px 20px;';

  // Build a map of day → tasks (only days that have at least one task)
  const dayMap={};
  for(let d=1;d<=totalDays;d++){
    const daily=(def.daily(d)||[]);
    const isPlan=def.planningDays.includes(d);
    const isCheckin=def.checkinDays.includes(d);
    const planning=isPlan?(def.planning(d)||[]):[];
    const checkin=isCheckin?(def.checkin(d)||[]):[];
    // Only add planning/checkin tasks that are NOT identical to every other day
    // For daily tasks: only show on first occurrence if they repeat identically every day
    const allForDay=[...daily,...planning,...checkin];
    if(allForDay.length>0){
      dayMap[d]={daily,planning,checkin};
    }
  }

  // Figure out which daily tasks repeat EVERY day (so we can show them once at top, not 90 times)
  const day1daily=(def.daily(1)||[]);
  const allDaysHaveSameDaily=day1daily.length>0 && Object.keys(dayMap).every(d=>{
    const dd=(def.daily(Number(d))||[]);
    return dd.length===day1daily.length && dd.every((t,i)=>t.id===day1daily[i].id&&t.text===day1daily[i].text);
  });

  // Show repeating daily tasks as a pinned "Every day" section
  if(allDaysHaveSameDaily && day1daily.length>0){
    const everyDay=document.createElement('div');
    everyDay.style.cssText='background:var(--blue-light);border-radius:var(--r);padding:12px 14px;margin-bottom:14px;border:1px solid var(--blue)22;';
    everyDay.innerHTML='<div style="font-size:11px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;">📅 Every Day (Days 1–'+totalDays+')</div>';
    day1daily.forEach(t=>{
      const row=document.createElement('div');
      row.style.cssText='font-size:13px;color:var(--text);padding:4px 0;display:flex;align-items:center;gap:8px;';
      row.innerHTML='<span style="color:var(--blue);font-size:14px;">•</span><span>'+t.text+(t.note?'<span style="color:var(--text3);font-size:11px;"> — '+t.note+'</span>':'')+'</span>';
      everyDay.appendChild(row);
    });
    scroll.appendChild(everyDay);
  }

  // Now show the special/scheduled days only
  // Collect days that have SOMETHING beyond the repeating daily
  const specialDays=[];
  for(let d=1;d<=totalDays;d++){
    if(!dayMap[d])continue;
    const{daily,planning,checkin}=dayMap[d];
    // If allDaysHaveSameDaily, skip days that ONLY have the repeating daily tasks
    const hasExtra=planning.length>0||checkin.length>0||
      (allDaysHaveSameDaily? false : daily.length>0)||
      (!allDaysHaveSameDaily && daily.length>0);
    // For goals with varying daily tasks (like marathon), show every day that has a task
    const dailyIsSpecial=!allDaysHaveSameDaily && daily.length>0;
    if(hasExtra||dailyIsSpecial){
      specialDays.push({d,daily:allDaysHaveSameDaily?[]:daily,planning,checkin});
    }
  }

  if(specialDays.length===0 && allDaysHaveSameDaily){
    const note=document.createElement('div');
    note.style.cssText='text-align:center;padding:20px;color:var(--text3);font-size:13px;';
    note.textContent='No scheduled special days for this goal — just your daily habits above.';
    scroll.appendChild(note);
    panel.appendChild(scroll);
    return;
  }

  // Group consecutive days with same content? No — just show day by day, collapsible
  // For mobile: show as a compact list grouped by week or milestone
  
  // Group by milestone
  const milestones=g.milestones||[];
  const msRanges=(g.milestones||[]).map((m,i)=>{
    const prev=(g.milestones||[])[i-1];
    const prevEnd=prev?Math.round(prev.pct/100*totalDays):0;
    const thisEnd=Math.round(m.pct/100*totalDays);
    return{name:m.name,startDay:prevEnd+1,endDay:thisEnd};
  });
  const getMilestone=(d)=>{
    if(!msRanges.length)return null;
    const ms=msRanges.find(m=>d>=m.startDay&&d<=m.endDay);
    return ms?ms.name:null;
  };

  let lastMs=null;
  specialDays.forEach(({d,daily,planning,checkin})=>{
    const ms=getMilestone(d);
    if(ms&&ms!==lastMs){
      lastMs=ms;
      const msHdr=document.createElement('div');
      msHdr.style.cssText='font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text4);margin:16px 0 8px;padding-bottom:4px;border-bottom:1px solid var(--border2);';
      msHdr.textContent=ms;
      scroll.appendChild(msHdr);
    }

    const isToday=d===today;
    const isPast=g.startedDate&&d<today;

    const dayRow=document.createElement('div');
    dayRow.style.cssText='margin-bottom:6px;border-radius:var(--r);border:1px solid '+(isToday?'var(--blue)':isPast?'var(--border2)':'var(--border)')+';overflow:hidden;';
    
    // Day header (always visible, acts as toggle)
    const allTasks=[...daily,...planning,...checkin];
    const firstTask=allTasks[0];
    const extraCount=allTasks.length-1;

    const dayHdr=document.createElement('div');
    dayHdr.style.cssText='display:flex;align-items:center;gap:10px;padding:9px 12px;cursor:pointer;background:'+(isToday?'var(--blue-light)':isPast?'var(--bg)':'var(--white)')+';';
    
    const dayBadge=document.createElement('div');
    dayBadge.style.cssText='font-size:11px;font-weight:700;color:'+(isToday?'var(--blue)':isPast?'var(--text4)':'var(--text3)')+';white-space:nowrap;min-width:44px;';
    dayBadge.textContent='Day '+d;
    
    const taskPreview=document.createElement('div');
    taskPreview.style.cssText='flex:1;font-size:13px;color:'+(isPast?'var(--text3)':'var(--text)')+';'+(isPast?'text-decoration:line-through;':'');
    taskPreview.textContent=firstTask?firstTask.text+(extraCount>0?' +'+extraCount+' more':''):'';

    // Type badges
    const badges=document.createElement('div');
    badges.style.cssText='display:flex;gap:4px;align-items:center;flex-shrink:0;';
    if(planning.length){
      const b=document.createElement('span');
      b.style.cssText='font-size:9px;font-weight:700;padding:2px 5px;border-radius:100px;background:var(--orange-light);color:var(--orange-dark);';
      b.textContent='PLAN';
      badges.appendChild(b);
    }
    if(checkin.length){
      const b=document.createElement('span');
      b.style.cssText='font-size:9px;font-weight:700;padding:2px 5px;border-radius:100px;background:var(--green-light);color:var(--green-dark);';
      b.textContent='CHECK-IN';
      badges.appendChild(b);
    }
    const chevron=document.createElement('span');
    chevron.style.cssText='font-size:12px;color:var(--text4);transition:transform .2s;';
    chevron.textContent='›';

    dayHdr.appendChild(dayBadge);
    dayHdr.appendChild(taskPreview);
    dayHdr.appendChild(badges);
    dayHdr.appendChild(chevron);

    // Expandable task detail
    const detail=document.createElement('div');
    detail.style.cssText='display:none;padding:8px 12px 12px;background:var(--white);border-top:1px solid var(--border2);';
    
    allTasks.forEach(t=>{
      const tr=document.createElement('div');
      tr.style.cssText='padding:6px 0;border-bottom:1px solid var(--border2);';
      tr.innerHTML='<div style="font-size:13px;font-weight:600;color:var(--text);">'
        +(planning.includes(t)?'<span style="font-size:10px;background:var(--orange-light);color:var(--orange-dark);padding:1px 5px;border-radius:4px;margin-right:5px;font-weight:700;">PLAN</span>':'')
        +(checkin.includes(t)?'<span style="font-size:10px;background:var(--green-light);color:var(--green-dark);padding:1px 5px;border-radius:4px;margin-right:5px;font-weight:700;">CHECK-IN</span>':'')
        +t.text+'</div>'
        +(t.note?'<div style="font-size:11px;color:var(--text3);margin-top:3px;line-height:1.5;">'+t.note+'</div>':'')
        +(t.time?'<div style="font-size:10px;color:var(--text4);margin-top:2px;">⏰ '+t.time+'</div>':'');
      detail.appendChild(tr);
    });

    let open=isToday;
    if(isToday){detail.style.display='block';chevron.style.transform='rotate(90deg)';}

    dayHdr.onclick=()=>{
      open=!open;
      detail.style.display=open?'block':'none';
      chevron.style.transform=open?'rotate(90deg)':'';
    };

    dayRow.appendChild(dayHdr);
    dayRow.appendChild(detail);
    scroll.appendChild(dayRow);
  });

  panel.appendChild(scroll);
}


// ── renderTodayView ────────────────────────────────────────────────────────
function renderTodayView(g,panel){
  if(!g.startedDate){
    panel.innerHTML='<div style="text-align:center;padding:32px 24px;"><div style="font-size:36px;margin-bottom:10px;">🚀</div><div style="font-family:var(--display);font-size:16px;font-weight:700;color:var(--text);margin-bottom:6px;">Ready to start?</div><p style="font-size:13px;color:var(--text3);line-height:1.6;">Hit the <strong>Start — Day 1</strong> button above. Your tasks will appear here each day.</p></div>';
    return;
  }
  const def=getGoalTaskDef(g);
  const totalD=def.totalDays||g.totalDays||90;
  let dayNum=getDayNum(g)||1;
  if(dayNum>totalD)dayNum=totalD;
  const{daily,planning,checkin}=getTasksForDay(g,dayNum);
  const allTasks=[...daily,...planning,...checkin];
  const doneCount=allTasks.filter(t=>isTaskDone(g,t.id,t.type,dayNum)).length;
  const pct=allTasks.length?Math.round(doneCount/allTasks.length*100):0;
  const hdr=document.createElement('div');hdr.style.cssText='padding:14px 16px;border-bottom:1px solid var(--border2);';
  hdr.innerHTML='<div style="display:flex;justify-content:space-between;align-items:center;"><div><div style="font-size:14px;font-weight:700;color:var(--text);">Day '+dayNum+' of '+totalD+'</div><div style="font-size:11px;color:var(--text3);">'+new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})+'</div></div><div style="font-size:12px;color:var(--text3);" id="todayTaskCountHdr">'+doneCount+'/'+allTasks.length+' tasks</div></div>';
  panel.appendChild(hdr);
  if(g.sickDayDate===dateKey()){panel.innerHTML+='<div style="padding:16px;text-align:center;"><div style="font-size:20px;">🤒</div><div style="font-size:13px;font-weight:600;color:var(--red);margin-top:4px;">Sick day — rest up. Fresh start tomorrow.</div></div>';return;}
  const list=document.createElement('div');list.style.cssText='padding:8px 16px 4px;';
  if(daily.length){const dl=document.createElement('div');dl.style.cssText='font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--text4);margin-bottom:6px;margin-top:4px;';dl.textContent='Daily habits';list.appendChild(dl);daily.forEach(t=>list.appendChild(buildSmartRow(g,t,dayNum)));}
  if(planning.length){const pl=document.createElement('div');pl.style.cssText='font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--orange-dark);margin-bottom:6px;margin-top:12px;padding:4px 8px;background:var(--orange-light);border-radius:var(--r);display:inline-block;';pl.textContent='📋 Planning day';list.appendChild(pl);planning.forEach(t=>list.appendChild(buildSmartRow(g,t,dayNum)));}
  if(checkin.length){const cl=document.createElement('div');cl.style.cssText='font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--green-dark);margin-bottom:6px;margin-top:12px;padding:4px 8px;background:var(--green-light);border-radius:var(--r);display:inline-block;';cl.textContent='✅ Milestone check-in';list.appendChild(cl);checkin.forEach(t=>list.appendChild(buildSmartRow(g,t,dayNum)));}
  if(!allTasks.length)list.innerHTML='<div style="text-align:center;padding:24px;color:var(--text3);font-size:13px;">No tasks for today.</div>';
  
  // Custom tasks the user has added
  const customTasks=getCustomTasks(g.id);
  if(customTasks.length){
    const ctl=document.createElement('div');
    ctl.style.cssText='font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--text4);margin-bottom:6px;margin-top:12px;';
    ctl.textContent='My custom tasks';
    list.appendChild(ctl);
    customTasks.forEach(ct=>list.appendChild(buildCustomRow(g,ct,dayNum)));
  }

  // + Add task button
  const addBtn=document.createElement('button');
  addBtn.style.cssText='margin:12px 0 8px;width:100%;padding:9px;border:1.5px dashed var(--border);border-radius:var(--r);background:transparent;color:var(--text3);font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;';
  addBtn.innerHTML='<span style="font-size:16px;line-height:1;">+</span> Add custom task';
  addBtn.onmouseover=()=>{addBtn.style.borderColor='var(--blue)';addBtn.style.color='var(--blue)';addBtn.style.background='var(--blue-light)';};
  addBtn.onmouseout=()=>{addBtn.style.borderColor='var(--border)';addBtn.style.color='var(--text3)';addBtn.style.background='transparent';};
  addBtn.onclick=()=>openAddTaskModal(g,list,addBtn,dayNum);
  list.appendChild(addBtn);
  
  panel.appendChild(list);
}

// ── renderWeeklyView ───────────────────────────────────────────────────────
function renderWeeklyView(g,panel){
  const today=new Date();today.setHours(0,0,0,0);
  const dayNum=getDayNum(g);
  const startDate=g.startedDate?new Date(g.startedDate):null;
  if(startDate)startDate.setHours(0,0,0,0);
  const calWeekSun=new Date(today);calWeekSun.setDate(today.getDate()-today.getDay());
  const calWeekSat=new Date(calWeekSun);calWeekSat.setDate(calWeekSun.getDate()+6);
  const calDateToGoalDay=(calDate)=>{if(!startDate)return null;const diff=Math.floor((calDate-startDate)/86400000)+1;const def=getGoalTaskDef(g);if(diff<1||diff>(def.totalDays||g.totalDays||90))return null;return diff;};
  const hdr=document.createElement('div');hdr.style.cssText='padding:14px 16px;border-bottom:1px solid var(--border2);';
  hdr.innerHTML='<div style="font-size:14px;font-weight:700;color:var(--text);">This week</div><div style="font-size:12px;color:var(--text3);margin-top:2px;">'+calWeekSun.toLocaleDateString('en-US',{month:'short',day:'numeric'})+' – '+calWeekSat.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})+'</div>';
  panel.appendChild(hdr);
  const dayNames=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const grid=document.createElement('div');grid.style.cssText='padding:10px 16px;display:grid;grid-template-columns:repeat(7,1fr);gap:5px;border-bottom:1px solid var(--border2);';
  for(let i=0;i<7;i++){
    const calDate=new Date(calWeekSun);calDate.setDate(calWeekSun.getDate()+i);
    const isToday=calDate.toDateString()===today.toDateString();const isPast=calDate<today&&!isToday;
    const goalDay=calDateToGoalDay(calDate);
    const col=document.createElement('div');col.style.cssText='background:'+(isToday?'var(--blue-light)':isPast?'var(--bg2)':'var(--bg)')+';border-radius:var(--rm);padding:6px 4px;border:'+(isToday?'1px solid var(--blue-muted)':'1px solid var(--border2)')+';text-align:center;';
    let html='<div style="font-size:9px;font-weight:700;color:'+(isToday?'var(--blue)':'var(--text4)')+';">'+dayNames[i]+'</div><div style="font-size:13px;font-weight:700;color:'+(isToday?'var(--blue)':'var(--text2)')+';margin:2px 0;">'+calDate.getDate()+'</div>';

// ── renderMilestoneView ────────────────────────────────────────────────────
function renderMilestoneView(g,panel){

  const startDate=new Date(g.startedDate);startDate.setHours(0,0,0,0);
  const def2=getGoalTaskDef(g);const totalD=def2.totalDays||g.totalDays||90;
  const milestoneRanges=g.milestones.map((m,i)=>{const prev=g.milestones[i-1];const prevEnd=prev?Math.round(prev.pct/100*totalD):0;const thisEnd=Math.round(m.pct/100*totalD);return{ms:i,startDay:prevEnd+1,endDay:thisEnd};});
  let activeMsIdx=currentMilestoneIdx;
  milestoneRanges.forEach(({ms,startDay,endDay})=>{if(dayNum>=startDay&&dayNum<=endDay)activeMsIdx=activeMsIdx===0?ms:activeMsIdx;});

    tab.onclick=()=>{currentMilestoneIdx=i;renderTaskView(g,panel);};tabsWrap.appendChild(tab);

  panel.appendChild(tabsWrap);
  const{ms,startDay,endDay}=milestoneRanges[activeMsIdx];const m=g.milestones[activeMsIdx];
  let doneInMs=0,totalInMs=0;for(let d=startDay;d<=endDay;d++){const{daily,planning,checkin}=getTasksForDay(g,d);[...daily,...planning,...checkin].forEach(t=>{totalInMs++;if(isTaskDone(g,t.id,t.type,d))doneInMs++;});}

  confetti();showCongrats('Milestone reached! 🏔️','You hit "'+g.milestones[mIdx].name+'"! The next peak awaits.','🏔️');

function addTaskBtn(panel,g,milestoneIdx){
  const wrap=document.createElement('div');wrap.style.cssText='padding:4px 16px 14px;';
  const btn=document.createElement('button');btn.style.cssText='width:100%;padding:8px;border-radius:var(--rm);border:1.5px dashed var(--border);font-size:12px;color:var(--text3);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .15s;';

    if(idx>=0)g.milestones[idx].tasks.push({id:Date.now(),text:text.trim(),time:'',done:false});
    else if(g.milestones.length)g.milestones[0].tasks.push({id:Date.now(),text:text.trim(),time:'',done:false});

function toggleTask(taskId,goalId){
  const g=goals.find(x=>String(x.id)===String(goalId));if(!g)return;
  let task=null;g.milestones.forEach(m=>{const t=m.tasks.find(t=>t.id===taskId);if(t)task=t;});
  if(!task)return;task.done=!task.done;
  const homeHabits=LS.get('habits_'+dateKey(),[]);
  const hi=homeHabits.findIndex(h=>h.id===taskId);
  if(hi>-1){homeHabits[hi].done=task.done;LS.set('habits_'+dateKey(),homeHabits);}
  saveGoals();renderGoalDetail();
}

function allTasksForGoal(g){
  // For goals using GOAL_TASK_DEFS, return today's tasks with their done state
  const def=getGoalTaskDef(g);
  if(def&&g.startedDate){
    const _totalD=def.totalDays||g.totalDays||90;
    let dayNum=getDayNum(g)||1;if(dayNum>_totalD)dayNum=_totalD;
    let{daily,planning,checkin}=getTasksForDay(g,dayNum);
    // If no tasks on this day (e.g. rest day or setup day), look ahead up to 3 days
    if(!daily.length&&!planning.length&&!checkin.length){
      for(let d=dayNum+1;d<=Math.min(dayNum+3,_totalD);d++){
        const nxt=getTasksForDay(g,d);
        if(nxt.daily.length||nxt.planning.length){daily=nxt.daily;planning=nxt.planning;checkin=nxt.checkin;break;}
      }
    }
    return [...daily,...planning,...checkin].map(t=>({
      ...t,
      done:isTaskDone(g,t.id,t.type,dayNum)
    }));
  }
  // Fallback: milestone tasks (custom goals built from scratch)
  return g.milestones.flatMap(m=>m.tasks);
}

// ── startGoal ─────────────────────────────────────────────────────────────
function startGoal(id){
  const g=goals.find(x=>x.id===id);if(!g)return;
  // Free plan: max 5 active goals
  const isPro=JSON.parse(localStorage.getItem('peakly_pro')||'false');
  const isTrial=JSON.parse(localStorage.getItem('peakly_trial')||'false');
  if(!isPro&&!isTrial){
    const activeCount=goals.filter(x=>x.startedDate&&!x.completed).length;
    if(activeCount>=5){
      showToast('Free plan allows 5 active goals. Upgrade to Pro for unlimited! 🚀');
      setTimeout(()=>{
        if(confirm('Upgrade to Pro for unlimited goals?\n\n$6/mo — 14-day free trial, no card required.')){
          window.location.href='peakly-auth.html?plan=pro';
        }
      },1000);
      return;
    }
  }
  g.startedDate=new Date().toISOString();
  const def=getGoalTaskDef(g);
  g.totalDays=def.totalDays||g.totalDays||90;
  g.sickDayDate=null;
  const events=LS.get('cal_events',[]);
  events.push({title:'🚀 Day 1: '+g.name,date:new Date().toDateString(),type:'goal_start',goalId:g.id});
  LS.set('cal_events',events);
  saveGoals();
  confetti();
  showCongrats('Day 1 — Let\'s go! 🚀','Your '+g.totalDays+'-day journey starts today. Your tasks are ready. You\'ve got this!','🚀');
  renderGoalDetail();
}

function buildMountain(g){
  const wrap=document.createElement('div');
  wrap.style.cssText='background:var(--white);border-radius:var(--rl);border:1px solid var(--border2);box-shadow:var(--shadow);padding:16px;margin-bottom:14px;';
  const W=580,H=200,n=g.milestones.length,padX=40;
  const segW=(W-padX*2)/n;
  const peaks=[],valleys=[];
  for(let i=0;i<n;i++){
    const x=padX+segW*(i+0.5);
    const hf=0.3+(i/(n-1||1))*0.65;
    peaks.push({x,y:H-20-(H-50)*hf,m:g.milestones[i]});
  }
  for(let i=0;i<n-1;i++)valleys.push({x:(peaks[i].x+peaks[i+1].x)/2,y:H-30});
  let pathD='M '+padX+' '+(H-20);
  for(let i=0;i<n;i++){if(i>0)pathD+=' L '+valleys[i-1].x+' '+valleys[i-1].y;pathD+=' L '+peaks[i].x+' '+peaks[i].y;}
  pathD+=' L '+(W-padX)+' '+(H-20);
  let svgHTML='<svg width="100%" viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg">'
    +'<defs><linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">'
    +'<stop offset="0%" stop-color="'+g.color+'11"/><stop offset="100%" stop-color="white" stop-opacity="0"/>'
    +'</linearGradient></defs>'
    +'<rect x="0" y="0" width="'+W+'" height="'+H+'" fill="url(#skyGrad)" rx="8"/>'
    +'<path d="'+pathD+' L '+padX+' '+(H-20)+' Z" fill="'+g.color+'18" stroke="none"/>'
    +'<path d="'+pathD+'" fill="none" stroke="'+g.color+'44" stroke-width="2" stroke-linejoin="round"/>';
  peaks.forEach((p,i)=>{
    const reached=p.m.reached;
    const isCurrent=!reached&&(i===0||g.milestones[i-1].reached);
    svgHTML+='<circle cx="'+p.x+'" cy="'+p.y+'" r="'+(reached?8:isCurrent?7:6)+'" fill="'+(reached?g.color:isCurrent?'white':'var(--bg2)')+'" stroke="'+(reached?'white':g.color)+'" stroke-width="'+(reached?2:1.5)+'" style="'+(isCurrent?'animation:peakPulse 2s ease-in-out infinite;':'')+'" />';
    if(reached)svgHTML+='<text x="'+p.x+'" y="'+(p.y+4)+'" text-anchor="middle" font-size="8" fill="white" font-weight="bold" font-family="Plus Jakarta Sans">✓</text>';
    svgHTML+='<text x="'+p.x+'" y="'+(p.y-14)+'" text-anchor="middle" font-size="9" fill="'+(reached?g.color:'var(--text3)')+'" font-weight="'+(reached?700:400)+'" font-family="Plus Jakarta Sans">'+(p.m.name.length>18?p.m.name.slice(0,17)+'…':p.m.name)+'</text>';
  });
  svgHTML+='<line x1="'+padX+'" y1="'+(H-20)+'" x2="'+(W-padX)+'" y2="'+(H-20)+'" stroke="var(--border)" stroke-width="1"/></svg>';
  wrap.innerHTML=svgHTML;
  return wrap;
}

// ── renderGoalDetail ──────────────────────────────────────────────────────
function renderGoalDetail(){
  const g=goals.find(x=>x.id===activeGoalId);
  if(!g)return;
  const el=document.getElementById('goalDetailPage');
  el.innerHTML='';

  const def0=getGoalTaskDef(g);
  const totalDaysForGoal=def0.totalDays||g.totalDays||90;
  let dayNum0=g.startedDate?getDayNum(g)||1:null;
  if(dayNum0&&dayNum0>totalDaysForGoal)dayNum0=totalDaysForGoal;

  // Today's tasks for progress
  let allTasks=[];
  let pct=0;
  if(g.startedDate&&dayNum0){
    const{daily,planning,checkin}=getTasksForDay(g,dayNum0);
    allTasks=[...daily,...planning,...checkin].map(t=>({...t,done:isTaskDone(g,t.id,t.type,dayNum0)}));
    const doneTasks=allTasks.filter(t=>t.done).length;
    pct=allTasks.length>0?Math.round(doneTasks/allTasks.length*100):0;
    // Write today's tasks onto goal object so home page can read them
    // Each task gets a unique homeKey so home page can check done state independently
    g.todayTasks=allTasks.map(t=>({
      task:t.task||t.name||t.text||'',
      time:t.time||t.defTime||'09:00',
      taskId:t.id,
      taskType:t.type||'daily',
      homeKey:'home_task_'+g.id+'_'+t.id+'_'+dateKey()
    }));
    saveGoals();
  } else {
    allTasks=g.milestones.flatMap(m=>m.tasks);
    pct=allTasks.length?Math.round(allTasks.filter(t=>t.done).length/allTasks.length*100):0;
  }
  // Overall progress: done tasks / FULL plan tasks (not just elapsed)
  const overallPct=calcOverallPct(g,dayNum0);
  if(!g.completed){g.pct=overallPct;saveGoals();}

  // ── HEADER BAR ──────────────────────────────────────────────────────────
  const startedDate=g.startedDate?new Date(g.startedDate):null;
  const hdrBar=document.createElement('div');
  hdrBar.style.cssText='background:var(--white);border-bottom:1px solid var(--border2);padding:12px 24px;display:flex;align-items:center;gap:14px;position:sticky;top:54px;z-index:90;flex-wrap:wrap;';
  hdrBar.innerHTML='<button onclick="backToGoals()" style="display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text3);font-weight:500;padding:6px 10px;border-radius:var(--r);border:1px solid var(--border);background:var(--white);flex-shrink:0;">← Back</button>'
    +'<div style="flex:1;min-width:160px;">'
    +'<div style="font-family:var(--display);font-size:19px;font-weight:700;color:var(--text);">'+g.emoji+' '+g.name+'</div>'
    +'<div style="font-size:11px;color:var(--text3);">'+(startedDate?'Day '+dayNum0+' of '+totalDaysForGoal+' · Started '+startedDate.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):g.target?'Target: '+new Date(g.target).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'}):'Not started yet')+'</div>'
    +'</div>'
    +(!g.startedDate
      ?'<button onclick="startGoal('+g.id+')" style="padding:10px 18px;border-radius:var(--rm);background:'+g.color+';color:#fff;font-size:13px;font-weight:700;border:none;cursor:pointer;white-space:nowrap;flex-shrink:0;">🚀 Start — Day 1</button>'
      :'');
  el.appendChild(hdrBar);

  const main=document.createElement('div');
  main.style.cssText='max-width:1260px;margin:0 auto;padding:20px 24px;display:grid;grid-template-columns:1fr 360px;gap:20px;align-items:start;';

  // ── LEFT COLUMN ──────────────────────────────────────────────────────────
  const left=document.createElement('div');

  // Cover image hero (if goal has an image)

    const coverWrap=document.createElement('div');
    coverWrap.style.cssText='position:relative;border-radius:var(--rl);overflow:hidden;margin-bottom:14px;height:220px;box-shadow:var(--shadow);';
    const coverImg=document.createElement('img');
    coverImg.src=g.img;
    coverImg.style.cssText='width:100%;height:100%;object-fit:cover;';
    coverImg.onerror=()=>{
      coverImg.style.display='none';
      const fallback=document.createElement('div');
      fallback.style.cssText='width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:64px;background:linear-gradient(135deg,'+g.color+'33,'+g.color+'11);';
      fallback.textContent=g.emoji;
      coverWrap.insertBefore(fallback,coverOverlay);

    // Gradient overlay at bottom
    const coverOverlay=document.createElement('div');
    coverOverlay.style.cssText='position:absolute;inset:0;background:linear-gradient(to top,rgba(15,28,46,0.6) 0%,transparent 50%);';

    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">'
    +'<span style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;">Today</span>'
    +'<span style="font-size:11px;color:var(--text3);" id="todayTaskCount">'+allTasks.filter(t=>t.done).length+' / '+allTasks.length+' tasks</span>'

    +'<span style="font-size:11px;color:var(--text3);">Milestones reached</span>'

    +'</div>';
  right.appendChild(pbRow);

  // Milestones sidebar
  const mCard=document.createElement('div');mCard.style.cssText='background:var(--white);border-radius:var(--rl);border:1px solid var(--border2);box-shadow:var(--shadow);padding:14px;margin-bottom:14px;';
  mCard.innerHTML='<div style="font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text4);margin-bottom:10px;">Milestones</div>';
  g.milestones.forEach((m,i)=>{
    const mRow=document.createElement('div');mRow.style.cssText='display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border2);cursor:pointer;';
    mRow.innerHTML='<div style="width:22px;height:22px;border-radius:50%;background:'+(m.reached?g.color:'var(--bg2)')+';display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:'+(m.reached?'#fff':'var(--text3)')+';flex-shrink:0;">'+(m.reached?'✓':(i+1))+'</div>'
      +'<div style="flex:1;min-width:0;"><div style="font-size:12px;font-weight:600;color:'+(m.reached?'var(--text3)':'var(--text)')+';text-decoration:'+(m.reached?'line-through':'none')+';">'+m.name+'</div>'

  main.appendChild(left);main.appendChild(right);

}

// ── Goal action functions ─────────────────────────────────────────────────
function showCongrats(title,msg,emoji){
  document.getElementById('congratsTitle').textContent=title;
  document.getElementById('congratsMsg').textContent=msg;
  document.getElementById('congratsEmoji').textContent=emoji||'🎉';
  document.getElementById('congratsModal').style.display='flex';
}

function markComplete(id){
  const g=goals.find(x=>String(x.id)===String(id));if(!g)return;
  showConfirmModal(
    '🏔️ Mark as complete?',
    '"'+g.name+'" will move to your Completed Peaks.',
    'Yes, I did it!',
    ()=>{
      g.completed=true;g.pct=100;g.milestones.forEach(m=>m.reached=true);saveGoals();
      confetti();showCongrats('Peak reached! 🏔️','You conquered "'+g.name+'"! Now in your Completed Peaks. Time to set the next one!','🏔️');
      renderGoalsPage();document.getElementById('goalDetailPage').style.display='none';document.getElementById('goalsPage').style.display='block';
    }
  );
}

function restartGoal(id){
  const g=goals.find(x=>String(x.id)===String(id));if(!g)return;
  showConfirmModal(
    '🔄 Restart goal?',
    'All progress will be reset and Day 1 begins today.',
    'Yes, restart',
    ()=>{
      const keysToRemove=[];
      for(let i=0;i<localStorage.length;i++){
        const k=localStorage.key(i);
        if(k&&(k.startsWith('daily_'+g.id+'_')||k.startsWith('plan_'+g.id+'_')||k.startsWith('checkin_'+g.id+'_'))){keysToRemove.push(k);}
      }
      keysToRemove.forEach(k=>localStorage.removeItem(k));
      g.milestones.forEach(m=>{m.reached=false;m.tasks.forEach(t=>t.done=false);});
      g.pct=0;g.completed=false;g.startedDate=new Date().toISOString();g.sickDayDate=null;
      saveGoals();toast('Goal restarted! Day 1 begins now. 🏔️');renderGoalDetail();
    }
  );
}

function deleteGoal(id){
  const g=goals.find(x=>String(x.id)===String(id));if(!g)return;
  showConfirmModal(
    '🗑️ Delete goal?',
    '"'+g.name+'" will be permanently deleted. This cannot be undone.',
    'Yes, delete',
    ()=>{goals=goals.filter(x=>x.id!==g.id);saveGoals();backToGoals();toast('Goal deleted.');}
  );
}

// Nicer confirm modal — no browser confirm() dialog
function showConfirmModal(title,msg,confirmLabel,onConfirm){
  const existing=document.getElementById('confirmModal');if(existing&&existing.remove)existing.remove();
  const modal=document.createElement('div');modal.id='confirmModal';
  modal.style.cssText='position:fixed;inset:0;background:rgba(15,28,46,.5);display:flex;align-items:center;justify-content:center;z-index:700;backdrop-filter:blur(3px);';
  const box=document.createElement('div');box.style.cssText='background:var(--white);border-radius:var(--rl);padding:24px;max-width:360px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,.25);';
  box.innerHTML='<div style="font-family:var(--display);font-size:18px;font-weight:700;color:var(--text);margin-bottom:8px;">'+title+'</div>'
    +'<div style="font-size:14px;color:var(--text2);line-height:1.6;margin-bottom:20px;">'+msg+'</div>';
  const btns=document.createElement('div');btns.style.cssText='display:flex;gap:10px;';
  const cancel=document.createElement('button');cancel.textContent='Cancel';cancel.style.cssText='flex:1;padding:10px;border-radius:var(--rm);border:1px solid var(--border);background:var(--white);font-size:13px;font-weight:600;cursor:pointer;color:var(--text2);';
  cancel.onclick=()=>modal.remove();
  const confirm2=document.createElement('button');confirm2.textContent=confirmLabel;confirm2.style.cssText='flex:1;padding:10px;border-radius:var(--rm);border:none;background:var(--text);color:#fff;font-size:13px;font-weight:700;cursor:pointer;';
  confirm2.onclick=()=>{modal.remove();onConfirm();};
  btns.appendChild(cancel);btns.appendChild(confirm2);box.appendChild(btns);
  modal.appendChild(box);document.body.appendChild(modal);
  // Close on backdrop click
  modal.onclick=(e)=>{if(e.target===modal)modal.remove();};
}

function sickDay(){
  document.getElementById('sickModal').style.display='none';
  goals.forEach(g=>{
    if(g.startedDate){const d=new Date(g.startedDate);d.setDate(d.getDate()+1);g.startedDate=d.toISOString();g.sickDayDate=dateKey();}
  });
  LS.set('habits_'+dateKey(),{});
  saveGoals();toast('Sick day logged. Rest up — the mountain will wait. 🌿');
  if(document.getElementById('goalDetailPage').style.display!=='none')renderGoalDetail();
  else renderGoalsPage();
}

function syncToCalendar(task,g){
  const events=LS.get('cal_events',[]);
  const existing=events.findIndex(e=>e.taskId===task.id&&e.date===dateKey());
  const entry={title:g.name+': '+task.text,time:task.time,date:dateKey(),type:'goal_task',goalId:g.id,taskId:task.id};
  if(existing>-1)events[existing]=entry;else events.push(entry);
  LS.set('cal_events',events);
}

      tb.onclick=()=>{activeCat=cat;buildPicker();};
      tabs.appendChild(tb);

    // Image grid
    const grid=document.createElement('div');grid.style.cssText='display:grid;grid-template-columns:repeat(3,1fr);gap:8px;';
    IMG_CATS[activeCat].forEach(photoId=>{
      const url='https://images.unsplash.com/'+photoId+'?w=400&q=80';
      const thumb='https://images.unsplash.com/'+photoId+'?w=220&q=60';
      const cell=document.createElement('div');
      cell.style.cssText='height:90px;border-radius:var(--rm);overflow:hidden;cursor:pointer;border:2px solid '+(g.img===url?'var(--blue)':'transparent')+';transition:border-color .15s;position:relative;';

    body.appendChild(credit);

    inner.appendChild(body);
  }

  buildPicker();
  modal.appendChild(inner);document.body.appendChild(modal);
}
function selectImg(url,goalId){const g=goals.find(x=>x.id===goalId);if(g){g.img=url;saveGoals();}document.getElementById('imgPickerModal')?.remove();renderGoalDetail();toast('Image updated!');}
function handleImgUpload(e,goalId){const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=ev=>{const g=goals.find(x=>x.id===goalId);if(g){g.img=ev.target.result;saveGoals();}document.getElementById('imgPickerModal')?.remove();renderGoalDetail();toast('Image uploaded!');};reader.readAsDataURL(file);}

function showActionConfirm(title,msg,confirmLabel,onConfirm){
  if(confirm(title+'\n\n'+msg))onConfirm();
}

let createMode='premade';// 'premade' or 'custom'

function setCreateMode(mode){
  createMode=mode;
  const premadeTab=document.getElementById('modeTabPremade');
  const customTab=document.getElementById('modeTabCustom');
  if(premadeTab){
    premadeTab.style.borderBottomColor=mode==='premade'?'var(--blue)':'transparent';
    premadeTab.style.color=mode==='premade'?'var(--blue)':'var(--text3)';
    premadeTab.style.fontWeight=mode==='premade'?'700':'600';
  }
  if(customTab){
    customTab.style.borderBottomColor=mode==='custom'?'var(--blue)':'transparent';
    customTab.style.color=mode==='custom'?'var(--blue)':'var(--text3)';
    customTab.style.fontWeight=mode==='custom'?'700':'600';
  }
  createStep=1;
  renderCreateStep();
}

function openCreate(){
  createStep=1;
  createMode='premade';
  newGoal={name:'',emoji:'🎯',color:'#1A5FA8',img:'',target:'',milestones:[],pct:0,completed:false,totalDays:90};
  document.getElementById('createModal').style.display='flex';
  setTimeout(()=>{setCreateMode('premade');},50);
}
function closeCreate(){document.getElementById('createModal').style.display='none';}

function renderCreateStep(){
  const body=document.getElementById('createBody');const ftr=document.getElementById('createFtr');
  body.innerHTML='';ftr.innerHTML='';
  const steps=['Choose type','Customize','Milestones & tasks','Image'];
  const si=document.createElement('div');si.style.cssText='display:flex;gap:4px;margin-bottom:20px;align-items:center;';
  steps.forEach((s,i)=>{
    const grp=document.createElement('div');grp.style.cssText='display:flex;align-items:center;flex:1;gap:6px;';

      const addPremadeGoal=(t)=>{

      // Preview panel

      const showPreview=(tmpl)=>{

        previewPanel.style.display='block';

        // Top row — image + info

        imgThumb.style.cssText='width:52px;height:52px;border-radius:var(--rm);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:26px;overflow:hidden;';
        if(tmpl.img){imgThumb.style.background='url('+tmpl.img+') center/cover';} else {imgThumb.style.background='linear-gradient(135deg,'+tmpl.color+'44,'+tmpl.color+'22)';imgThumb.textContent=tmpl.emoji;}
        const infoCol=document.createElement('div');infoCol.style.flex='1';
        const titleEl=document.createElement('div');titleEl.style.cssText='font-family:var(--display);font-size:16px;font-weight:700;color:var(--text);';titleEl.textContent=tmpl.emoji+' '+tmpl.name;
        const metaEl=document.createElement('div');metaEl.style.cssText='font-size:11px;color:var(--text3);margin-top:2px;';metaEl.textContent=(tmpl.category||'')+' · '+days+' days · '+tmpl.milestones.length+' milestones';

        addBtn.textContent='🏔️ Add this goal — ready to start';

        previewPanel.appendChild(addBtn);
      };


      const renderGrid=()=>{
        const q=searchInp.value.toLowerCase().trim();
        tGrid.innerHTML='';
        const filtered=GOAL_TEMPLATES.filter(t=>{
          const matchCat=activeCat==='All'||(t.category||'Other')===activeCat;
          const matchQ=!q||t.name.toLowerCase().includes(q)||(t.category||'').toLowerCase().includes(q);
          return matchCat&&matchQ;

        if(!filtered.length){
          tGrid.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:24px;color:var(--text3);font-size:13px;">No goals found.</div>';

        }
        filtered.forEach(t=>{
          const def=t.taskDefKey&&GOAL_TASK_DEFS[t.taskDefKey]?GOAL_TASK_DEFS[t.taskDefKey]:null;

          if(t.img){
            const imgDiv=document.createElement('div');imgDiv.style.cssText='height:56px;background:url('+t.img+') center/cover;';
            card.appendChild(imgDiv);
          }
          const cardBody=document.createElement('div');cardBody.style.cssText='padding:8px 10px 10px;';
          cardBody.innerHTML=`
            <div style="font-size:20px;margin-bottom:4px;">${t.emoji}</div>

            <div style="display:flex;gap:3px;flex-wrap:wrap;margin-bottom:6px;">

              <span style="font-size:9px;padding:2px 6px;border-radius:100px;background:var(--bg2);color:var(--text3);">${t.milestones.length} milestones</span>
            </div>
            <div style="font-size:10px;padding:3px 7px;border-radius:var(--r);background:${t.color};color:#fff;font-weight:700;text-align:center;cursor:pointer;">Preview & Add</div>`;
          card.onmouseover=()=>{card.style.borderColor=t.color;card.style.boxShadow='0 2px 10px rgba(0,0,0,.08)';};
          card.onmouseout=()=>{card.style.borderColor='var(--border)';card.style.boxShadow='';};
          card.onclick=()=>{

            showPreview(t);
            // Scroll preview into view

      ftr.innerHTML='<div style="font-size:12px;color:var(--text3);">'+GOAL_TEMPLATES.length+' premade goals — tap any to preview, then add with one tap</div>';

    } else {
      // ── CUSTOM MODE: the original create flow ─────────────────────────────
      // Show step progress bar
      ftr.innerHTML='<div style="font-size:12px;color:var(--text3);">Step 1 of 4</div>';
      const intro=document.createElement('p');intro.style.cssText='font-size:13px;color:var(--text2);margin-bottom:14px;';
      intro.textContent='Build your own goal from scratch. Set your own name, milestones, tasks, and image.';

      scratch.innerHTML='<span style="font-size:24px;">✏️</span> Start building your custom goal →';
      scratch.onclick=()=>{
        newGoal={name:'',emoji:'🎯',color:'#1A5FA8',img:'',target:'',milestones:[{id:1,name:'Milestone 1',days:'',pct:50,reached:false,tasks:[]},{id:2,name:'Final peak 🏔️',days:'',pct:100,reached:false,tasks:[]}],pct:0,completed:false,totalDays:90,taskDefKey:''};
        createStep=2;renderCreateStep();
      };
      body.appendChild(scratch);
      // Show step progress bar in header for custom mode
      const stepInfo=document.createElement('div');stepInfo.style.cssText='margin-top:20px;padding:14px 16px;background:var(--bg);border-radius:var(--rm);font-size:12px;color:var(--text3);line-height:1.6;';
      stepInfo.innerHTML='<strong style="color:var(--text2);">Building from scratch takes 4 steps:</strong><br/>1. Name your goal &amp; pick a color<br/>2. Set your milestones<br/>3. Add tasks<br/>4. Choose a cover image';
      body.appendChild(stepInfo);
    }

  } else if(createStep===2){
    const f1=document.createElement('div');f1.className='fld';f1.innerHTML='<label>Goal name *</label>';
    const ni=document.createElement('input');ni.className='inp';ni.placeholder='e.g. Lose 20 lbs';ni.value=newGoal.name;ni.addEventListener('input',e=>newGoal.name=e.target.value);f1.appendChild(ni);body.appendChild(f1);
    const ec=document.createElement('div');ec.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;';
    const emojis=['🏃','📚','💰','🎸','🎯','💪','🌅','🎓','🏠','✍️','🎨','🧘'];
    const ef=document.createElement('div');ef.innerHTML='<label style="display:block;font-size:11px;font-weight:600;color:var(--text2);margin-bottom:4px;">Emoji</label>';

    COLORS.forEach(c=>{const cb=document.createElement('button');cb.style.cssText=`width:28px;height:28px;border-radius:50%;background:${c};border:3px solid ${newGoal.color===c?'var(--text)':'transparent'};cursor:pointer;`;cb.onclick=()=>{newGoal.color=c;cg.querySelectorAll('button').forEach(b=>b.style.border='3px solid transparent');cb.style.border='3px solid var(--text)';};cg.appendChild(cb);});cf.appendChild(cg);ec.appendChild(ef);ec.appendChild(cf);body.appendChild(ec);

        tr.appendChild(tni);tr.appendChild(ttime);tr.appendChild(del);tList.appendChild(tr);

    });
    const addM=document.createElement('button');addM.style.cssText='width:100%;padding:8px;border-radius:var(--rm);border:1.5px dashed var(--border);font-size:12px;color:var(--text3);background:none;cursor:pointer;margin-bottom:4px;';addM.textContent='+ Add milestone';
    addM.onclick=()=>{newGoal.milestones.push({id:Date.now(),name:'New milestone',days:'',pct:100,reached:false,tasks:[]});renderCreateStep();};body.appendChild(addM);
    const back=document.createElement('button');back.className='btn-ghost';back.textContent='← Back';back.onclick=()=>{createStep=2;renderCreateStep();};
    const next=document.createElement('button');next.className='btn-blue';next.textContent='Next: Add image →';next.onclick=()=>{createStep=4;renderCreateStep();};
    ftr.appendChild(back);ftr.appendChild(next);

  } else if(createStep===4){
    const intro=document.createElement('p');intro.style.cssText='font-size:13px;color:var(--text2);margin-bottom:14px;';intro.textContent='Add a cover image that motivates you. You can change this anytime.';body.appendChild(intro);

    ['photo-1571019613454-1cb2f99b2d8b','photo-1512820790803-83ca734da794','photo-1579621970563-ebec7560ff3e','photo-1510915361894-db8b60106cb1','photo-1506905925346-21bda4d32df4','photo-1507003211169-0a1dd7228f2d'].forEach(id=>{

    });

    const back=document.createElement('button');back.className='btn-ghost';back.textContent='← Back';back.onclick=()=>{createStep=3;renderCreateStep();};
    const save=document.createElement('button');save.className='btn-blue';save.innerHTML='🏔️ Create goal';
    save.onclick=()=>{
      const g={...newGoal,id:Date.now(),pct:0,completed:false};
      g.milestones=g.milestones.map((m,i)=>({...m,id:m.id||Date.now()+i,reached:false,tasks:(m.tasks||[]).map(t=>({...t,id:t.id||Date.now(),done:false}))}));
      goals.push(g);saveGoals();closeCreate();toast('Goal created! 🏔️ Hit Start when you\'re ready.');renderGoalsPage();
    };
    ftr.appendChild(back);ftr.appendChild(save);
  }
}

// This runs every time the page loads to pull checkmarks from your phone/cloud
async function syncCheckmarksFromCloud() {
  if (!window.supabaseClient) return;
  
  const { data: { session } } = await supabaseClient.auth.getSession();
  if (!session) return;

  const today = new Date().toISOString().split('T')[0];
  const { data } = await supabaseClient.from('habits')
    .select('name')
    .eq('user_id', session.user.id)
    .eq('completed_at', today);

  if (data && data.length > 0) {
    data.forEach(habit => {
      LS.set(habit.name, true);
    });
    // This second render updates the checkmarks on the screen
    renderGoalsPage();
  }
}

// And finally, trigger the sync 1 second after the page opens
setTimeout(syncCheckmarksFromCloud, 1000);
